<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <!-- Mở khóa Zoom hoàn toàn -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
    <title>CAPTAIN BOY • TINH HÀ SAY HI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #d8b4fe;
            --bg: #05030d;
            --text: #ffffff;
            --card-text: #1a1a1a;
            --accent: #ff3b3b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.4;
        }

        /* --- HỆ THỐNG NỀN BỒNG BỀNH --- */
        .universe-bg {
            position: fixed; inset: 0; z-index: -10;
            background: radial-gradient(circle at center, #1e1450 0%, #05030d 100%);
        }

        .nebula {
            position: absolute; inset: 0;
            background: url("./nền.png") center/cover no-repeat;
            opacity: 0.4; filter: blur(2px) saturate(1.2);
        }

        .cloud {
            position: absolute; background: rgba(255, 255, 255, 0.05);
            filter: blur(40px); border-radius: 50%;
            animation: floatCloud var(--d) infinite ease-in-out;
            pointer-events: none;
        }
        @keyframes floatCloud {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 20px); }
        }

        .star {
            position: absolute; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #fff;
            animation: twinkle var(--t) infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* --- HERO --- */
        .hero {
            padding: 60px 20px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(30px, 8vw, 80px);
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--primary-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .hero .sub-bottom {
            font-size: clamp(9px, 3.5vw, 18px);
            letter-spacing: 1px; font-weight: 700;
            white-space: nowrap; margin-top: 10px;
            display: block; width: 100%;
        }

        /* --- KHUNG KIM TỰ THÁP (FIX LỖI TO) --- */
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 10px; }

        .pyramid-wrapper {
            position: relative; width: 100%; height: 300px;
            margin: 20px 0; overflow: hidden;
            background: rgba(255,255,255,0.03);
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            border-bottom: 2px solid var(--primary-light);
            backdrop-filter: blur(10px);
        }

        .flying-wish {
            position: absolute; background: rgba(255, 255, 255, 0.95);
            padding: 6px 12px; border-radius: 12px;
            color: #111; font-size: 10px; font-weight: 700;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            max-width: 150px; /* Giới hạn chiều rộng để không che màn hình */
            white-space: normal;
            animation: pyramidFly var(--duration) linear infinite;
        }

        @keyframes pyramidFly {
            0% { bottom: -50px; left: var(--startX); transform: scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            100% { bottom: 350px; left: 50%; transform: scale(0.4); opacity: 0; }
        }

        /* --- WALL OF LOVE (GRID 2-3 CỘT) --- */
        .grid-wall {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px; padding-bottom: 120px;
        }

        @media (min-width: 768px) {
            .grid-wall { grid-template-columns: repeat(4, 1fr); gap: 30px; }
        }

        /* SHEEP CARD CHỐNG TRÀN TUYỆT ĐỐI */
        .sheep-card {
            position: relative; width: 100%; aspect-ratio: 1.1 / 1;
            background: url("./sheep.png") center/contain no-repeat;
            display: flex; align-items: center; justify-content: center;
        }

        .card-inner {
            position: absolute; 
            width: 75%; height: 60%;
            top: 25%; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column;
            text-align: center; padding: 5px;
            /* Thanh cuộn ẩn để chứa 100-200 chữ */
            overflow-y: auto; 
            scrollbar-width: none; /* Firefox */
        }
        .card-inner::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .card-inner b {
            color: var(--accent); font-size: 11px;
            margin-bottom: 2px; font-weight: 900;
            position: sticky; top: 0; background: transparent;
        }

        .card-inner span {
            color: var(--card-text); font-weight: 700;
            line-height: 1.2; word-break: break-word;
            font-size: 10px; /* Cố định cỡ chữ nhỏ để dễ đọc khi cuộn */
        }

        /* --- CONTROLS --- */
        .btn-float {
            position: fixed; right: 15px; bottom: 25px;
            padding: 12px 20px; background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none; border-radius: 50px; color: #fff; font-weight: 800; font-size: 13px;
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5); z-index: 100;
        }

        #musicBtn {
            position: fixed; left: 15px; bottom: 25px;
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; z-index: 100;
        }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center;
            padding: 20px; z-index: 1000; backdrop-filter: blur(10px);
        }
        .modal.active { display: flex; }
        .modal-box {
            background: #111026; width: 100%; max-width: 450px;
            padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
        }

        .input-box {
            width: 100%; padding: 14px; margin: 10px 0;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #fff; font-size: 16px; font-family: inherit;
        }

        footer { text-align: center; padding: 40px; font-size: 10px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="universe-bg">
        <div class="nebula"></div>
        <div id="starField"></div>
        <div id="cloudField"></div>
    </div>

    <header class="hero">
        <div style="font-size:9px; letter-spacing:4px; opacity:0.7; margin-bottom:5px">THE RETURN OF</div>
        <h1>CAPTAIN BOY</h1>
        <div class="sub-bottom">✦ CAPTAIN BOY - TINH HÀ SAY HI ✦</div>
    </header>

    <div class="container">
        <div style="text-align:center; font-weight:900; color:var(--primary-light); font-size:18px; margin-top:20px">CỪU CÓ CÁNH WITH LOVE</div>
        <div class="pyramid-wrapper" id="pyramidZone"></div>

        <section>
            <div style="text-align: center; margin: 30px 0 20px;">
                <h2 style="font-size: 26px; font-weight: 900;">WALL OF LOVE</h2>
                <p style="opacity: 0.6; font-size: 11px;">Mỗi thẻ cừu là một trái tim ✦</p>
            </div>
            <div class="grid-wall" id="wishGrid"></div>
        </section>

        <footer>PROJECT BY: TEAM BOT - NHỮNG CON BOT CỦA CAPTAIN BOY</footer>
    </div>

    <button class="btn-float" onclick="setModal(true)">+ GỬI LỜI CHÚC</button>
    <button id="musicBtn">🔊</button>

    <div class="modal" id="wishModal">
        <div class="modal-box">
            <h2 style="margin-bottom:15px; font-weight:900">Gửi lời chúc ✨</h2>
            <form id="wishForm">
                <input type="text" id="uName" class="input-box" placeholder="Tên của Cừu..." required maxlength="25">
                <textarea id="uMsg" class="input-box" rows="5" placeholder="Nhập lời nhắn của bạn dành cho CAPTAIN BOY..." required maxlength="1000"></textarea>
                <button type="submit" id="sendBtn" style="width:100%; padding:16px; background:var(--primary); border:none; border-radius:12px; color:#fff; font-weight:900; cursor:pointer">GỬI NGAY ✨</button>
                <button type="button" onclick="setModal(false)" style="width:100%; background:none; border:none; color:#666; margin-top:15px">Hủy</button>
            </form>
        </div>
    </div>

    <audio id="bgm" loop src="./music.mp3"></audio>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzOb_fBFiq6VR_n2dN9QsNDUM2pMoSb2dSfw2Nz0dKLHBeberjyc49GJ_gk70kng2R2/exec";

        // Tạo Sao & Mây
        const sf = document.getElementById("starField");
        const cf = document.getElementById("cloudField");
        for(let i=0; i<120; i++){
            const s = document.createElement("div"); s.className = "star";
            const sz = Math.random() * 3 + 1;
            s.style.width = s.style.height = sz + "px";
            s.style.left = Math.random() * 100 + "%"; s.style.top = Math.random() * 100 + "%";
            s.style.setProperty('--t', (Math.random() * 3 + 2) + "s");
            sf.appendChild(s);
        }
        for(let i=0; i<5; i++){
            const c = document.createElement("div"); c.className = "cloud";
            c.style.width = (Math.random() * 250 + 150) + "px";
            c.style.height = (Math.random() * 100 + 80) + "px";
            c.style.left = Math.random() * 90 + "%"; c.style.top = Math.random() * 90 + "%";
            c.style.setProperty('--d', (Math.random() * 8 + 12) + "s");
            cf.appendChild(c);
        }

        async function load() {
            try {
                const r = await fetch(API + "?action=list");
                const d = await r.json();
                if(d.approved) {
                    renderGrid(d.approved);
                    renderPyramid(d.approved);
                }
            } catch(e) {}
        }

        function renderGrid(list) {
            const grid = document.getElementById("wishGrid");
            grid.innerHTML = list.slice().reverse().map(i => `
                <div class="sheep-card">
                    <div class="card-inner">
                        <b>From: ${esc(i.name)}</b>
                        <span>${esc(i.message)}</span>
                    </div>
                </div>
            `).join("");
        }

        function renderPyramid(list) {
            const pZone = document.getElementById("pyramidZone");
            pZone.innerHTML = "";
            setInterval(() => {
                const i = list[Math.floor(Math.random()*list.length)];
                const w = document.createElement("div");
                w.className = "flying-wish";
                w.style.setProperty('--startX', (Math.random() * 70 + 15) + "%");
                w.style.setProperty('--duration', (Math.random() * 4 + 6) + "s");
                // Cắt bớt lời nhắn bay cho đỡ dài
                w.innerText = esc(i.name) + ": " + (i.message.length > 50 ? i.message.substring(0, 50) + "..." : i.message);
                pZone.appendChild(w);
                setTimeout(() => w.remove(), 10000);
            }, 3000);
        }

        document.getElementById("wishForm").onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById("sendBtn");
            const name = document.getElementById("uName").value.trim();
            const message = document.getElementById("uMsg").value.trim();
            btn.innerText = "ĐANG GỬI..."; btn.disabled = true;
            try {
                await fetch(API, { method:"POST", body: JSON.stringify({action:"submit", name, message, id: Date.now()}) });
                alert("Gửi thành công! Chờ duyệt nhé ✨");
                setModal(false); location.reload();
            } catch(e) { alert("Lỗi!"); btn.disabled = false; btn.innerText = "GỬI NGAY ✨"; }
        };

        function setModal(s) { document.getElementById("wishModal").classList.toggle("active", s); }
        function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        const bgm = document.getElementById("bgm");
        document.getElementById("musicBtn").onclick = () => {
            if(bgm.paused) { bgm.play(); } else { bgm.pause(); }
        };

        load();
    </script>
</body>
</html>
