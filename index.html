<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CAPTAIN BOY • TINH HÀ SAY HI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#7c3aed;
  --primary2:#c084fc;
  --bg:#05030d;
  --text:#fff;
  --muted:rgba(255,255,255,.7);
}

/* ================= RESET ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden; /* FIX TRÀN NGANG */
}

/* ================= BACKGROUND ================= */
.bg{
  position:fixed;
  inset:0;
  z-index:-5;
  background:
  radial-gradient(circle at top,#7c3aed33,transparent 40%),
  radial-gradient(circle at bottom,#c084fc22,transparent 40%);
}

/* ================= CONTAINER FIX ================= */
.container{
  width:100%;
  max-width:1100px;
  margin:auto;
  padding:0 16px; /* FIX MOBILE */
}

/* ================= HERO ================= */
.hero{
  min-height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 10px;
}

.hero h1{
  font-size:clamp(34px,8vw,90px);
  font-weight:900;
  white-space:normal; /* FIX KHÔNG ÉP 1 HÀNG */
  line-height:1.1;
}

/* ================= SECTION TEXT ================= */
.section-head h2{
  font-size:clamp(22px,5vw,42px);
  text-align:center;
  font-weight:900;
  white-space:normal; /* FIX MOBILE */
}

.section-head p{
  text-align:center;
  font-size:14px;
  color:var(--muted);
}

/* ================= CUU CO CANH ================= */
.wish-cuucocanh{
  width:100%;
  height:360px;
  border-radius:24px;
  overflow:hidden;
  background:rgba(20,15,40,.7);
}

/* ================= FLY WISH ================= */
.flying-wish{
  position:absolute;
  bottom:-120px;
  left:0;

  max-width:240px;

  padding:14px 18px;

  border-radius:999px;

  background:#fff;

  animation:flyUp linear forwards;
}

@keyframes flyUp{
  0%{transform:translateY(0);opacity:0}
  10%{opacity:1}
  100%{transform:translateY(-700px);opacity:0}
}

.flying-wish strong{
  font-size:12px;
  color:#7c3aed;
}

.flying-wish span{
  font-size:12px;
  color:#222;
}

/* ================= WALL ================= */
.wish-grid{
  display:grid;
  grid-template-columns:1fr; /* FIX MOBILE KHÔNG TRÀN */
  gap:14px;
  margin-top:20px;
}

/* ================= SHEEP CARD FIX ================= */
.wish-card{
  width:100%;
  max-width:420px;
  margin:auto;

  height:220px;

  background:url("./sheep.png") center/contain no-repeat;

  padding:50px 70px 40px 90px;

  overflow:hidden;
}

.wish-card strong{
  font-size:14px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.wish-card p{
  font-size:12px;
  line-height:1.3;

  display:-webkit-box;
  -webkit-line-clamp:4;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

/* ================= BUTTON ================= */
.floating-btn{
  position:fixed;
  right:16px;
  bottom:16px;

  padding:14px 18px;

  border:none;
  border-radius:999px;

  background:linear-gradient(135deg,#7c3aed,#c084fc);
  color:#fff;
  font-weight:800;

  font-size:12px;
}

/* ================= MODAL ================= */
.modal{
  position:fixed;
  inset:0;
  display:none;
  background:rgba(0,0,0,.7);
  justify-content:center;
  align-items:center;
  padding:16px;
}

.modal.active{
  display:flex;
}

.modal-box{
  width:100%;
  max-width:420px;
  background:#1a1430;
  padding:20px;
  border-radius:20px;
}

/* ================= FIX MOBILE CORE ================= */
@media (max-width:768px){

  /* QUAN TRỌNG NHẤT */
  html,body{
    width:100%;
    overflow-x:hidden;
  }

  .hero h1{
    font-size:36px;
  }

  .wish-card{
    transform:scale(0.95);
  }

  .section-head h2{
    font-size:24px;
    white-space:normal;
  }
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

  <section class="hero">
    <div>
      <h1>CAPTAIN BOY</h1>

      <div class="section-head">
        <h2>WISHING WALL</h2>
        <p>✦ TINH HÀ SAY HI ✦</p>
      </div>
    </div>
  </section>

  <section>
    <div class="section-head">
      <h2>CỪU CÓ CÁNH</h2>
      <p>Lời chúc bay lên trời ✨</p>
    </div>

    <div class="wish-cuucocanh" id="wishCuucocanh"></div>
  </section>

  <section>
    <div class="section-head">
      <h2>WALL OF LOVE</h2>
    </div>

    <div class="wish-grid" id="wishGrid"></div>
  </section>

</div>

<button class="floating-btn">GỬI LỜI</button>

<script>
// giữ nguyên logic của bạn (không sửa backend)
</script>

</body>
</html>
