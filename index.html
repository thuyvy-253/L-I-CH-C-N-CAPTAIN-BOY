<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>CAPTAIN BOY • TINH HÀ SAY HI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  max-width:100%;
  overflow-x:hidden; /* 🔥 FIX CHÍNH */
}

body{
  font-family:'Inter',sans-serif;
  background:#05030d;
  color:#fff;
  line-height:1.5;
}

/* ================= BACKGROUND ================= */
.bg{
  position:fixed;
  inset:0;
  z-index:-5;
  background:
  radial-gradient(circle at top,#7c3aed33,transparent 40%),
  radial-gradient(circle at bottom,#c084fc22,transparent 40%);
}

/* ================= SAFE LAYOUT ================= */
.container{
  width:100%;
  max-width:100%;
  padding:0 14px;
}

/* ================= HERO ================= */
.hero{
  min-height:85vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 0;
}

.hero h1{
  font-size:clamp(34px,9vw,72px);
  font-weight:900;
  line-height:1.1;
}

/* ================= TEXT ================= */
.section-head h2{
  font-size:clamp(20px,6vw,36px);
  text-align:center;
  font-weight:900;
  white-space:normal; /* 🔥 chống tràn */
}

.section-head p{
  text-align:center;
  font-size:13px;
  opacity:.8;
}

/* ================= CUU AREA ================= */
.wish-cuucocanh{
  width:100%;
  height:320px;
  border-radius:18px;
  overflow:hidden;
  background:rgba(255,255,255,.04);
  position:relative;
}

/* ================= FLY WISH ================= */
.flying-wish{
  position:absolute;
  bottom:-120px;
  left:0;

  max-width:220px;
  padding:12px 14px;

  border-radius:999px;
  background:#fff;

  animation:flyUp linear forwards;
}

@keyframes flyUp{
  0%{transform:translateY(0);opacity:0}
  10%{opacity:1}
  100%{transform:translateY(-700px);opacity:0}
}

.flying-wish strong{
  font-size:11px;
  color:#7c3aed;
}

.flying-wish span{
  font-size:11px;
  color:#222;
}

/* ================= WALL ================= */
.wish-grid{
  display:grid;
  grid-template-columns:1fr; /* 🔥 APP STYLE */
  gap:12px;
  margin-top:16px;
}

/* ================= SHEEP CARD FIX ================= */
.wish-card{
  width:100%;
  max-width:100%;
  margin:auto;

  height:210px;

  background:url("./sheep.png") center/contain no-repeat;

  padding:50px 60px 40px 80px;

  overflow:hidden;
  position:relative;
}

.wish-card strong{
  font-size:13px;
  font-weight:800;

  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;

  text-align:center;
  display:block;
}

.wish-card p{
  font-size:12px;
  line-height:1.35;

  max-height:120px;
  overflow:hidden;

  display:-webkit-box;
  -webkit-line-clamp:5;
  -webkit-box-orient:vertical;

  word-break:break-word;
}

/* ================= BUTTON ================= */
.floating-btn{
  position:fixed;
  right:14px;
  bottom:14px;

  border:none;
  border-radius:999px;

  padding:14px 16px;

  font-weight:800;
  font-size:12px;

  background:linear-gradient(135deg,#7c3aed,#c084fc);
  color:#fff;

  z-index:999;
}

/* ================= MODAL ================= */
.modal{
  position:fixed;
  inset:0;
  display:none;

  background:rgba(0,0,0,.7);

  justify-content:center;
  align-items:center;

  padding:14px;
}

.modal.active{
  display:flex;
}

.modal-box{
  width:100%;
  max-width:380px;

  background:#15122a;
  padding:18px;
  border-radius:18px;
}

/* ================= IMPORTANT MOBILE FIX ================= */
@media (max-width:768px){

  *{
    max-width:100%;
  }

  .hero h1{
    font-size:32px;
  }

  .wish-card{
    height:200px;
    padding:45px 55px 35px 70px;
  }

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

  <section class="hero">
    <div>
      <h1>CAPTAIN BOY</h1>

      <div class="section-head">
        <h2>WISHING WALL</h2>
        <p>✦ TINH HÀ SAY HI ✦</p>
      </div>
    </div>
  </section>

  <section>
    <div class="section-head">
      <h2>CỪU CÓ CÁNH</h2>
      <p>Lời chúc bay lên ✨</p>
    </div>

    <div class="wish-cuucocanh" id="wishCuucocanh"></div>
  </section>

  <section>
    <div class="section-head">
      <h2>WALL OF LOVE</h2>
    </div>

    <div class="wish-grid" id="wishGrid"></div>
  </section>

</div>

<button class="floating-btn">GỬI LỜI</button>

<script>
// giữ nguyên logic của bạn (không đụng backend)
</script>

</body>
</html>
