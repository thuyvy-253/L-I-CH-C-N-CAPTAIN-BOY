<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
    <title>CAPTAIN BOY • GALAXY OF LOVE</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --p: #7c3aed; --pl: #d8b4fe; --bg: #05030d;
            --text: #ffffff; --card-t: #1a1a1a; --red: #ff4757;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg);
            color: var(--text); overflow-x: hidden; line-height: 1.4;
        }

        /* FIX PHÔNG CHỮ CHO FORM */
        input, textarea, button { font-family: 'Inter', sans-serif !important; }

        /* --- UNIVERSE BACKGROUND --- */
        .universe { position: fixed; inset: 0; z-index: -10; background: #05030d; overflow: hidden; }
        .nebula {
            position: absolute; inset: 0;
            background: url("./nền.png") center/cover no-repeat;
            opacity: 0.5; filter: saturate(1.5) blur(1px);
        }
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #fff; animation: twinkle var(--t) infinite ease-in-out;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
        
        .galaxy-rain {
            position: absolute; width: 1.5px; height: 120px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.7), transparent);
            animation: rain var(--d) linear infinite; opacity: 0.4;
        }
        @keyframes rain { from { transform: translateY(-200px); } to { transform: translateY(110vh); } }

        /* --- HERO INTRO --- */
        .intro-hero {
            height: 90vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .intro-hero h1 {
            font-size: clamp(40px, 12vw, 120px); font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--pl));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px var(--p));
        }

        /* --- MAIN CONTENT --- */
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        
        /* HIỂN THỊ HẾT LỜI CHÚC BAY */
        .floating-box {
            position: relative; width: 100%; height: 400px;
            background: rgba(255,255,255,0.03); border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1); overflow: hidden;
            backdrop-filter: blur(12px); margin: 30px 0;
        }

        .float-card {
            position: absolute; bottom: -200px;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 16px; border-radius: 15px; color: #111;
            font-size: 11px; font-weight: 700; width: 250px; /* To hơn để chứa nhiều chữ */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: moveUp var(--duration) linear infinite;
        }
        .float-card b { color: var(--p); font-size: 10px; display: block; margin-bottom: 4px; }

        @keyframes moveUp {
            from { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            to { transform: translateY(-650px); opacity: 0; }
        }

        /* --- WALL OF LOVE (CHUẨN 2 CỘT) --- */
        .grid-wall {
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 20px; padding-bottom: 150px;
        }
        @media (min-width: 1000px) { .grid-wall { grid-template-columns: repeat(3, 1fr); } }

        /* SHEEP CARD CHỐNG TRÀN VÔ CỰC */
        .sheep-card {
            position: relative; width: 100%; aspect-ratio: 1/1;
            background: url("./sheep.png") center/contain no-repeat;
            display: flex; align-items: center; justify-content: center;
            cursor: zoom-in;
        }
        
        .card-inner {
            position: absolute; width: 68%; height: 55%; top: 26%;
            display: flex; flex-direction: column; text-align: center;
            padding: 8px 5px; 
            overflow-y: auto; /* CUỘN ĐỂ ĐỌC HẾT */
            scrollbar-width: none;
        }
        .card-inner::-webkit-scrollbar { display: none; }

        .card-inner b {
            color: var(--red); font-size: 11px; font-weight: 900;
            position: sticky; top: 0; background: #f0f8ff; padding: 2px 0;
        }
        .card-inner span {
            color: var(--card-t); font-weight: 700; line-height: 1.3;
            font-size: 10.5px; /* Phông chữ đẹp và bé lại */
        }

        /* --- UI CONTROLS --- */
        .btn-float {
            position: fixed; right: 20px; bottom: 30px;
            padding: 15px 25px; background: linear-gradient(135deg, var(--p), var(--pl));
            border: none; border-radius: 50px; color: #fff; font-weight: 900; z-index: 1000;
        }

        #musicBtn {
            position: fixed; left: 20px; bottom: 30px;
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; z-index: 1000; font-size: 20px;
        }
        
        .modal-form {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 1500;
        }
        .modal-form.active { display: flex; }
        .form-box {
            background: #111026; width: 100%; max-width: 400px; padding: 30px;
            border-radius: 25px; border: 1px solid var(--pl);
        }
        .st-input {
            width: 100%; padding: 14px; margin: 10px 0; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 15px;
        }

        footer { text-align: center; padding: 50px; font-size: 11px; opacity: 0.5; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="universe">
        <div class="nebula"></div>
        <div id="starField"></div>
        <div id="rainField"></div>
        <div class="shooting-star" style="top:20%; left:10%; animation-delay: 2s;"></div>
    </div>

    <header class="hero">
        <h1 style="margin-bottom:20px">CAPTAIN BOY</h1>
        <div style="font-size: clamp(14px, 4vw, 24px); font-weight: 700;">✦ TINH HÀ SAY HI ✦</div>
    </header>

    <div class="container">
        <div style="text-align: center; font-weight: 900; color: var(--pl); font-size: 22px;">CỪU CÓ CÁNH WITH LOVE</div>
        <div class="floating-box" id="flyingZone"></div>

        <section id="wall">
            <div style="text-align: center; margin: 40px 0;">
                <h2 style="font-size: 32px; font-weight: 900; text-shadow: 0 0 20px var(--p);">WALL OF LOVE</h2>
                <p style="opacity: 0.7; font-size: 13px;">Gửi ngàn lời chúc đến CAPTAIN BOY✦</p>
            </div>
            <div class="grid-wall" id="wishGrid"></div>
        </section>

        <footer>PROJECT BY: TEAM BOT - NHỮNG CON BOT CỦA CAPTAIN BOY</footer>
    </div>

    <button class="btn-float" onclick="setModal(true)">+ GỬI LỜI CHÚC</button>
    <button id="musicBtn">🔊</button>

    <div class="modal-form" id="wishModal">
        <div class="form-box">
            <h2 style="margin-bottom:15px">Gửi Tín Hiệu ✨</h2>
            <form id="wishForm">
                <input type="text" id="uName" class="st-input" placeholder="Tên của Cừu..." required maxlength="25">
                <textarea id="uMsg" class="st-input" rows="5" placeholder="Lời chúc đến CAPTAIN BOY..." required maxlength="1500"></textarea>
                <button type="submit" id="sendBtn" style="width:100%; padding:16px; background:var(--p); border:none; border-radius:12px; color:#fff; font-weight:900; cursor:pointer">GỬI VÀO VŨ TRỤ TINH HÀ ✨</button>
                <button type="button" onclick="setModal(false)" style="width:100%; background:none; border:none; color:#777; margin-top:15px">Hủy</button>
            </form>
        </div>
    </div>

    <audio id="bgm" loop src="./music.mp3"></audio>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzOb_fBFiq6VR_n2dN9QsNDUM2pMoSb2dSfw2Nz0dKLHBeberjyc49GJ_gk70kng2R2/exec";

        // 1. Tạo hiệu ứng vũ trụ
        const sf = document.getElementById("starField");
        const rf = document.getElementById("rainField");
        for(let i=0; i<100; i++){
            const s = document.createElement("div"); s.className = "star";
            s.style.width = s.style.height = (Math.random()*2.5+1) + "px";
            s.style.left = Math.random()*100 + "%"; s.style.top = Math.random()*100 + "%";
            s.style.setProperty('--t', (Math.random()*3+2) + "s");
            sf.appendChild(s);
        }
        for(let i=0; i<40; i++){
            const r = document.createElement("div"); r.className = "galaxy-rain";
            r.style.left = Math.random()*100 + "%";
            r.style.setProperty('--d', (Math.random()*5+5) + "s");
            r.style.animationDelay = Math.random()*5 + "s";
            rf.appendChild(r);
        }

        // 2. Tải và Render Dữ Liệu
        async function load() {
            try {
                const r = await fetch(API + "?action=list");
                const d = await r.json();
                if(d.approved) {
                    renderGrid(d.approved);
                    renderFlying(d.approved);
                }
            } catch(e) {}
        }

        function renderGrid(list) {
            document.getElementById("wishGrid").innerHTML = list.slice().reverse().map(i => `
                <div class="sheep-card">
                    <div class="card-inner">
                        <b>From: ${esc(i.name)}</b>
                        <span>${esc(i.message)}</span>
                    </div>
                </div>
            `).join("");
        }

        function renderFlying(list) {
            const zone = document.getElementById("flyingZone");
            zone.innerHTML = "";
            setInterval(() => {
                const i = list[Math.floor(Math.random()*list.length)];
                const c = document.createElement("div");
                c.className = "float-card";
                c.style.left = (Math.random() * 50 + 10) + "%";
                c.style.setProperty('--duration', (Math.random() * 5 + 10) + "s");
                // HIỂN THỊ HẾT LỜI CHÚC BAY (KHÔNG CẮT)
                c.innerHTML = `<b>${esc(i.name)}</b>${esc(i.message)}`;
                zone.appendChild(c);
                setTimeout(() => c.remove(), 16000);
            }, 5000); // Giảm tần suất để đỡ rối mắt
        }

        document.getElementById("wishForm").onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById("sendBtn");
            const name = document.getElementById("uName").value.trim();
            const message = document.getElementById("uMsg").value.trim();
            btn.innerText = "ĐANG GỬI..."; btn.disabled = true;
            try {
                await fetch(API, { method:"POST", body: JSON.stringify({action:"submit", name, message, id: Date.now()}) });
                alert("Đã gửi! Lời chúc của bạn đã bay vào vũ trụ ✨");
                setModal(false); location.reload();
            } catch(e) { alert("Lỗi!"); btn.disabled = false; btn.innerText = "GỬI NGAY"; }
        };

        function setModal(s) { document.getElementById("wishModal").classList.toggle("active", s); }
        function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        
        // Nút nhạc
        const bgm = document.getElementById("bgm");
        const mBtn = document.getElementById("musicBtn");
        mBtn.onclick = () => {
            if(bgm.paused) { bgm.play(); mBtn.innerHTML = "🔊"; }
            else { bgm.pause(); mBtn.innerHTML = "🔇"; }
        };

        load();
    </script>
</body>
</html>
