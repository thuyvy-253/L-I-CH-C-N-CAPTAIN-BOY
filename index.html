<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
    <title>CAPTAIN BOY • GALAXY LOVE</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;600;700;800;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --p: #7c3aed; --pl: #d8b4fe; --bg: #05030d;
            --text: #ffffff; --card-t: #1a1a1a; --red: #ff3b3b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg);
            color: var(--text); overflow-x: hidden; line-height: 1.4;
        }

        /* --- VŨ TRỤ BACKGROUND --- */
        .universe { position: fixed; inset: 0; z-index: -10; background: #05030d; }
        .nebula {
            position: absolute; inset: 0;
            background: url("./nền.png") center/cover no-repeat;
            opacity: 0.5; filter: saturate(1.4);
        }
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            box-shadow: 0 0 8px #fff; animation: twinkle var(--t) infinite ease-in-out;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
        
        .galaxy-rain {
            position: absolute; width: 1.5px; height: 100px;
            background: linear-gradient(to bottom, #fff, transparent);
            animation: rain var(--d) linear infinite; opacity: 0.4;
        }
        @keyframes rain { from { transform: translateY(-150px); } to { transform: translateY(110vh); } }

        /* --- INTRO HERO (GIỮ CHUẨN GIAO DIỆN ƯNG Ý) --- */
        .intro-hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: rgba(0,0,0,0.2);
        }
        .intro-hero .sub-top {
            font-size: 10px; letter-spacing: 5px; opacity: 0.7; margin-bottom: 5px;
        }
        .intro-hero h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(45px, 12vw, 130px); font-weight: 900;
            line-height: 1; color: #fff;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
        }
        .intro-hero .say-hi {
            font-size: clamp(14px, 4.5vw, 28px); font-weight: 800;
            letter-spacing: 3px; margin-top: 10px; color: #fff;
        }

        /* --- PYRAMID GALAXY (HIỆN HẾT CHỮ) --- */
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 10px; }
        .pyramid-box {
            position: relative; width: 100%; height: 400px; margin: 30px 0;
            background: rgba(255,255,255,0.03); border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1); overflow: hidden;
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            backdrop-filter: blur(10px);
        }
        .fly-card {
            position: absolute; background: rgba(255, 255, 255, 0.95);
            padding: 10px 15px; border-radius: 12px; color: #111;
            font-size: 10px; font-weight: 800; box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            animation: pyramidTravel var(--dur) linear infinite;
            max-width: 250px; white-space: normal; /* Hiện hết chữ */
        }
        @keyframes pyramidTravel {
            0% { bottom: -150px; left: var(--x); transform: scale(1); opacity: 0; }
            15% { opacity: 1; }
            100% { bottom: 500px; left: 50%; transform: scale(0.3); opacity: 0; }
        }

        /* --- WALL OF LOVE (2 CỘT MOBILE) --- */
        .grid-wall {
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 12px; padding-bottom: 150px;
        }
        @media (min-width: 768px) { .grid-wall { grid-template-columns: repeat(4, 1fr); gap: 30px; } }

        .sheep-card {
            position: relative; width: 100%; aspect-ratio: 1.1/1;
            background: url("./sheep.png") center/contain no-repeat;
            display: flex; align-items: center; justify-content: center;
            cursor: zoom-in;
        }

        .card-inner {
            position: absolute; width: 72%; height: 58%; top: 25%;
            display: flex; flex-direction: column; text-align: center;
            padding: 5px; overflow-y: auto; scrollbar-width: none;
        }
        .card-inner::-webkit-scrollbar { display: none; }
        .card-inner b { color: var(--red); font-size: clamp(9px, 3vw, 13px); margin-bottom: 2px; font-weight: 900; }
        .card-inner span {
            color: var(--card-t); font-weight: 700; line-height: 1.15;
            font-size: clamp(8px, 2.3vw, 11px); word-break: break-word;
        }

        /* --- MODAL --- */
        .full-view {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center;
            z-index: 2000; padding: 20px; backdrop-filter: blur(15px);
        }
        .full-view.active { display: flex; }
        .view-box {
            background: #fff; width: 100%; max-width: 450px; padding: 35px;
            border-radius: 35px; color: #111; text-align: center;
        }
        .view-box h2 { font-family: 'Dancing Script', cursive; font-size: 30px; color: var(--p); margin-bottom: 15px; }

        /* --- CONTROLS --- */
        .btn-float {
            position: fixed; right: 15px; bottom: 25px;
            padding: 14px 22px; background: linear-gradient(135deg, var(--p), var(--pl));
            border: none; border-radius: 50px; color: #fff; font-weight: 900; z-index: 1000;
        }
        #musicBtn {
            position: fixed; left: 15px; bottom: 25px;
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; z-index: 1000; cursor: pointer;
        }

        .modal-form {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center; z-index: 1500;
        }
        .modal-form.active { display: flex; }
        .form-box {
            background: #111026; width: 100%; max-width: 400px; padding: 25px;
            border-radius: 25px; border: 1px solid var(--pl);
        }
        .st-input {
            width: 100%; padding: 14px; margin: 10px 0; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: 'Inter';
        }

        footer { text-align: center; padding: 50px; font-size: 10px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="universe">
        <div class="nebula"></div>
        <div id="starField"></div>
        <div id="rainField"></div>
    </div>

    <!-- MỞ ĐẦU CHUẨN GIAO DIỆN -->
    <header class="intro-hero">
        <div class="sub-top">THE RETURN OF</div>
        <h1>CAPTAIN BOY</h1>
        <div class="say-hi">✦ TINH HÀ SAY HI ✦</div>
    </header>

    <div class="container">
        <div style="text-align: center; font-weight: 900; color: var(--pl); font-size: 20px; margin-top: 30px;">CỪU CÓ CÁNH WITH LOVE</div>
        <div class="pyramid-box" id="flyingZone"></div>

        <section>
            <div style="text-align: center; margin: 40px 0 20px;">
                <h2 style="font-size: 32px; font-weight: 900;">WALL OF LOVE</h2>
                <p style="opacity: 0.6; font-size: 12px;">Nhấn vào con cừu để xem lời nhắn ✨</p>
            </div>
            <div class="grid-wall" id="wishGrid"></div>
        </section>

        <footer>PROJECT BY: TEAM BOT - NHỮNG CON BOT CỦA CAPTAIN BOY</footer>
    </div>

    <button class="btn-float" onclick="setModal('wishModal', true)">+ GỬI LỜI CHÚC</button>
    <button id="musicBtn">🔊</button>

    <!-- XEM CHI TIẾT -->
    <div class="full-view" id="fullView" onclick="setModal('fullView', false)">
        <div class="view-box" onclick="event.stopPropagation()">
            <h2 id="viewName">From: Cừu</h2>
            <p id="viewMsg" style="font-weight: 600; font-size: 16px; color: #333;">...</p>
            <button onclick="setModal('fullView', false)" style="margin-top:20px; padding:10px 25px; border-radius:20px; border:none; background:var(--p); color:#fff; font-weight:800;">ĐÓNG</button>
        </div>
    </div>

    <!-- GỬI LỜI CHÚC -->
    <div class="modal-form" id="wishModal">
        <div class="form-box">
            <h2 style="margin-bottom:15px">Gửi Tín Hiệu ✨</h2>
            <input type="text" id="uName" class="st-input" placeholder="Tên của bạn..." maxlength="25">
            <textarea id="uMsg" class="st-input" rows="4" placeholder="Viết dài thoải mái nhé..." maxlength="1000"></textarea>
            <button onclick="submitWish()" id="sendBtn" style="width:100%; padding:16px; background:var(--p); border:none; border-radius:15px; color:#fff; font-weight:900; cursor:pointer">PHÓNG LÊN VŨ TRỤ</button>
            <button onclick="setModal('wishModal', false)" style="width:100%; background:none; border:none; color:#666; margin-top:10px">Hủy</button>
        </div>
    </div>

    <!-- NHẠC NỀN -->
    <audio id="bgm" loop src="./music.mp3"></audio>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzOb_fBFiq6VR_n2dN9QsNDUM2pMoSb2dSfw2Nz0dKLHBeberjyc49GJ_gk70kng2R2/exec";

        // Tinh hà
        const sf = document.getElementById("starField");
        const rf = document.getElementById("rainField");
        for(let i=0; i<120; i++){
            const s = document.createElement("div"); s.className = "star";
            s.style.width = s.style.height = (Math.random()*2.5+1) + "px";
            s.style.left = Math.random()*100 + "%"; s.style.top = Math.random()*100 + "%";
            s.style.setProperty('--t', (Math.random()*3+2) + "s");
            sf.appendChild(s);
        }
        for(let i=0; i<25; i++){
            const r = document.createElement("div"); r.className = "galaxy-rain";
            r.style.left = Math.random()*100 + "%";
            r.style.setProperty('--d', (Math.random()*4+4) + "s");
            r.style.animationDelay = Math.random()*5 + "s";
            rf.appendChild(r);
        }

        async function load() {
            try {
                const r = await fetch(API + "?action=list");
                const d = await r.json();
                if(d.approved) {
                    renderGrid(d.approved);
                    renderFlying(d.approved);
                }
            } catch(e) {}
        }

        function renderGrid(list) {
            const grid = document.getElementById("wishGrid");
            grid.innerHTML = list.slice().reverse().map(i => `
                <div class="sheep-card" onclick="openView('${esc(i.name)}', '${esc(i.message)}')">
                    <div class="card-inner">
                        <b>${esc(i.name)}</b>
                        <span>${esc(i.message)}</span>
                    </div>
                </div>
            `).join("");
        }

        function renderFlying(list) {
            const zone = document.getElementById("flyingZone");
            zone.innerHTML = "";
            setInterval(() => {
                const i = list[Math.floor(Math.random()*list.length)];
                const c = document.createElement("div");
                c.className = "fly-card";
                c.style.setProperty('--x', (Math.random()*60 + 20) + "%");
                c.style.setProperty('--dur', (Math.random()*5 + 8) + "s");
                // HIỂN THỊ HẾT LỜI CHÚC TRONG PYRAMID
                c.innerHTML = `<b style="font-size:8px">${esc(i.name)}:</b><br>${esc(i.message)}`;
                zone.appendChild(c);
                setTimeout(() => c.remove(), 10000);
            }, 3500);
        }

        function openView(name, msg) {
            document.getElementById("viewName").innerText = "From: " + name;
            document.getElementById("viewMsg").innerText = msg;
            setModal('fullView', true);
        }

        async function submitWish() {
            const n = document.getElementById("uName").value.trim();
            const m = document.getElementById("uMsg").value.trim();
            if(!n || !m) return alert("Cừu ơi hãy điền đủ thông tin nhé!");
            const btn = document.getElementById("sendBtn");
            btn.innerText = "ĐANG GỬI..."; btn.disabled = true;
            try {
                await fetch(API, { method:"POST", body: JSON.stringify({action:"submit", name:n, message:m, id:Date.now()}) });
                alert("Thành công! Lời chúc đã bay vào không gian ✨");
                setModal('wishModal', false); location.reload();
            } catch(e) { alert("Lỗi gửi!"); btn.disabled = false; btn.innerText = "GỬI NGAY"; }
        }

        function setModal(id, s) { document.getElementById(id).classList.toggle("active", s); }
        function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        
        // NHẠC NỀN LOGIC
        const bgm = document.getElementById("bgm");
        const mBtn = document.getElementById("musicBtn");
        mBtn.onclick = () => {
            if(bgm.paused) { bgm.play(); mBtn.innerHTML = "🔊"; }
            else { bgm.pause(); mBtn.innerHTML = "🔇"; }
        }

        load();
    </script>
</body>
</html>
