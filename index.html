<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CAPTAIN BOY • TINH HÀ SAY HI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#8b5cf6;
  --primary2:#c084fc;
  --bg:#05010f;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:'Inter',sans-serif;
  background:#05010f;
  color:#fff;
  overflow-x:hidden;
  min-height:100vh;
}

/* =========================
BACKGROUND
========================= */

.bg{
  position:fixed;
  inset:0;
  z-index:-50;

  background:
    linear-gradient(
      rgba(5,1,15,.4),
      rgba(5,1,15,.8)
    ),
    url("./nền.png");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  animation:bgMove 35s ease-in-out infinite;
}

@keyframes bgMove{
  0%{
    transform:scale(1);
  }
  50%{
    transform:scale(1.05);
  }
  100%{
    transform:scale(1);
  }
}

/* =========================
GALAXY
========================= */

#galaxy{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:-40;
}

/* =========================
PURPLE GLOW
========================= */

.glow{
  position:fixed;
  border-radius:50%;
  filter:blur(120px);
  opacity:.22;
  z-index:-35;
  animation:glowMove 14s ease-in-out infinite;
}

.glow.one{
  width:420px;
  height:420px;
  background:#7c3aed;
  top:-120px;
  left:-120px;
}

.glow.two{
  width:360px;
  height:360px;
  background:#c084fc;
  bottom:-120px;
  right:-120px;
  animation-delay:3s;
}

@keyframes glowMove{
  0%,100%{
    transform:translateY(0px) scale(1);
  }
  50%{
    transform:translateY(50px) scale(1.15);
  }
}

/* =========================
NOISE
========================= */

.noise{
  position:fixed;
  inset:0;
  z-index:-20;

  opacity:.04;

  background-image:
    linear-gradient(rgba(255,255,255,.6) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.6) 1px, transparent 1px);

  background-size:3px 3px;
}

/* =========================
METEOR
========================= */

.meteor{
  position:fixed;

  width:3px;
  height:180px;

  background:
    linear-gradient(
      to bottom,
      rgba(255,255,255,1),
      rgba(255,255,255,0)
    );

  border-radius:999px;

  transform:rotate(45deg);

  filter:
    drop-shadow(0 0 12px white)
    drop-shadow(0 0 30px #c084fc);

  pointer-events:none;

  z-index:-10;

  animation:meteor linear forwards;
}

@keyframes meteor{

  from{
    transform:
      translate(0,0)
      rotate(45deg);

    opacity:1;
  }

  to{
    transform:
      translate(-1200px,1200px)
      rotate(45deg);

    opacity:0;
  }

}

/* =========================
PARTICLES
========================= */

.particle{
  position:fixed;

  border-radius:50%;

  background:white;

  opacity:.8;

  pointer-events:none;

  z-index:-5;

  animation:floatUp linear forwards;
}

@keyframes floatUp{

  from{
    transform:
      translateY(0)
      scale(.5);

    opacity:0;
  }

  10%{
    opacity:1;
  }

  to{
    transform:
      translateY(-120vh)
      scale(1.8);

    opacity:0;
  }

}

/* =========================
LAYOUT
========================= */

.container{
  width:min(1200px,92%);
  margin:auto;
  padding-bottom:120px;
}

/* =========================
HERO
========================= */

.hero{

  height:100vh;

  min-height:100svh;

  display:flex;

  align-items:center;

  justify-content:center;

  text-align:center;

  overflow:hidden;

  padding:0;
}

.hero-inner{
  width:100%;
  overflow:hidden;
}

.hero h1{
  font-size:clamp(78px,10vw,170px);

  font-weight:900;

  line-height:.9;

  letter-spacing:2px;

  margin-bottom:18px;

  background:
    linear-gradient(
      to bottom,
      #fff,
      #d8b4fe
    );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
    0 0 40px rgba(192,132,252,.45);
}

.hero h2{
  font-size:clamp(42px,5vw,92px);

  font-weight:900;

  color:#f5d0fe;

  margin-bottom:18px;

  text-shadow:
    0 0 30px rgba(192,132,252,.4);
}

.hero p{
  font-size:clamp(18px,2vw,30px);

  color:#fff;

  letter-spacing:1px;
}

/* =========================
SECTION
========================= */

.section-head{
  text-align:center;
  margin-bottom:30px;
}

.section-head h2{
  font-size:clamp(28px,3vw,48px);
  font-weight:900;
  margin-bottom:12px;
}

.section-head p{
  color:rgba(255,255,255,.72);
  font-size:16px;
}

/* =========================
FLYING AREA
========================= */

.wish-cuucocanh{
  position:relative;

  width:100%;
  height:430px;

  overflow:hidden;

  border-radius:36px;

  background:
    linear-gradient(
      rgba(20,14,45,.72),
      rgba(8,5,18,.9)
    );

  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(10px);

  box-shadow:
    0 15px 40px rgba(124,58,237,.2);
}

/* =========================
FLYING WISH
========================= */

.flying-wish{
  position:absolute;

  bottom:-140px;

  min-width:190px;
  max-width:300px;

  padding:18px 24px;

  border-radius:999px;

  background:
    radial-gradient(circle at top,
    #fff,
    #f3e8ff 70%);

  border:2px solid rgba(255,255,255,.8);

  color:#2d1b45;

  box-shadow:
    0 10px 35px rgba(168,85,247,.35);

  animation-name:flyUp;
  animation-timing-function:linear;
  animation-fill-mode:forwards;

  overflow:hidden;
}

.flying-wish::before{
  content:"";

  position:absolute;

  width:45px;
  height:45px;

  border-radius:50%;

  background:#f3e8ff;

  top:-18px;
  left:20px;

  z-index:-1;
}

.flying-wish::after{
  content:"";

  position:absolute;

  width:28px;
  height:28px;

  border-radius:50%;

  background:#f3e8ff;

  top:-10px;
  right:20px;

  z-index:-1;
}

.flying-wish strong{
  display:block;

  color:#7c3aed;

  margin-bottom:6px;

  font-size:14px;
  font-weight:900;
}

.flying-wish span{
  font-size:14px;
  line-height:1.45;

  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;

  overflow:hidden;
  word-break:break-word;
}

@keyframes flyUp{

  0%{
    transform:
      translateY(0)
      scale(.7);

    opacity:0;
  }

  10%{
    opacity:1;
  }

  50%{
    transform:
      translateY(-350px)
      translateX(-20px)
      scale(1);
  }

  100%{
    transform:
      translateY(-850px)
      translateX(50px)
      scale(1.12);

    opacity:0;
  }

}

/* =========================
WALL
========================= */

.wall{
  margin-top:100px;
}

.wish-grid{
  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(420px,520px));

  justify-content:center;

  gap:40px;
}

/* =========================
SHEEP CARD
========================= */

.wish-card{
  position:relative;

  width:100%;
  max-width:520px;

  height:340px;

  background-image:url("./sheep.png");

  background-repeat:no-repeat;
  background-size:100% 100%;
  background-position:center;

  padding-top:72px;
  padding-left:165px;
  padding-right:90px;
  padding-bottom:55px;

  overflow:hidden;

  transition:.35s;

  display:flex;
  flex-direction:column;
}

.wish-card:hover{
  transform:translateY(-6px) scale(1.02);
}

.wish-card strong{
  color:#ff4545;

  font-size:22px;
  font-weight:900;

  margin-bottom:14px;

  text-align:center;

  width:100%;
}

.wish-card p{
  color:#2d1b45;

  font-size:20px;
  font-weight:800;

  line-height:1.42;

  white-space:normal;
  word-break:break-word;
  overflow-wrap:break-word;

  max-width:240px;

  display:-webkit-box;
  -webkit-line-clamp:6;
  -webkit-box-orient:vertical;

  overflow:hidden;
}

/* =========================
BUTTONS
========================= */

.floating-btn{
  position:fixed;

  right:24px;
  bottom:24px;

  z-index:999;

  border:none;
  cursor:pointer;

  padding:16px 28px;

  border-radius:999px;

  background:
    linear-gradient(
      135deg,
      #8b5cf6,
      #c084fc
    );

  color:white;

  font-size:15px;
  font-weight:800;

  font-family:'Inter',sans-serif;

  box-shadow:
    0 12px 35px rgba(124,58,237,.42);

  transition:.3s;
}

#musicBtn{
  position:fixed;

  left:24px;
  bottom:24px;

  z-index:999;

  width:58px;
  height:58px;

  border:none;
  border-radius:50%;

  background:
    linear-gradient(
      135deg,
      #8b5cf6,
      #c084fc
    );

  color:white;

  font-size:24px;

  cursor:pointer;
}

/* =========================
MODAL
========================= */

.modal{
  position:fixed;
  inset:0;

  z-index:9999;

  background:rgba(0,0,0,.72);

  display:none;

  align-items:center;
  justify-content:center;

  padding:20px;

  backdrop-filter:blur(8px);
}

.modal.active{
  display:flex;
}

.modal-box{
  width:min(520px,100%);

  background:rgba(14,10,30,.95);

  border-radius:30px;

  border:1px solid rgba(255,255,255,.08);

  padding:34px;

  position:relative;
}

.close{
  position:absolute;

  top:14px;
  right:18px;

  border:none;
  background:none;

  color:white;

  font-size:34px;

  cursor:pointer;
}

.modal-box h3{
  font-size:34px;
  margin-bottom:12px;

  font-weight:900;
}

.sub{
  color:rgba(255,255,255,.68);
  margin-bottom:24px;
}

.input-group{
  margin-bottom:18px;
}

.input-group label{
  display:block;
  margin-bottom:8px;
  font-size:14px;
}

.input-group input,
.input-group textarea{
  width:100%;

  border:none;
  outline:none;

  border-radius:18px;

  padding:16px 18px;

  background:rgba(255,255,255,.05);

  color:white;

  font-family:'Inter',sans-serif;
  font-size:15px;
}

.input-group textarea{
  resize:none;
}

.submit-btn{
  width:100%;

  border:none;
  cursor:pointer;

  padding:18px;

  border-radius:20px;

  background:
    linear-gradient(
      135deg,
      #8b5cf6,
      #c084fc
    );

  color:white;

  font-size:16px;
  font-weight:800;

  font-family:'Inter',sans-serif;
}

/* =========================
FOOTER
========================= */

.footer{
  margin-top:90px;

  text-align:center;

  color:rgba(255,255,255,.45);

  font-size:13px;
}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

  body{
    overflow-x:hidden;
  }

  .container{
    width:100%;
    padding-left:16px;
    padding-right:16px;
  }

  .hero{
    height:100svh;
    min-height:100svh;
  }

  .hero-inner{
    transform:translateY(-10px);
  }

  /* FIX CHỮ KHÔNG NHẢY */

  .hero h1{

    font-size:clamp(36px,9vw,52px);

    line-height:1.05;

    letter-spacing:0;

    margin-bottom:10px;

    white-space:nowrap;
  }

  .hero h2{

    font-size:clamp(22px,5vw,32px);

    line-height:1.1;

    margin-bottom:12px;

    white-space:nowrap;
  }

  .hero p{

    font-size:12px;

    letter-spacing:.5px;

    white-space:nowrap;
  }

  .section-head h2{
    font-size:22px;
  }

  .section-head p{
    font-size:12px;
  }

  .wish-cuucocanh{
    height:280px;
    border-radius:24px;
  }

  .wish-grid{
    grid-template-columns:1fr;
    gap:20px;
  }

  /* FIX CARD KHÔNG TRÀN */

  .wish-card{

    max-width:100%;

    height:240px;

    padding-top:50px;
    padding-left:108px;
    padding-right:48px;
    padding-bottom:38px;

    background-size:100% 100%;
  }

  .wish-card strong{

    font-size:13px;

    margin-bottom:8px;
  }

  .wish-card p{

    font-size:12px;

    line-height:1.38;

    max-width:140px;

    display:-webkit-box;
    -webkit-line-clamp:7;
    -webkit-box-orient:vertical;

    overflow:hidden;

    word-break:break-word;
  }

  .floating-btn{

    right:14px;
    bottom:14px;

    padding:12px 16px;

    font-size:11px;
  }

  #musicBtn{

    width:46px;
    height:46px;

    left:14px;
    bottom:14px;

    font-size:18px;
  }

  .modal-box{
    padding:24px;
  }

  .modal-box h3{
    font-size:26px;
  }

}

</style>
</head>
