<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

  <title>CAPTAIN BOY • TINH HÀ SAY HI</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary:#7c3aed;
      --primary2:#a78bfa;
      --bg:#060510;
      --text:#f5f3ff;
      --muted:rgba(255,255,255,.7);
    }

    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow-x:hidden;
    }

    /* ===== BACKGROUND ===== */
    .bg{
      position:fixed;
      inset:0;
      z-index:-5;
      background:
        radial-gradient(circle at top,#7c3aed33,transparent 40%),
        radial-gradient(circle at bottom,#a78bfa22,transparent 40%),
        url("./nền.png");
      background-size:cover;
      background-position:center;
    }

    /* ===== STARS ===== */
    .stars{
      position:fixed;
      inset:0;
      z-index:-4;
      background:transparent;
      overflow:hidden;
    }

    .stars span{
      position:absolute;
      width:3px;
      height:3px;
      background:white;
      border-radius:50%;
      opacity:.6;
      animation:fall linear infinite;
    }

    @keyframes fall{
      0%{transform:translateY(-10vh);opacity:0}
      10%{opacity:1}
      100%{transform:translateY(110vh);opacity:0}
    }

    /* ===== CLOUDS ===== */
    .cloud{
      position:fixed;
      width:180px;
      height:60px;
      background:rgba(255,255,255,.08);
      border-radius:50px;
      filter:blur(1px);
      z-index:-3;
      animation:float 20s infinite linear;
    }

    .cloud:before,
    .cloud:after{
      content:"";
      position:absolute;
      background:rgba(255,255,255,.08);
      border-radius:50%;
    }

    .cloud:before{width:70px;height:70px;left:20px;top:-30px}
    .cloud:after{width:90px;height:90px;right:20px;top:-40px}

    @keyframes float{
      0%{transform:translateX(-200px)}
      100%{transform:translateX(120vw)}
    }

    /* ===== CONTAINER ===== */
    .container{
      width:100%;
      max-width:1180px;
      margin:auto;
      padding:20px;
    }

    /* ===== HERO ===== */
    .hero{
      text-align:center;
      padding:80px 10px 40px;
    }

    h1{
      font-size:clamp(32px,6vw,110px);
      font-weight:900;
      white-space:nowrap;   /* KHÔNG XUỐNG DÒNG */
      overflow:hidden;
    }

    h2{
      font-size:clamp(22px,4vw,50px);
      font-weight:900;
    }

    /* ===== WALL ===== */
    .wish-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:20px;
      margin-top:30px;
    }

    /* ===== SHEEP CARD FIX ===== */
    .wish-card{
      position:relative;
      height:260px; /* nhỏ lại */
      background:url("./sheep.png") no-repeat center/100% 100%;
      padding:60px 70px 40px 120px;
      overflow:hidden;
    }

    .wish-card strong{
      font-size:14px;
      color:#ff3b3b;
      font-weight:900;
      text-align:center;
      display:block;
      white-space:nowrap;
    }

    .wish-card p{
      font-size:14px; /* nhỏ lại để không tràn */
      color:#222;
      font-weight:600;
      max-width:100%;
      overflow:hidden;
      display:-webkit-box;
      -webkit-line-clamp:4;
      -webkit-box-orient:vertical;
    }

    /* ===== CUU CO CANH ===== */
    .wish-cuucocanh{
      height:380px;
      border-radius:30px;
      position:relative;
      overflow:hidden;
      background:linear-gradient(#1a1440,#0b0818);
    }

    .flying-wish{
      position:absolute;
      bottom:-120px;
      padding:12px 18px;
      border-radius:999px;
      background:white;
      animation:flyUp linear forwards;
    }

    @keyframes flyUp{
      0%{transform:translateY(0);opacity:0}
      10%{opacity:1}
      100%{transform:translateY(-700px);opacity:0}
    }

    /* ===== MOBILE FIX ===== */
    @media(max-width:768px){
      h1{font-size:28px !important;white-space:nowrap}
      .wish-card{height:220px}
    }

    /* ===== BUTTON ===== */
    .floating-btn{
      position:fixed;
      right:20px;
      bottom:20px;
      padding:14px 20px;
      border-radius:999px;
      background:linear-gradient(135deg,#8b5cf6,#c084fc);
      color:white;
      font-weight:800;
      border:none;
      z-index:1000;
    }

  </style>
</head>

<body>

<div class="bg"></div>

<!-- STARS -->
<div class="stars" id="stars"></div>

<!-- CLOUDS -->
<div class="cloud" style="top:10%;animation-duration:25s"></div>
<div class="cloud" style="top:30%;animation-duration:35s"></div>
<div class="cloud" style="top:60%;animation-duration:30s"></div>

<div class="container">

  <section class="hero">
    <h1>CAPTAIN BOY</h1>
    <h2>WISHING WALL ✦ TINH HÀ SAY HI</h2>
  </section>

  <section class="wish-cuucocanh" id="wishCuucocanh"></section>

  <section class="wish-grid" id="wishGrid"></section>

</div>

<button class="floating-btn">GỬI LỜI CHÚC</button>

<script>
/* ===== STAR GENERATION ===== */
const stars = document.getElementById("stars");
for(let i=0;i<60;i++){
  const s=document.createElement("span");
  s.style.left=Math.random()*100+"%";
  s.style.animationDuration=(2+Math.random()*5)+"s";
  s.style.opacity=Math.random();
  stars.appendChild(s);
}

/* ===== MOCK RENDER (GIỮ LOGIC CŨ) ===== */
const listApproved=[
  {name:"Cừu 1",message:"Chúc CAPTAIN BOY luôn tỏa sáng ✨"},
  {name:"Cừu 2",message:"Luôn hạnh phúc và thành công 💜"}
];

function render(){
  document.getElementById("wishGrid").innerHTML =
  listApproved.map(i=>`
    <div class="wish-card">
      <strong>From: ${i.name}</strong>
      <p>${i.message}</p>
    </div>
  `).join("");
}
render();
</script>

</body>
</html>
