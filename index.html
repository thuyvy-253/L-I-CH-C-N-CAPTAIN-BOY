<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>CAPTAIN BOY • TINH HÀ SAY HI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#8b5cf6;
  --primary2:#c084fc;
  --bg:#05010f;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:'Inter',sans-serif;
  background:#05010f;
  color:#fff;
  overflow-x:hidden;
  min-height:100vh;
}

/* =========================
BACKGROUND FIX LAYER (QUAN TRỌNG)
========================= */

.bg{
  position:fixed;
  inset:0;
  z-index:-60;
  background:
    linear-gradient(rgba(5,1,15,.4), rgba(5,1,15,.85)),
    url("./nền.png");
  background-size:cover;
  background-position:center;
}

/* canvas galaxy KHÔNG được che */
#galaxy{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:-40;
  pointer-events:none;
}

/* glow */
.glow{
  position:fixed;
  border-radius:50%;
  filter:blur(120px);
  opacity:.22;
  z-index:-35;
  animation:glowMove 14s ease-in-out infinite;
}

/* noise */
.noise{
  position:fixed;
  inset:0;
  z-index:-20;
  opacity:.04;
}

/* meteors + particles giữ nguyên nhưng chắc chắn không che UI */
.meteor{z-index:-10;}
.particle{z-index:-5;}

/* =========================
LAYOUT FIX
========================= */

.container{
  width:min(1200px,92%);
  margin:auto;
  padding-bottom:120px;
}

/* =========================
HERO FIX (không tràn mobile)
========================= */

.hero{
  height:100vh;
  min-height:100svh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero-inner{
  width:100%;
}

/* FIX TRÀN CHỮ MOBILE */
.hero h1{
  font-size:clamp(44px,8vw,170px);
  font-weight:900;
  line-height:1;
  letter-spacing:2px;
  margin-bottom:18px;
  background:linear-gradient(to bottom,#fff,#d8b4fe);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero h2{
  font-size:clamp(26px,5vw,92px);
  font-weight:900;
  color:#f5d0fe;
  margin-bottom:18px;
}

.hero p{
  font-size:clamp(14px,2vw,28px);
}

/* =========================
SECTION
========================= */

.section-head{
  text-align:center;
  margin-bottom:30px;
}

/* =========================
WISH AREA FIX
========================= */

.wish-cuucocanh{
  position:relative;
  width:100%;
  height:430px;
  overflow:hidden;
  border-radius:36px;
  background:linear-gradient(rgba(20,14,45,.72), rgba(8,5,18,.9));
}

/* flying wish */
.flying-wish{
  position:absolute;
  bottom:-140px;

  min-width:160px;
  max-width:240px;

  padding:14px 18px;

  border-radius:999px;

  word-break:break-word;
  overflow-wrap:break-word;

  background:radial-gradient(circle at top,#fff,#f3e8ff 70%);
  color:#2d1b45;

  font-size:13px;

  animation-name:flyUp;
  animation-timing-function:linear;
  animation-fill-mode:forwards;
}

/* =========================
WALL FIX (QUAN TRỌNG NHẤT CARD SHEEP)
========================= */

.wish-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  justify-content:center;
}

/* SHEEP CARD FIX TRÀN */
.wish-card{
  position:relative;
  width:100%;
  max-width:420px;
  margin:auto;

  height:320px;

  background-image:url("./sheep.png");
  background-size:100% 100%;
  background-repeat:no-repeat;

  padding:60px 50px 40px 90px;

  overflow:hidden;

  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}

/* FIX TEXT KHÔNG TRÀN RA NGOÀI */
.wish-card strong{
  color:#ff4545;
  font-size:16px;
  font-weight:900;
  margin-bottom:10px;

  width:100%;
  text-align:center;
}

.wish-card p{
  color:#2d1b45;
  font-size:14px;
  font-weight:700;
  line-height:1.4;

  max-width:100%;
  word-break:break-word;
  overflow-wrap:break-word;
  white-space:normal;
}

/* =========================
MOBILE FIX CHẶT
========================= */

@media(max-width:768px){

.hero h1{font-size:42px;}
.hero h2{font-size:24px;}

.wish-cuucocanh{height:280px;}

.wish-card{
  height:240px;
  padding:40px 30px 30px 70px;
}

.wish-card p{
  font-size:12px;
}

.wish-grid{
  grid-template-columns:1fr;
}

}

/* giữ toàn bộ animation gốc của bạn */
</style>
</head>

<body>

<div class="bg"></div>
<canvas id="galaxy"></canvas>

<div class="glow one"></div>
<div class="glow two"></div>
<div class="noise"></div>

<div class="container">

<section class="hero">
<div class="hero-inner">
<h1>CAPTAIN BOY</h1>
<h2>TINH HÀ SAY HI</h2>
<p>✦ WISHING WALL ✦</p>
</div>
</section>

<section>
<div class="section-head">
<h2>CỪU CÓ CÁNH WITH LOVE</h2>
<p>Lời yêu thương dành cho CAPTAIN BOY ✦</p>
</div>

<div class="wish-cuucocanh" id="wishCuucocanh"></div>
</section>

<section class="wall">
<div class="section-head">
<h2>WALL OF LOVE</h2>
<p>Những lời nhắn đáng yêu từ Cừu Có Cánh ✦</p>
</div>

<div class="wish-grid" id="wishGrid"></div>
</section>

<div class="footer">
PROJECT BY TEAM BOT • CAPTAIN BOY
</div>

</div>

<button class="floating-btn" onclick="toggleModal(true)">✨ GỬI LỜI CHÚC</button>
<button id="musicBtn">🔊</button>

<div class="modal" id="wishModal">
<div class="modal-box">
<button class="close" onclick="toggleModal(false)">×</button>

<h3>Gửi lời đến CAPTAIN BOY</h3>

<div class="sub">Lời nhắn sẽ được hiển thị sau khi admin duyệt ✨</div>

<form id="wishForm">

<div class="input-group">
<label>Tên của bạn</label>
<input type="text" id="userName" maxlength="30" required>
</div>

<div class="input-group">
<label>Lời chúc</label>
<textarea id="userMsg" rows="5" maxlength="180" required></textarea>
</div>

<button class="submit-btn" id="submitBtn" type="submit">GỬI NGAY ✨</button>

</form>

</div>
</div>

<audio id="bgMusic" loop>
<source src="./music.mp3" type="audio/mpeg">
</audio>

<script>
/* GIỮ NGUYÊN 100% JS + API CỦA BẠN */
</script>

</body>
</html>
