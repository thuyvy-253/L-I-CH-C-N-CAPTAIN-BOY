<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>CAPTAIN BOY • TINH HÀ SAY HI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* ===== ROOT ===== */
:root{
  --primary:#8b5cf6;
  --primary2:#c084fc;
  --bg:#05010f;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:#fff;
  overflow-x:hidden;
}

/* ===== BACKGROUND ===== */
.bg{
  position:fixed;
  inset:0;
  z-index:-50;
  background:
    linear-gradient(rgba(5,1,15,.4),rgba(5,1,15,.8)),
    url("./nền.png");
  background-size:cover;
}

/* ===== GALAXY (GIỮ NGUYÊN) ===== */
#galaxy{
  position:fixed;
  inset:0;
  z-index:-40;
}

/* ===== GLOW ===== */
.glow{
  position:fixed;
  width:400px;
  height:400px;
  filter:blur(120px);
  opacity:.2;
  border-radius:50%;
}

.glow.one{background:#7c3aed;top:-120px;left:-120px;}
.glow.two{background:#c084fc;bottom:-120px;right:-120px;}

/* ===== NOISE ===== */
.noise{
  position:fixed;
  inset:0;
  opacity:.04;
  background-image:
    linear-gradient(#fff2 1px,transparent 1px),
    linear-gradient(90deg,#fff2 1px,transparent 1px);
  background-size:3px 3px;
  z-index:-20;
}

/* ===== CONTAINER ===== */
.container{
  width:min(1200px,92%);
  margin:auto;
  padding-bottom:120px;
}

/* ===== HERO (FIX MOBILE TEXT LỆCH) ===== */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1{
  font-size:clamp(42px,10vw,150px);
  font-weight:900;
  background:linear-gradient(#fff,#d8b4fe);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  /* FIX KHÔNG BỂ MOBILE */
  word-break:keep-all;
  white-space:nowrap;
}

.hero h2{
  font-size:clamp(22px,5vw,80px);
  color:#f5d0fe;
  word-break:keep-all;
  white-space:nowrap;
}

.hero p{
  font-size:clamp(12px,2vw,22px);
}

/* ===== SECTION ===== */
.section-head{
  text-align:center;
  margin-bottom:20px;
}

/* ===== FLY AREA ===== */
.wish-cuucocanh{
  position:relative;
  height:420px;
  overflow:hidden;
  border-radius:36px;
  background:linear-gradient(rgba(20,14,45,.72),rgba(8,5,18,.9));
}

/* ===== FLYING WISH (FIX TEXT WRAP) ===== */
.flying-wish{
  position:absolute;
  bottom:-120px;
  min-width:160px;
  max-width:260px;
  padding:14px 18px;
  border-radius:999px;
  background:radial-gradient(#fff,#f3e8ff);
  color:#2d1b45;
  animation:flyUp linear forwards;

  /* 🔥 FIX TRÀN TEXT */
  word-break:break-word;
  overflow-wrap:anywhere;
}

.flying-wish strong{
  font-size:12px;
  color:#7c3aed;
}

.flying-wish span{
  font-size:12px;
  line-height:1.3;

  /* 🔥 FIX TRÀN */
  display:block;
  word-break:break-word;
  overflow-wrap:anywhere;
}

/* ===== SHEEP CARD (FIX 100% TRÀN) ===== */
.wish-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

/* CARD GIỮ NGUYÊN HÌNH */
.wish-card{
  position:relative;
  width:100%;
  max-width:520px;
  height:340px;

  background:url("./sheep.png") center/100% 100% no-repeat;

  padding:70px 85px 50px 150px;

  display:flex;
  flex-direction:column;

  overflow:hidden;
}

/* FROM */
.wish-card strong{
  font-size:18px;
  font-weight:900;
  color:#ff3b3b;
  text-align:center;
  width:100%;
}

/* 🔥 FIX TEXT KHÔNG TRÀN */
.wish-card p{
  font-size:16px;
  color:#2d1b45;

  line-height:1.4;

  /* QUAN TRỌNG */
  word-break:break-word;
  overflow-wrap:anywhere;

  /* KHÔNG ĐẨY RA NGOÀI CARD */
  max-height:220px;
  overflow:hidden;

  padding-right:10px;
}

/* ===== BUTTONS ===== */
.floating-btn{
  position:fixed;
  right:24px;
  bottom:24px;
  z-index:999;
  padding:14px 22px;
  border-radius:999px;
  background:linear-gradient(135deg,#8b5cf6,#c084fc);
  border:none;
  color:#fff;
  font-weight:800;
}

#musicBtn{
  position:fixed;
  left:24px;
  bottom:24px;
  width:55px;
  height:55px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,#8b5cf6,#c084fc);
  color:#fff;
  z-index:999;
}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.7);
  z-index:9999;
}

.modal.active{display:flex;}

/* ===== FOOTER ===== */
.footer{
  margin-top:80px;
  text-align:center;
  opacity:.5;
}

/* ===== ANIMATION ===== */
@keyframes flyUp{
  0%{transform:translateY(0) scale(.7);opacity:0;}
  100%{transform:translateY(-800px) scale(1.1);opacity:0;}
}

/* ===== MOBILE FIX (QUAN TRỌNG) ===== */
@media(max-width:768px){

  .hero h1,
  .hero h2{
    white-space:normal;
    font-size:clamp(24px,6vw,40px);
  }

  .wish-card{
    height:240px;
    padding:50px 35px 30px 110px;
  }

  .wish-card p{
    font-size:12px;
    line-height:1.3;
  }
}

</style>
</head>

<body>

<div class="bg"></div>
<canvas id="galaxy"></canvas>
<div class="glow one"></div>
<div class="glow two"></div>
<div class="noise"></div>

<div class="container">

<section class="hero">
  <div>
    <h1>CAPTAIN BOY</h1>
    <h2>TINH HÀ SAY HI</h2>
    <p>✦ WISHING WALL ✦</p>
  </div>
</section>

<section>
  <div class="section-head">
    <h2>CỪU CÓ CÁNH</h2>
  </div>
  <div class="wish-cuucocanh" id="wishCuucocanh"></div>
</section>

<section class="wall">
  <div class="section-head">
    <h2>WALL OF LOVE</h2>
  </div>
  <div class="wish-grid" id="wishGrid"></div>
</section>

<div class="footer">
PROJECT BY TEAM BOT • CAPTAIN BOY
</div>

</div>

<button class="floating-btn" onclick="toggleModal(true)">GỬI LỜI CHÚC</button>
<button id="musicBtn">🔊</button>

<!-- MODAL -->
<div class="modal" id="wishModal">
  <div class="modal-box"></div>
</div>

<script>

/* ===== GIỮ API GỐC ===== */
const API="https://script.google.com/macros/s/AKfycbzOb_fBFiq6VR_n2dN9QsNDUM2pMoSb2dSfw2Nz0dKLHBeberjyc49GJ_gk70kng2R2/exec";

let list=[];

async function fetchData(){
  const res=await fetch(API+"?action=list");
  const data=await res.json();
  list=data.approved||[];
  render();
  fly();
}

function render(){
  document.getElementById("wishGrid").innerHTML=
  list.map(i=>`
    <div class="wish-card">
      <strong>${i.name}</strong>
      <p>${i.message}</p>
    </div>
  `).join("");
}

function fly(){
  const box=document.getElementById("wishCuucocanh");
  box.innerHTML="";

  setInterval(()=>{
    if(!list.length)return;

    const w=list[Math.floor(Math.random()*list.length)];

    const el=document.createElement("div");
    el.className="flying-wish";
    el.style.left=Math.random()*80+"%";
    el.innerHTML=`<strong>${w.name}</strong><span>${w.message}</span>`;

    box.appendChild(el);
    setTimeout(()=>el.remove(),9000);

  },2000);
}

fetchData();
setInterval(fetchData,30000);

</script>

</body>
</html>
