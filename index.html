<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
    <title>CAPTAIN BOY • TINH HÀ SAY HI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #d8b4fe;
            --bg: #05030d;
            --text: #ffffff;
            --card-text: #1a1a1a;
            --accent: #ff3b3b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.4;
        }

        input, textarea, button { font-family: 'Inter', sans-serif !important; }

        /* --- UNIVERSE & FALLING GALAXY --- */
        .universe-bg {
            position: fixed; inset: 0; z-index: -10;
            background: radial-gradient(circle at center, #1e1450 0%, #05030d 100%);
        }

        .nebula {
            position: absolute; inset: 0;
            background: url("./nền.png") center/cover no-repeat;
            opacity: 0.4; filter: blur(2px);
        }

        /* Hiệu ứng tinh hà rơi */
        .falling-star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 5px #fff;
            animation: fall var(--d) linear infinite;
            pointer-events: none;
        }

        @keyframes fall {
            from { transform: translateY(-10vh); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            to { transform: translateY(110vh); opacity: 0; }
        }

        .star {
            position: absolute; background: #fff; border-radius: 50%;
            animation: twinkle var(--t) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* --- HERO --- */
        .hero {
            padding: 50px 20px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(28px, 7vw, 70px);
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--primary-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .hero .sub-bottom {
            font-size: clamp(9px, 3.2vw, 16px);
            letter-spacing: 1px; font-weight: 700;
            white-space: nowrap; margin-top: 5px;
        }

        /* --- PYRAMID ZONE (FIX LỖI CHE CHỮ) --- */
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 10px; }

        .pyramid-box {
            position: relative; width: 100%; height: 250px;
            margin: 20px 0; overflow: hidden;
            background: rgba(255,255,255,0.03);
            border-bottom: 2px solid var(--primary-light);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            backdrop-filter: blur(5px);
        }

        .fly-msg {
            position: absolute; background: rgba(255, 255, 255, 0.9);
            padding: 5px 10px; border-radius: 10px;
            color: #111; font-size: 9px; font-weight: 700;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            max-width: 120px;
            animation: pyramidFly var(--duration) linear infinite;
        }

        @keyframes pyramidFly {
            0% { bottom: -30px; left: var(--startX); transform: scale(0.9); opacity: 0; }
            10% { opacity: 1; }
            100% { bottom: 280px; left: 50%; transform: scale(0.3); opacity: 0; }
        }

        /* --- GRID WALL (FIX CHUẨN 2 CỘT MOBILE) --- */
        .grid-wall {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Ép 2 cột mobile */
            gap: 15px; padding-bottom: 120px;
        }

        @media (min-width: 768px) {
            .grid-wall { grid-template-columns: repeat(4, 1fr); gap: 30px; }
        }

        /* SHEEP CARD HOÀN HẢO */
        .sheep-card {
            position: relative; width: 100%; aspect-ratio: 1.1 / 1;
            background: url("./sheep.png") center/contain no-repeat;
            display: flex; align-items: center; justify-content: center;
        }

        .card-inner {
            position: absolute;
            width: 65%; height: 50%; /* Khu vực bụng cừu chuẩn */
            top: 28%; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column;
            text-align: center; padding: 5px;
            /* Cuộn nếu lời nhắn quá dài */
            overflow-y: auto; scrollbar-width: none;
        }
        .card-inner::-webkit-scrollbar { display: none; }

        .card-inner b {
            color: var(--accent); font-size: clamp(9px, 2.5vw, 12px);
            margin-bottom: 2px; font-weight: 900;
            position: sticky; top: 0; background: transparent;
        }

        .card-inner span {
            color: var(--card-text); font-weight: 700;
            line-height: 1.2; word-break: break-word;
            font-size: clamp(8.5px, 2.2vw, 11px);
        }

        /* --- CONTROLS --- */
        .btn-float {
            position: fixed; right: 15px; bottom: 25px;
            padding: 12px 20px; background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none; border-radius: 50px; color: #fff; font-weight: 800; font-size: 13px;
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5); z-index: 100;
        }

        #musicBtn {
            position: fixed; left: 15px; bottom: 25px;
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; z-index: 100;
        }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center;
            padding: 20px; z-index: 1000; backdrop-filter: blur(10px);
        }
        .modal.active { display: flex; }
        .modal-box {
            background: #111026; width: 100%; max-width: 450px;
            padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
        }

        .input-box {
            width: 100%; padding: 14px; margin: 10px 0;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #fff; font-size: 16px;
        }

        footer { text-align: center; padding: 40px; font-size: 10px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="universe-bg">
        <div class="nebula"></div>
        <div id="galaxyRain"></div>
        <div id="starField"></div>
    </div>

    <header class="hero">
        <div style="font-size:8px; letter-spacing:4px; opacity:0.7; margin-bottom:5px">THE RETURN OF</div>
        <h1>CAPTAIN BOY</h1>
        <div class="sub-bottom">✦ CAPTAIN BOY - TINH HÀ SAY HI ✦</div>
    </header>

    <div class="container">
        <div style="text-align:center; font-weight:900; color:var(--primary-light); font-size:16px; margin-top:20px">CỪU CÓ CÁNH WITH LOVE</div>
        <div class="pyramid-box" id="pyramidZone"></div>

        <section>
            <div style="text-align: center; margin: 30px 0 20px;">
                <h2 style="font-size: 24px; font-weight: 900;">WALL OF LOVE</h2>
                <p style="opacity: 0.6; font-size: 11px;">Mỗi thẻ cừu là một trái tim ✦</p>
            </div>
            <div class="grid-wall" id="wishGrid"></div>
        </section>

        <footer id="footerText">PROJECT BY: TEAM BOT - NHỮNG CON BOT CỦA CAPTAIN BOY</footer>
    </div>

    <button class="btn-float" onclick="setModal(true)">+ GỬI LỜI CHÚC</button>
    <button id="musicBtn">🔊</button>

    <div class="modal" id="wishModal">
        <div class="modal-box">
            <h2 style="margin-bottom:15px; font-weight:900">Gửi lời chúc ✨</h2>
            <form id="wishForm">
                <input type="text" id="uName" class="input-box" placeholder="Tên của bạn..." required maxlength="25">
                <textarea id="uMsg" class="input-box" rows="5" placeholder="Nhập lời chúc..." required maxlength="1000"></textarea>
                <button type="submit" id="sendBtn" style="width:100%; padding:16px; background:var(--primary); border:none; border-radius:12px; color:#fff; font-weight:900; cursor:pointer">GỬI NGAY ✨</button>
                <button type="button" onclick="setModal(false)" style="width:100%; background:none; border:none; color:#666; margin-top:15px">Đóng</button>
            </form>
        </div>
    </div>

    <audio id="bgm" loop src="./music.mp3"></audio>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzOb_fBFiq6VR_n2dN9QsNDUM2pMoSb2dSfw2Nz0dKLHBeberjyc49GJ_gk70kng2R2/exec";

        // 1. Hiệu ứng Tinh hà rơi (Galaxy Rain)
        const rainField = document.getElementById("galaxyRain");
        for(let i=0; i<50; i++){
            const p = document.createElement("div"); p.className = "falling-star";
            const sz = Math.random() * 2.5 + 0.5;
            p.style.width = p.style.height = sz + "px";
            p.style.left = Math.random() * 100 + "%";
            p.style.setProperty('--d', (Math.random() * 5 + 5) + "s");
            p.style.animationDelay = Math.random() * 5 + "s";
            rainField.appendChild(p);
        }

        // 2. Sao lấp lánh cố định
        const sf = document.getElementById("starField");
        for(let i=0; i<80; i++){
            const s = document.createElement("div"); s.className = "star";
            s.style.width = s.style.height = (Math.random()*2+1) + "px";
            s.style.left = Math.random()*100 + "%"; s.style.top = Math.random()*100 + "%";
            s.style.setProperty('--t', (Math.random()*3+2) + "s");
            sf.appendChild(s);
        }

        // 3. Tải Dữ Liệu
        async function load() {
            try {
                const r = await fetch(API + "?action=list");
                const d = await r.json();
                if(d.approved) {
                    renderGrid(d.approved);
                    renderPyramid(d.approved);
                }
            } catch(e) {}
        }

        function renderGrid(list) {
            const grid = document.getElementById("wishGrid");
            grid.innerHTML = list.slice().reverse().map(i => `
                <div class="sheep-card">
                    <div class="card-inner">
                        <b>From: ${esc(i.name)}</b>
                        <span>${esc(i.message)}</span>
                    </div>
                </div>
            `).join("");
        }

        function renderPyramid(list) {
            const pZone = document.getElementById("pyramidZone");
            pZone.innerHTML = "";
            setInterval(() => {
                const i = list[Math.floor(Math.random()*list.length)];
                const w = document.createElement("div");
                w.className = "fly-msg";
                w.style.setProperty('--startX', (Math.random() * 60 + 20) + "%");
                w.style.setProperty('--duration', (Math.random() * 4 + 6) + "s");
                w.innerText = esc(i.name) + ": " + (i.message.length > 40 ? i.message.substring(0, 40) + "..." : i.message);
                pZone.appendChild(w);
                setTimeout(() => w.remove(), 10000);
            }, 3000);
        }

        document.getElementById("wishForm").onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById("sendBtn");
            const name = document.getElementById("uName").value.trim();
            const message = document.getElementById("uMsg").value.trim();
            btn.innerText = "ĐANG GỬI..."; btn.disabled = true;
            try {
                await fetch(API, { method:"POST", body: JSON.stringify({action:"submit", name, message, id: Date.now()}) });
                alert("Gửi thành công! ✨");
                setModal(false); location.reload();
            } catch(e) { alert("Lỗi!"); btn.disabled = false; btn.innerText = "GỬI NGAY ✨"; }
        };

        function setModal(s) { document.getElementById("wishModal").classList.toggle("active", s); }
        function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        
        const bgm = document.getElementById("bgm");
        document.getElementById("musicBtn").onclick = () => {
            if(bgm.paused) { bgm.play(); } else { bgm.pause(); }
        };

        load();
    </script>
</body>
</html>
