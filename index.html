<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>CAPTAIN BOY • TINH HÀ SAY HI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #7c3aed;
    --primary-light: #c084fc;
    --bg: #05030d;
    --text: #ffffff;
    --muted: rgba(255, 255, 255, 0.7);
    --glass: rgba(255, 255, 255, 0.05);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    line-height: 1.6;
}

/* --- BACKGROUND ANIMATION --- */
.bg-fixed {
    position: fixed;
    inset: 0;
    z-index: -10;
    background: radial-gradient(circle at center, #1a1635 0%, #05030d 100%);
}

.bg-image {
    position: absolute;
    inset: 0;
    background: url("./nền.png") center/cover no-repeat;
    opacity: 0.5;
}

.star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    animation: twinkle var(--d) infinite ease-in-out;
}

@keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
}

/* --- CONTAINER --- */
.container {
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 16px;
}

/* --- HERO SECTION --- */
.hero {
    padding: 60px 0 40px;
    text-align: center;
}

.hero h1 {
    font-size: clamp(38px, 12vw, 90px);
    font-weight: 900;
    background: linear-gradient(to bottom, #fff, var(--primary-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 15px rgba(124, 58, 237, 0.4));
}

.hero p {
    font-size: clamp(14px, 4vw, 20px);
    letter-spacing: 2px;
    color: #d8b4fe;
    font-weight: 600;
}

/* --- FLYING ZONE --- */
.flying-wrapper {
    margin: 40px 0;
    text-align: center;
}

.flying-zone {
    position: relative;
    width: 100%;
    height: 350px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 30px;
    overflow: hidden;
    backdrop-filter: blur(10px);
}

.flying-item {
    position: absolute;
    bottom: -100px;
    padding: 12px 20px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 50px;
    color: #1e1b4b;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    white-space: nowrap;
    display: flex;
    flex-direction: column;
    animation: floatUp linear forwards;
    z-index: 5;
}

.flying-item b { color: var(--primary); font-size: 11px; text-transform: uppercase; }
.flying-item span { font-size: 13px; font-weight: 600; }

@keyframes floatUp {
    0% { transform: translateY(0) scale(0.8); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-500px) scale(1.1); opacity: 0; }
}

/* --- WALL OF LOVE (GRID) --- */
.section-title {
    text-align: center;
    margin: 60px 0 30px;
}

.section-title h2 {
    font-size: clamp(24px, 6vw, 40px);
    margin-bottom: 8px;
}

.wish-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 25px;
    padding-bottom: 120px;
}

/* --- THE SHEEP CARD - FIXED FOR MOBILE --- */
.sheep-card {
    position: relative;
    width: 100%;
    aspect-ratio: 1.1 / 1; /* Giữ tỷ lệ con cừu chuẩn */
    background: url("./sheep.png") center/contain no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
    animation: sheepFloat 4s infinite ease-in-out;
}

@keyframes sheepFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* Vùng chứa chữ trong bụng con cừu - Cực kỳ quan trọng */
.card-body {
    position: absolute;
    width: 58%; /* Giới hạn chữ trong phần mây trắng */
    height: 50%;
    top: 28%; /* Căn giữa theo chiều dọc bụng cừu */
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    padding: 5px;
}

.card-name {
    color: #ff4757;
    font-weight: 900;
    font-size: clamp(12px, 3vw, 15px);
    margin-bottom: 4px;
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.card-text {
    color: #2f3542;
    font-weight: 700;
    font-size: clamp(11px, 2.8vw, 13px);
    line-height: 1.3;
    width: 100%;
    display: -webkit-box;
    -webkit-line-clamp: 6; /* Giới hạn tối đa 6 dòng tránh tràn */
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* --- BUTTONS & CONTROLS --- */
.btn-float {
    position: fixed;
    right: 20px;
    bottom: 30px;
    padding: 16px 28px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    border: none;
    border-radius: 50px;
    color: white;
    font-weight: 800;
    font-size: 15px;
    box-shadow: 0 10px 30px rgba(124, 58, 237, 0.5);
    z-index: 100;
    cursor: pointer;
}

#musicBtn {
    position: fixed;
    left: 20px;
    bottom: 30px;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    backdrop-filter: blur(10px);
    z-index: 100;
    cursor: pointer;
    font-size: 20px;
}

/* --- MODAL --- */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 1000;
}

.modal.active { display: flex; }

.modal-box {
    background: #111026;
    width: 100%;
    max-width: 480px;
    padding: 30px;
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.1);
    position: relative;
    animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes modalPop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

.modal-close {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 30px;
    color: white;
    background: none;
    border: none;
    cursor: pointer;
}

.form-input {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 15px;
    color: white;
    font-family: inherit;
    outline: none;
}

.form-input:focus { border-color: var(--primary-light); }

.submit-btn {
    width: 100%;
    padding: 16px;
    margin-top: 20px;
    background: var(--primary);
    border: none;
    border-radius: 15px;
    color: white;
    font-weight: 800;
    cursor: pointer;
}

footer {
    text-align: center;
    padding: 40px 10px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
}

/* --- MOBILE OPTIMIZATION --- */
@media (max-width: 500px) {
    .wish-grid {
        grid-template-columns: 1fr; /* 1 Cột trên điện thoại để nhìn cừu to rõ */
        gap: 15px;
    }
    .container { padding: 0 20px; }
    .hero { padding: 40px 0 20px; }
    .flying-zone { height: 300px; }
    .btn-float { padding: 12px 20px; font-size: 13px; }
}
</style>
</head>
<body>

    <div class="bg-fixed">
        <div class="bg-image"></div>
        <div id="starField"></div>
    </div>

    <div class="container">
        <header class="hero">
            <h1>CAPTAIN BOY</h1>
            <p>✦ TINH HÀ SAY HI ✦</p>
        </header>

        <section class="flying-wrapper">
            <div class="section-title">
                <h2>CỪU CÓ CÁNH WITH LOVE</h2>
                <p style="font-size:13px; opacity:0.7">Lời nhắn đang bay đến hành tinh của Captain...</p>
            </div>
            <div class="flying-zone" id="flyingZone">
                <div style="height:100%; display:flex; align-items:center; justify-content:center; opacity:0.3">
                    Đang tìm những lời chúc...
                </div>
            </div>
        </section>

        <section>
            <div class="section-title">
                <h2>WALL OF LOVE</h2>
                <p style="font-size:13px; opacity:0.7">Kho tàng tình yêu từ gia đình Cừu</p>
            </div>
            <div class="wish-grid" id="wishGrid">
                <!-- Thẻ cừu sẽ hiện ở đây -->
            </div>
        </section>

        <footer>
            PROJECT BY: TEAM BOT - NHỮNG CON BOT CỦA CAPTAIN BOY
        </footer>
    </div>

    <button class="btn-float" onclick="toggleModal(true)">+ GỬI LỜI CHÚC</button>
    <button id="musicBtn">🔊</button>

    <div class="modal" id="wishModal">
        <div class="modal-box">
            <button class="modal-close" onclick="toggleModal(false)">&times;</button>
            <h2 style="margin-bottom:5px">Gửi lời chúc</h2>
            <p style="font-size:13px; color:var(--muted); margin-bottom:20px">Lời nhắn của bạn sẽ được hiển thị sau khi duyệt.</p>
            
            <form id="wishForm">
                <div style="margin-bottom:15px">
                    <label style="font-size:14px; font-weight:600">Tên của bạn</label>
                    <input type="text" id="userName" class="form-input" placeholder="Nhập tên..." required maxlength="25">
                </div>
                <div>
                    <label style="font-size:14px; font-weight:600">Lời chúc dành cho Captain</label>
                    <textarea id="userMsg" class="form-input" rows="4" placeholder="Nhập lời nhắn..." required maxlength="150"></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">GỬI NGAY ✨</button>
            </form>
        </div>
    </div>

    <audio id="bgMusic" loop src="./music.mp3"></audio>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzOb_fBFiq6VR_n2dN9QsNDUM2pMoSb2dSfw2Nz0dKLHBeberjyc49GJ_gk70kng2R2/exec";

        // 1. Tạo hiệu ứng sao rơi
        const starField = document.getElementById("starField");
        for(let i=0; i<80; i++){
            const star = document.createElement("div");
            star.className = "star";
            const size = Math.random() * 3;
            star.style.width = size + "px";
            star.style.height = size + "px";
            star.style.left = Math.random() * 100 + "%";
            star.style.top = Math.random() * 100 + "%";
            star.style.setProperty('--d', (Math.random() * 3 + 2) + "s");
            starField.appendChild(star);
        }

        // 2. Xử lý Modal
        function toggleModal(show) {
            document.getElementById("wishModal").classList.toggle("active", show);
        }

        // 3. Tải và Hiển thị dữ liệu
        async function fetchWishes() {
            try {
                const response = await fetch(API_URL + "?action=list");
                const data = await response.json();
                if(data.approved) {
                    renderWall(data.approved);
                    initFlying(data.approved);
                }
            } catch (e) { console.log("Lỗi kết nối API"); }
        }

        function renderWall(list) {
            const grid = document.getElementById("wishGrid");
            grid.innerHTML = list.slice().reverse().map(item => `
                <div class="sheep-card">
                    <div class="card-body">
                        <div class="card-name">From: ${escapeHtml(item.name)}</div>
                        <div class="card-text">${escapeHtml(item.message)}</div>
                    </div>
                </div>
            `).join("");
        }

        let flyInterval;
        function initFlying(list) {
            const zone = document.getElementById("flyingZone");
            zone.innerHTML = "";
            if(flyInterval) clearInterval(flyInterval);

            const createFly = () => {
                const item = list[Math.floor(Math.random() * list.length)];
                const el = document.createElement("div");
                el.className = "flying-item";
                el.style.left = (Math.random() * 50 + 10) + "%";
                el.style.animationDuration = (Math.random() * 4 + 7) + "s";
                el.innerHTML = `<b>${escapeHtml(item.name)}</b><span>${escapeHtml(item.message)}</span>`;
                zone.appendChild(el);
                setTimeout(() => el.remove(), 10000);
            };

            for(let i=0; i<3; i++) setTimeout(createFly, i * 2000);
            flyInterval = setInterval(createFly, 4000);
        }

        // 4. Gửi dữ liệu
        document.getElementById("wishForm").onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById("submitBtn");
            const name = document.getElementById("userName").value.trim();
            const message = document.getElementById("userMsg").value.trim();

            btn.disabled = true;
            btn.innerText = "ĐANG GỬI...";

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: "submit", name, message, id: Date.now() })
                });
                const resData = await res.json();
                if(resData.ok) {
                    alert("Gửi thành công! Lời chúc của bạn đang chờ duyệt ✨");
                    toggleModal(false);
                    e.target.reset();
                }
            } catch (err) { alert("Lỗi khi gửi, bạn thử lại nhé!"); }
            finally { btn.disabled = false; btn.innerText = "GỬI NGAY ✨"; }
        };

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 5. Âm nhạc
        const audio = document.getElementById("bgMusic");
        const musicBtn = document.getElementById("musicBtn");
        musicBtn.onclick = () => {
            if(audio.paused) {
                audio.play();
                musicBtn.innerHTML = "🔊";
            } else {
                audio.pause();
                musicBtn.innerHTML = "🔇";
            }
        };

        // Bắt đầu
        fetchWishes();
        setInterval(fetchWishes, 60000); // Reload mỗi phút
    </script>
</body>
</html>
