<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>CAPTAIN BOY • TINH HÀ SAY HI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */

:root{
  --primary:#7c3aed;
  --primary2:#c084fc;
  --bg:#05030d;
  --text:#ffffff;
  --muted:rgba(255,255,255,.7);
  --line:rgba(255,255,255,.08);
}

/* ================= RESET ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:'Inter',sans-serif;
  background:#05030d;
  color:#fff;
  overflow-x:hidden;
  min-height:100vh;
}

/* ================= BACKGROUND ================= */

.bg{
  position:fixed;
  inset:0;
  z-index:-5;

  background:
  radial-gradient(circle at top,
  rgba(124,58,237,.28),
  transparent 35%),

  radial-gradient(circle at bottom,
  rgba(168,85,247,.14),
  transparent 35%),

  url("./nền.png");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* ================= STARS ================= */

.stars{
  position:fixed;
  inset:0;
  z-index:-4;
  pointer-events:none;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:#fff;
  border-radius:50%;
  animation:twinkle 3s infinite ease-in-out;
}

@keyframes twinkle{
  0%,100%{opacity:.2;transform:scale(1);}
  50%{opacity:1;transform:scale(1.8);}
}

/* ================= GLOW ================= */

.glow{
  position:fixed;
  width:520px;
  height:520px;
  border-radius:50%;
  filter:blur(120px);
  opacity:.15;
  z-index:-3;
}

.glow.one{top:-140px;left:-120px;background:#7c3aed;}
.glow.two{bottom:-180px;right:-120px;background:#c084fc;}

/* ================= CONTAINER ================= */

.container{
  width:min(1180px,92%);
  margin:auto;
  padding-bottom:120px;
}

/* ================= HERO ================= */

.hero{
  min-height:110vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:80px 0 140px;
}

.hero h1{
  font-size:clamp(52px,8vw,120px);
  font-weight:900;
  letter-spacing:3px;
  background:linear-gradient(to bottom,#fff,#d8b4fe);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ================= WALL ================= */

.wall{
  margin-top:90px;
}

.wish-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:6px;
  margin-top:18px;
}

/* ================= SHEEP CARD (GIỮ NGUYÊN LOGIC) ================= */

.wish-card{
  position:relative;
  width:100%;
  max-width:340px;
  height:360px;
  margin:auto;

  background-image:url("./sheep.png");
  background-repeat:no-repeat;
  background-position:center;
  background-size:102%;

  overflow:hidden;
}

/* ================= TEXT AREA ================= */

.wish-content{
  position:absolute;
  width:56%;
  height:36%;
  left:50%;
  top:35%;
  transform:translateX(-50%);

  display:flex;
  flex-direction:column;
  text-align:center;
  overflow:hidden;
}

/* FROM */

.wish-content strong{
  font-size:10px;
  font-weight:900;
  color:#ff2d2d;
  margin-bottom:3px;

  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

/* MESSAGE */

.wish-content p{
  font-size:8px;
  font-weight:700;
  color:#111;
  line-height:1.15;

  display:-webkit-box;
  -webkit-line-clamp:6;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

/* ================= BUTTON ================= */

.floating-btn{
  position:fixed;
  right:20px;
  bottom:20px;
  z-index:100;

  border:none;
  cursor:pointer;

  padding:15px 22px;
  border-radius:999px;

  background:linear-gradient(135deg,#8b5cf6,#c084fc);
  color:#fff;
  font-weight:800;
}

/* ================= MODAL (GIỮ NGUYÊN KHUNG) ================= */

.modal{
  position:fixed;
  inset:0;
  z-index:999;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.75);
}

.modal.active{
  display:flex;
}

.modal-box{
  width:min(520px,100%);
  background:rgba(15,13,32,.92);
  border-radius:34px;
  padding:34px;
}

/* ================= MOBILE FIX (CHỈ SỬA LỖI BẠN GẶP) ================= */

@media(max-width:768px){

  .wish-grid{
    grid-template-columns:repeat(2,1fr);
    gap:2px; /* FIX khoảng cách xa */
    margin-top:8px;
  }

  .wish-card{
    max-width:180px;
    height:190px; /* FIX card hợp lý */
    background-size:100%;
  }

  .wish-content{
    width:60%;
    height:40%;
    top:34%;
  }

  .wish-content strong{
    font-size:7px;
    margin-bottom:2px;
    line-height:1.05;
  }

  .wish-content p{
    font-size:6px;
    line-height:1.05;
    -webkit-line-clamp:5;
  }
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="stars" id="stars"></div>

<div class="glow one"></div>
<div class="glow two"></div>

<div class="container">

<!-- HERO -->
<section class="hero">
  <h1>CAPTAIN BOY</h1>
</section>

<!-- WALL -->
<section class="wall">
  <div class="wish-grid" id="wishGrid"></div>
</section>

</div>

<!-- FLOAT BUTTON -->
<button class="floating-btn" onclick="toggleModal(true)">
GỬI LỜI CHÚC
</button>

<!-- MODAL -->
<div class="modal" id="wishModal">
  <div class="modal-box">
    <button onclick="toggleModal(false)">×</button>

    <h3>Gửi lời chúc</h3>

    <form id="wishForm">
      <input id="userName" placeholder="Tên" required />
      <textarea id="userMsg" placeholder="Lời chúc" required></textarea>
      <button type="submit">GỬI</button>
    </form>

  </div>
</div>

<script>

/* ================= APP SCRIPT GIỮ NGUYÊN ================= */

const CONFIG = {
  googleScriptUrl:
  "https://script.google.com/macros/s/AKfycbzOb_fBFiq6VR_n2dN9QsNDUM2pMoSb2dSfw2Nz0dKLHBeberjyc49GJ_gk70kng2R2/exec"
};

let listApproved = [];

/* ================= ESCAPE ================= */

function escapeHtml(text){
  const div=document.createElement("div");
  div.textContent=text;
  return div.innerHTML;
}

/* ================= FETCH ================= */

async function fetchWishes(){

  try{

    const res=await fetch(CONFIG.googleScriptUrl+"?action=list");
    const data=await res.json();

    if(data.approved){
      listApproved=data.approved;
      renderWall();
    }

  }catch(e){
    console.log(e);
  }

}

/* ================= RENDER ================= */

function renderWall(){

  const grid=document.getElementById("wishGrid");

  if(!listApproved.length){
    grid.innerHTML=`
      <div class="wish-card">
        <div class="wish-content">
          <strong>FROM SYSTEM</strong>
          <p>Chưa có lời chúc ✨</p>
        </div>
      </div>`;
    return;
  }

  grid.innerHTML=listApproved.map(item=>`
    <div class="wish-card">
      <div class="wish-content">
        <strong>FROM: ${escapeHtml(item.name)}</strong>
        <p>${escapeHtml(item.message)}</p>
      </div>
    </div>
  `).join("");

}

/* ================= INIT ================= */

fetchWishes();
setInterval(fetchWishes,30000);

function toggleModal(show){
  document.getElementById("wishModal").classList.toggle("active",show);
}

</script>

</body>
</html>
