<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
    <title>CAPTAIN BOY • CỪU CÓ CÁNH WISHES</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --p: #7c3aed; --pl: #d8b4fe; --bg: #05030d;
            --text: #ffffff; --card-t: #1a1a1a; --red: #ff3b3b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif !important; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; line-height: 1.4; }

        /* --- NỀN VŨ TRỤ (Nằm dưới cùng) --- */
        .universe { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .nebula { position: absolute; inset: 0; background: url("./nền.png") center/cover no-repeat; opacity: 0.5; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--t) infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

        /* --- NỘI DUNG CHÍNH (Phải nằm trên nền) --- */
        .main-wrapper { position: relative; z-index: 10; width: 100%; }

        .intro-hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 20px;
        }
        .intro-hero h1 { font-family: 'Montserrat', sans-serif !important; font-size: clamp(40px, 12vw, 110px); font-weight: 900; text-transform: uppercase; }
        .wishing-wall { font-family: 'Montserrat', sans-serif !important; font-size: clamp(26px, 8vw, 75px); font-weight: 900; background: linear-gradient(to bottom, #fff, var(--pl)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 15px; }

        /* --- HIỆU ỨNG BAY --- */
        .pyramid-box {
            position: relative; width: 100%; height: 300px; margin: 20px 0;
            background: rgba(255,255,255,0.05); border-radius: 30px;
            overflow: hidden; pointer-events: none; /* Không cản trở click */
        }
        .fly-card {
            position: absolute; background: #fff; padding: 10px 15px; border-radius: 12px;
            color: #111; font-size: 11px; font-weight: 700; animation: travel var(--dur) linear infinite;
        }
        @keyframes travel {
            0% { bottom: -100px; left: var(--x); opacity: 0; }
            20% { opacity: 1; }
            100% { bottom: 400px; left: 50%; opacity: 0; transform: scale(0.5); }
        }

        /* --- GRID SHEEP (QUAN TRỌNG) --- */
        .grid-wall {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
            padding-bottom: 150px; position: relative; z-index: 100; /* Đảm bảo nằm trên cùng */
        }
        @media (min-width: 768px) { .grid-wall { grid-template-columns: repeat(4, 1fr); gap: 25px; } }

        .sheep-card {
            position: relative; width: 100%; aspect-ratio: 1/1.1;
            background: url("./sheep.png") center/contain no-repeat;
            cursor: pointer; transition: 0.3s;
            pointer-events: auto; /* Ép nhận sự kiện click */
            display: flex; align-items: center; justify-content: center;
        }
        .sheep-card:hover { transform: scale(1.08); filter: drop-shadow(0 10px 20px rgba(124, 58, 237, 0.4)); }

        .card-inner {
            position: absolute; width: 75%; height: 55%; top: 24%;
            padding: 5px; text-align: center; pointer-events: none; /* Để click xuyên qua vào card cha */
            overflow: hidden;
        }
        .card-inner b { color: var(--red); font-size: clamp(11px, 3vw, 15px); display: block; margin-bottom: 2px; }
        .card-inner span { color: #1a1a1a; font-weight: 700; font-size: clamp(9px, 2.5vw, 12px); display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

        /* --- MODAL ĐỌC (FULL CARD) --- */
        .read-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center;
            z-index: 9999; padding: 20px; backdrop-filter: blur(15px);
        }
        .read-modal.active { display: flex; }
        .read-box {
            background: #fff; width: 100%; max-width: 450px; padding: 40px 25px;
            border-radius: 35px; color: #111; text-align: center; border: 4px solid var(--p);
        }
        .read-box h2 { color: var(--p); font-size: 24px; margin-bottom: 15px; font-weight: 900; }
        .read-box p { font-size: 17px; line-height: 1.6; font-weight: 600; color: #333; max-height: 50vh; overflow-y: auto; }

        /* --- UI --- */
        .btn-float {
            position: fixed; right: 20px; bottom: 30px; z-index: 1000;
            padding: 15px 25px; background: var(--p); color: #fff; border: none;
            border-radius: 50px; font-weight: 900; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        #musicBtn { position: fixed; left: 20px; bottom: 30px; z-index: 1000; width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.2); color: #fff; border: none; cursor: pointer; }

        .modal-form {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 9000;
        }
        .modal-form.active { display: flex; }
        .form-box { background: #111026; width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; border: 1px solid var(--p); }
        .st-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; outline: none; }

        footer { text-align: center; padding: 50px; opacity: 0.5; font-size: 10px; }
    </style>
</head>
<body>

    <div class="universe">
        <div class="nebula"></div>
        <div id="starField"></div>
    </div>

    <div class="main-wrapper">
        <header class="intro-hero">
            <div style="font-size: 10px; letter-spacing: 5px; opacity: 0.6;">THE RETURN OF</div>
            <h1>CAPTAIN BOY</h1>
            <div class="wishing-wall">WISHING WALL</div>
            <p style="margin-top: 20px; font-weight: 700;">✦ TINH HÀ SAY HI ✦</p>
        </header>

        <div class="container">
            <div class="pyramid-box" id="flyingZone"></div>

            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="font-size: 32px; font-weight: 900;">WALL OF LOVE</h2>
                <p style="opacity: 0.7;">Nhấn vào con cừu để xem chi tiết ✨</p>
            </div>

            <div class="grid-wall" id="wishGrid">
                <!-- Data will load here -->
            </div>
            
            <footer>PROJECT BY: TEAM BOT - NHỮNG CON BOT CỦA CAPTAIN BOY</footer>
        </div>
    </div>

    <button class="btn-float" onclick="setModal('wishModal', true)">+ GỬI LỜI CHÚC</button>
    <button id="musicBtn">🔊</button>

    <!-- MODAL ĐỌC TIN NHẮN -->
    <div class="read-modal" id="readModal" onclick="setModal('readModal', false)">
        <div class="read-box" onclick="event.stopPropagation()">
            <h2 id="readName">From: Cừu</h2>
            <p id="readMsg">Nội dung lời chúc...</p>
            <button onclick="setModal('readModal', false)" style="margin-top:20px; width:100%; padding:12px; background:var(--p); color:#fff; border:none; border-radius:15px; font-weight:900; cursor:pointer;">ĐÓNG</button>
        </div>
    </div>

    <!-- MODAL GỬI -->
    <div class="modal-form" id="wishModal">
        <div class="form-box">
            <h2 style="color:#fff; margin-bottom:15px;">Gửi Lời Chúc ✨</h2>
            <input type="text" id="uName" class="st-input" placeholder="Tên của bạn..." maxlength="25">
            <textarea id="uMsg" class="st-input" rows="5" placeholder="Viết lời chúc tại đây..." maxlength="1000"></textarea>
            <button onclick="submitWish()" id="sendBtn" style="width:100%; padding:15px; background:var(--p); color:#fff; border:none; border-radius:10px; font-weight:900; cursor:pointer;">GỬI NGAY</button>
            <button onclick="setModal('wishModal', false)" style="width:100%; background:none; border:none; color:#777; margin-top:10px; cursor:pointer;">Hủy</button>
        </div>
    </div>

    <audio id="bgm" loop src="./music.mp3"></audio>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzOb_fBFiq6VR_n2dN9QsNDUM2pMoSb2dSfw2Nz0dKLHBeberjyc49GJ_gk70kng2R2/exec";

        // Tạo sao
        const sf = document.getElementById("starField");
        for(let i=0; i<80; i++){
            const s = document.createElement("div"); s.className = "star";
            s.style.width = s.style.height = (Math.random()*2+1) + "px";
            s.style.left = Math.random()*100 + "%"; s.style.top = Math.random()*100 + "%";
            s.style.setProperty('--t', (Math.random()*3+2) + "s");
            sf.appendChild(s);
        }

        async function load() {
            try {
                const r = await fetch(API + "?action=list");
                const d = await r.json();
                if(d.approved) {
                    renderGrid(d.approved);
                    renderFlying(d.approved);
                }
            } catch(e) { console.log(e) }
        }

        function renderGrid(list) {
            const grid = document.getElementById("wishGrid");
            // Đảo ngược để lời chúc mới nhất lên đầu
            grid.innerHTML = list.slice().reverse().map(i => `
                <div class="sheep-card" onclick="openRead('${esc(i.name)}', '${esc(i.message)}')">
                    <div class="card-inner">
                        <b>${esc(i.name)}</b>
                        <span>${esc(i.message)}</span>
                    </div>
                </div>
            `).join("");
        }

        function openRead(name, msg) {
            document.getElementById("readName").innerText = "From: " + name;
            document.getElementById("readMsg").innerText = msg;
            setModal('readModal', true);
        }

        function renderFlying(list) {
            const zone = document.getElementById("flyingZone");
            setInterval(() => {
                const i = list[Math.floor(Math.random()*list.length)];
                const c = document.createElement("div");
                c.className = "fly-card";
                c.style.setProperty('--x', (Math.random()*70+10) + "%");
                c.style.setProperty('--dur', (Math.random()*5+7) + "s");
                c.innerHTML = `<b>${esc(i.name)}:</b> ${esc(i.message).substring(0,20)}...`;
                zone.appendChild(c);
                setTimeout(() => c.remove(), 12000);
            }, 3000);
        }

        async function submitWish() {
            const n = document.getElementById("uName").value.trim();
            const m = document.getElementById("uMsg").value.trim();
            if(!n || !m) return alert("Vui lòng nhập đủ tên và lời chúc!");
            const btn = document.getElementById("sendBtn");
            btn.innerText = "ĐANG GỬI..."; btn.disabled = true;
            try {
                await fetch(API, { method:"POST", body: JSON.stringify({action:"submit", name:n, message:m, id:Date.now()}) });
                alert("Gửi thành công! Lời chúc của bạn đang được duyệt ✨");
                setModal('wishModal', false);
                location.reload();
            } catch(e) { alert("Có lỗi xảy ra!"); btn.disabled = false; }
        }

        function setModal(id, s) { 
            const m = document.getElementById(id);
            if(s) m.classList.add("active");
            else m.classList.remove("active");
        }
        
        function esc(t) { 
            const d = document.createElement('div'); 
            d.textContent = t; 
            return d.innerHTML; 
        }
        
        const bgm = document.getElementById("bgm");
        const mBtn = document.getElementById("musicBtn");
        mBtn.onclick = () => {
            if(bgm.paused) { bgm.play(); mBtn.innerHTML = "🔊"; }
            else { bgm.pause(); mBtn.innerHTML = "🔇"; }
        }

        load();
    </script>
</body>
</html>
