<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>CAPTAIN BOY • TINH HÀ SAY HI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #7c3aed;
    --primary-light: #c084fc;
    --bg: #05030d;
    --text: #ffffff;
    --muted: rgba(255, 255, 255, 0.7);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    line-height: 1.6;
}

/* --- BACKGROUND --- */
.bg-fixed {
    position: fixed;
    inset: 0;
    z-index: -10;
    background: radial-gradient(circle at center, #1a1635 0%, #05030d 100%);
}

.bg-image {
    position: absolute;
    inset: 0;
    background: url("./nền.png") center/cover no-repeat;
    opacity: 0.5;
}

.star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    animation: twinkle var(--d) infinite ease-in-out;
}

@keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
}

/* --- CONTAINER --- */
.container {
    width: 100%;
    max-width: 1200px; /* Tăng độ rộng container chính */
    margin: 0 auto;
    padding: 0 20px;
}

/* --- HERO --- */
.hero {
    padding: 70px 0 50px;
    text-align: center;
}

.hero h1 {
    font-size: clamp(45px, 15vw, 110px); /* Phóng to tiêu đề */
    font-weight: 900;
    background: linear-gradient(to bottom, #fff, var(--primary-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 15px;
    filter: drop-shadow(0 0 20px rgba(124, 58, 237, 0.5));
}

.hero p {
    font-size: clamp(16px, 5vw, 24px);
    letter-spacing: 3px;
    color: #d8b4fe;
    font-weight: 700;
}

/* --- FLYING ZONE --- */
.flying-zone {
    position: relative;
    width: 100%;
    height: 380px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 35px;
    overflow: hidden;
    backdrop-filter: blur(12px);
    margin: 40px 0;
}

.flying-item {
    position: absolute;
    bottom: -100px;
    padding: 14px 24px;
    background: rgba(255, 255, 255, 0.98);
    border-radius: 60px;
    color: #1e1b4b;
    box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    animation: floatUp linear forwards;
}

@keyframes floatUp {
    0% { transform: translateY(0) scale(0.8); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-550px) scale(1.1); opacity: 0; }
}

/* --- GRID WALL - PHÓNG TO CARD TẠI ĐÂY --- */
.wish-grid {
    display: grid;
    /* Tăng min-width từ 320px lên 380px để card bự hơn trên PC/Tablet */
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); 
    gap: 35px; /* Tăng khoảng cách giữa các card cho thoáng */
    padding-bottom: 120px;
}

.sheep-card {
    position: relative;
    width: 100%;
    aspect-ratio: 1.15 / 1; 
    background: url("./sheep.png") center/contain no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 15px 30px rgba(0,0,0,0.3));
    transition: transform 0.3s ease;
}

.sheep-card:hover {
    transform: translateY(-10px) scale(1.02);
}

.card-body {
    position: absolute;
    width: 62%; /* Nới rộng vùng chứa chữ một chút */
    height: 52%;
    top: 27%; 
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 10px;
}

.card-name {
    color: #ff3b3b;
    font-weight: 900;
    /* Chữ tên to hơn */
    font-size: clamp(14px, 3.5vw, 17px);
    margin-bottom: 6px;
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.card-text {
    color: #1a1a1a;
    font-weight: 700;
    /* Chữ lời chúc to hơn */
    font-size: clamp(12px, 3.2vw, 14.5px);
    line-height: 1.4;
    width: 100%;
    display: -webkit-box;
    -webkit-line-clamp: 5; /* Giảm xuống 5 dòng để chữ to mà không tràn */
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* --- MOBILE OPTIMIZATION --- */
@media (max-width: 600px) {
    .wish-grid {
        grid-template-columns: 1fr; /* Full chiều ngang điện thoại */
        gap: 20px;
    }
    .container { padding: 0 15px; }
    .hero { padding: 50px 0 30px; }
    .sheep-card { 
        /* Trên mobile nhỏ, card sẽ chiếm gần hết chiều ngang màn hình */
        max-width: 450px; 
        margin: 0 auto;
    }
}

/* --- CONTROLS --- */
.btn-float {
    position: fixed;
    right: 20px;
    bottom: 30px;
    padding: 18px 32px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    border: none;
    border-radius: 50px;
    color: white;
    font-weight: 900;
    font-size: 16px;
    box-shadow: 0 10px 40px rgba(124, 58, 237, 0.6);
    z-index: 100;
    cursor: pointer;
}

#musicBtn {
    position: fixed;
    left: 20px;
    bottom: 30px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    backdrop-filter: blur(10px);
    z-index: 100;
    cursor: pointer;
    font-size: 24px;
}

/* --- MODAL --- */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(15px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 1000;
}
.modal.active { display: flex; }
.modal-box {
    background: #0f0e21;
    width: 100%;
    max-width: 500px;
    padding: 40px;
    border-radius: 35px;
    border: 1px solid rgba(255,255,255,0.1);
    position: relative;
    animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes modalPop { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

.modal-close {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 35px;
    color: white;
    background: none;
    border: none;
    cursor: pointer;
}

.form-input {
    width: 100%;
    padding: 16px;
    margin-top: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    color: white;
    font-family: inherit;
    outline: none;
}
.submit-btn {
    width: 100%;
    padding: 18px;
    margin-top: 25px;
    background: var(--primary);
    border: none;
    border-radius: 18px;
    color: white;
    font-weight: 900;
    font-size: 16px;
    cursor: pointer;
}

footer {
    text-align: center;
    padding: 50px 10px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
}
</style>
</head>
<body>

    <div class="bg-fixed">
        <div class="bg-image"></div>
        <div id="starField"></div>
    </div>

    <div class="container">
        <header class="hero">
            <h1>CAPTAIN BOY</h1>
            <p>✦ TINH HÀ SAY HI ✦</p>
        </header>

        <section>
            <div class="flying-zone" id="flyingZone">
                <div style="height:100%; display:flex; align-items:center; justify-content:center; opacity:0.3; font-weight:700">
                    ĐANG KẾT NỐI VỚI CÁC VÌ SAO...
                </div>
            </div>
        </section>

        <section>
            <div style="text-align: center; margin-bottom: 40px;">
                <h2 style="font-size: 32px; font-weight: 900;">WALL OF LOVE</h2>
                <p style="color: var(--muted);">Nơi lưu giữ tình cảm siêu to khổng lồ</p>
            </div>
            <div class="wish-grid" id="wishGrid"></div>
        </section>

        <footer>
            PROJECT BY: TEAM BOT - NHỮNG CON BOT CỦA CAPTAIN BOY
        </footer>
    </div>

    <button class="btn-float" onclick="toggleModal(true)">+ GỬI LỜI CHÚC</button>
    <button id="musicBtn">🔊</button>

    <div class="modal" id="wishModal">
        <div class="modal-box">
            <button class="modal-close" onclick="toggleModal(false)">&times;</button>
            <h2 style="margin-bottom:10px">Gửi tín hiệu đến Captain</h2>
            <p style="font-size:14px; color:var(--muted); margin-bottom:25px">Lời chúc của bạn sẽ được hiển thị sau khi duyệt.</p>
            
            <form id="wishForm">
                <div style="margin-bottom:20px">
                    <label style="font-weight:700">Tên của Cừu</label>
                    <input type="text" id="userName" class="form-input" placeholder="Tên bạn là gì nè..." required maxlength="25">
                </div>
                <div>
                    <label style="font-weight:700">Lời nhắn nhủ</label>
                    <textarea id="userMsg" class="form-input" rows="4" placeholder="Viết gì đó thật ngọt ngào..." required maxlength="150"></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">GỬI NGAY ✨</button>
            </form>
        </div>
    </div>

    <audio id="bgMusic" loop src="./music.mp3"></audio>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzOb_fBFiq6VR_n2dN9QsNDUM2pMoSb2dSfw2Nz0dKLHBeberjyc49GJ_gk70kng2R2/exec";

        // Sao nền
        const starField = document.getElementById("starField");
        for(let i=0; i<100; i++){
            const star = document.createElement("div");
            star.className = "star";
            const size = Math.random() * 3;
            star.style.width = size + "px";
            star.style.height = size + "px";
            star.style.left = Math.random() * 100 + "%";
            star.style.top = Math.random() * 100 + "%";
            star.style.setProperty('--d', (Math.random() * 3 + 2) + "s");
            starField.appendChild(star);
        }

        function toggleModal(show) {
            document.getElementById("wishModal").classList.toggle("active", show);
        }

        async function fetchWishes() {
            try {
                const response = await fetch(API_URL + "?action=list");
                const data = await response.json();
                if(data.approved) {
                    renderWall(data.approved);
                    initFlying(data.approved);
                }
            } catch (e) { console.log("Lỗi tải data"); }
        }

        function renderWall(list) {
            const grid = document.getElementById("wishGrid");
            grid.innerHTML = list.slice().reverse().map(item => `
                <div class="sheep-card">
                    <div class="card-body">
                        <div class="card-name">From: ${escapeHtml(item.name)}</div>
                        <div class="card-text">${escapeHtml(item.message)}</div>
                    </div>
                </div>
            `).join("");
        }

        function initFlying(list) {
            const zone = document.getElementById("flyingZone");
            zone.innerHTML = "";
            setInterval(() => {
                const item = list[Math.floor(Math.random() * list.length)];
                const el = document.createElement("div");
                el.className = "flying-item";
                el.style.left = (Math.random() * 60 + 10) + "%";
                el.style.animationDuration = (Math.random() * 5 + 8) + "s";
                el.innerHTML = `<b style="font-size:10px">${escapeHtml(item.name)}</b><span style="font-weight:700">${escapeHtml(item.message)}</span>`;
                zone.appendChild(el);
                setTimeout(() => el.remove(), 12000);
            }, 3500);
        }

        document.getElementById("wishForm").onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById("submitBtn");
            const name = document.getElementById("userName").value.trim();
            const message = document.getElementById("userMsg").value.trim();
            btn.disabled = true; btn.innerText = "ĐANG BAY ĐẾN...";
            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: "submit", name, message, id: Date.now() })
                });
                const resData = await res.json();
                if(resData.ok) {
                    alert("Gửi thành công! Lời chúc đang chờ duyệt ✨");
                    toggleModal(false);
                    e.target.reset();
                }
            } catch (err) { alert("Lỗi gửi, hãy thử lại!"); }
            finally { btn.disabled = false; btn.innerText = "GỬI NGAY ✨"; }
        };

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        const audio = document.getElementById("bgMusic");
        const musicBtn = document.getElementById("musicBtn");
        musicBtn.onclick = () => {
            if(audio.paused) { audio.play(); musicBtn.innerHTML = "🔊"; }
            else { audio.pause(); musicBtn.innerHTML = "🔇"; }
        };

        fetchWishes();
    </script>
</body>
</html>
