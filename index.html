<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>CAPTAIN BOY • TINH HÀ SAY HI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #d8b4fe;
            --bg: #05030d;
            --text: #ffffff;
            --card-text: #1a1a1a;
            --accent: #ff3b3b;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.4;
        }

        input, textarea, button { font-family: 'Inter', sans-serif !important; }

        /* --- BACKGROUND --- */
        .universe {
            position: fixed; inset: 0; z-index: -10;
            background: radial-gradient(circle at center, #1e1450 0%, #05030d 100%);
        }

        .nebula {
            position: absolute; inset: 0;
            background: url("./nền.png") center/cover no-repeat;
            opacity: 0.45; filter: saturate(1.4);
        }

        .star {
            position: absolute; background: #fff; border-radius: 50%;
            box-shadow: 0 0 8px #fff;
            animation: twinkle var(--t) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .shooting-star {
            position: absolute; width: 2px; height: 100px;
            background: linear-gradient(to bottom, #fff, transparent);
            transform: rotate(45deg); opacity: 0;
            animation: shoot 9s linear infinite;
        }

        @keyframes shoot {
            0% { transform: translate(-100px, -100px) rotate(45deg); opacity: 0; }
            10% { opacity: 1; }
            20% { transform: translate(600px, 600px) rotate(45deg); opacity: 0; }
            100% { transform: translate(600px, 600px) rotate(45deg); opacity: 0; }
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }

        .hero h1 {
            font-size: clamp(40px, 12vw, 110px);
            font-weight: 900; line-height: 0.9;
            background: linear-gradient(to bottom, #fff, var(--primary-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .hero .wishing-wall {
            font-size: clamp(26px, 8vw, 60px);
            font-weight: 800; margin: 10px 0 25px;
            text-shadow: 0 0 20px var(--primary);
        }

        /* Dòng chữ TINH HÀ SAY HI luôn 1 dòng */
        .hero .sub-bottom {
            font-size: clamp(9px, 3.2vw, 22px);
            letter-spacing: 2px; font-weight: 700;
            white-space: nowrap; display: block; width: 100%;
        }

        /* --- FLYING AREA (KHU VỰC GIỮ LẠI) --- */
        .container {
            width: 100%; max-width: 1200px;
            margin: 0 auto; padding: 0 15px;
        }

        .flying-section {
            text-align: center; margin-bottom: 60px;
        }

        .flying-box {
            position: relative; width: 100%; height: 380px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; overflow: hidden;
            backdrop-filter: blur(12px); margin-top: 20px;
        }

        .bubble {
            position: absolute; background: rgba(255,255,255,0.9);
            padding: 10px 18px; border-radius: 25px;
            color: #111; font-size: 11px; font-weight: 700;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: float linear infinite;
        }

        @keyframes float {
            from { transform: translateY(420px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            to { transform: translateY(-100px); opacity: 0; }
        }

        /* --- WALL OF LOVE GRID --- */
        .grid-wall {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px; padding-bottom: 120px;
        }

        @media (min-width: 768px) {
            .grid-wall { grid-template-columns: repeat(3, 1fr); gap: 35px; }
        }

        .sheep-card {
            position: relative; width: 100%; aspect-ratio: 1.1 / 1;
            background: url("./sheep.png") center/contain no-repeat;
            display: flex; align-items: center; justify-content: center;
        }

        .card-inner {
            position: absolute; width: 74%; height: 65%;
            top: 22%; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 8px; overflow: hidden;
        }

        .card-inner b {
            color: var(--accent); font-size: clamp(10px, 3.2vw, 15px);
            margin-bottom: 3px; font-weight: 900;
        }

        .card-inner span {
            color: var(--card-text); font-weight: 700;
            line-height: 1.2; word-break: break-word;
            /* Font-size sẽ được JS tính toán để nhét đủ 100 chữ */
        }

        /* --- UI CONTROLS --- */
        .btn-float {
            position: fixed; right: 15px; bottom: 25px;
            padding: 14px 22px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none; border-radius: 50px;
            color: #fff; font-weight: 800; font-size: 13px;
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5); z-index: 100;
        }

        #musicBtn {
            position: fixed; left: 15px; bottom: 25px;
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; z-index: 100;
        }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center;
            padding: 20px; z-index: 1000; backdrop-filter: blur(10px);
        }
        .modal.active { display: flex; }
        .modal-box {
            background: #111026; width: 100%; max-width: 450px;
            padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
        }

        .input-box {
            width: 100%; padding: 14px; margin: 10px 0;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #fff; font-size: 16px;
        }

        footer { text-align: center; padding: 40px; font-size: 10px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="universe">
        <div class="nebula"></div>
        <div id="starField"></div>
        <div class="shooting-star" style="top:10%; left:20%; animation-delay: 2s;"></div>
        <div class="shooting-star" style="top:40%; left:70%; animation-delay: 6s;"></div>
    </div>

    <header class="hero">
        <div style="font-size:10px; letter-spacing:5px; opacity:0.7; margin-bottom:10px">THE RETURN OF</div>
        <h1>CAPTAIN BOY</h1>
        <div class="wishing-wall">WISHING WALL</div>
        <div class="sub-bottom">✦ CAPTAIN BOY - TINH HÀ SAY HI ✦</div>
    </header>

    <div class="container">
        <!-- PHẦN GIỮ LẠI: LỜI NHẮN BAY LƠ LỬNG -->
        <section class="flying-section">
            <h2 style="font-size: 28px; font-weight: 900;">CỪU CÓ CÁNH WITH LOVE</h2>
            <p style="opacity: 0.7; font-size: 13px;">Những lời nhắn đang bay tới CAPTAIN BOY...</p>
            <div class="flying-box" id="flyingZone"></div>
        </section>

        <!-- PHẦN WALL OF LOVE (Grid) -->
        <section>
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="font-size: 32px; font-weight: 900;">WALL OF LOVE</h2>
                <p style="opacity: 0.6; font-size: 13px;">Kho tàng lời nhắn dành cho CAPTAIN BOY ✦</p>
            </div>
            <div class="grid-wall" id="wishGrid"></div>
        </section>

        <footer>PROJECT BY: TEAM BOT - NHỮNG CON BOT CỦA CAPTAIN BOY</footer>
    </div>

    <button class="btn-float" onclick="setModal(true)">+ GỬI LỜI CHÚC</button>
    <button id="musicBtn">🔊</button>

    <div class="modal" id="wishModal">
        <div class="modal-box">
            <h2 style="margin-bottom:15px; font-weight:900">Gửi lời chúc ✨</h2>
            <input type="text" id="uName" class="input-box" placeholder="Tên của bạn..." required maxlength="25">
            <textarea id="uMsg" class="input-box" rows="5" placeholder="Nhắn nhủ gì với CAPTAIN BOY? ( Tối đa 100 chữ)..." required maxlength="500"></textarea>
            <button onclick="submitWish()" id="sendBtn" style="width:100%; padding:16px; background:var(--primary); border:none; border-radius:12px; color:#fff; font-weight:900; cursor:pointer">GỬI NGAY ✨</button>
            <button onclick="setModal(false)" style="width:100%; background:none; border:none; color:#666; margin-top:15px">Hủy bỏ</button>
        </div>
    </div>

    <audio id="bgm" loop src="./music.mp3"></audio>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzOb_fBFiq6VR_n2dN9QsNDUM2pMoSb2dSfw2Nz0dKLHBeberjyc49GJ_gk70kng2R2/exec";

        // Tinh hà rực rỡ
        const f = document.getElementById("starField");
        for(let i=0; i<150; i++){
            const s = document.createElement("div");
            s.className = "star";
            const sz = Math.random() * 3 + 1.2;
            s.style.width = s.style.height = sz + "px";
            s.style.left = Math.random() * 100 + "%";
            s.style.top = Math.random() * 100 + "%";
            s.style.setProperty('--t', (Math.random() * 3 + 2) + "s");
            f.appendChild(s);
        }

        async function load() {
            try {
                const r = await fetch(API + "?action=list");
                const d = await r.json();
                if(d.approved) {
                    renderGrid(d.approved);
                    renderFlying(d.approved);
                }
            } catch(e) {}
        }

        function renderGrid(list) {
            const grid = document.getElementById("wishGrid");
            grid.innerHTML = list.slice().reverse().map(i => {
                const msg = i.message;
                // LOGIC AUTO-SHRINK (Tự nhỏ chữ cho đủ 100 chữ)
                let fontSize = "11.5px";
                if (msg.length > 250) fontSize = "7px";
                else if (msg.length > 180) fontSize = "8px";
                else if (msg.length > 100) fontSize = "9px";
                else if (msg.length > 60) fontSize = "10.5px";

                return `
                    <div class="sheep-card">
                        <div class="card-inner">
                            <b>From: ${esc(i.name)}</b>
                            <span style="font-size: ${fontSize}">${esc(msg)}</span>
                        </div>
                    </div>
                `;
            }).join("");
        }

        function renderFlying(list) {
            const zone = document.getElementById("flyingZone");
            zone.innerHTML = "";
            setInterval(() => {
                const i = list[Math.floor(Math.random()*list.length)];
                const b = document.createElement("div");
                b.className = "bubble";
                b.style.left = Math.random()*70 + "%";
                b.style.animationDuration = (Math.random()*5 + 8) + "s";
                b.innerText = esc(i.name) + ": " + esc(i.message);
                zone.appendChild(b);
                setTimeout(() => b.remove(), 12000);
            }, 3500);
        }

        async function submitWish() {
            const n = document.getElementById("uName").value.trim();
            const m = document.getElementById("uMsg").value.trim();
            if(!n || !m) return alert("Điền đủ thông tin nha!");
            const b = document.getElementById("sendBtn");
            b.innerText = "ĐANG GỬI..."; b.disabled = true;
            try {
                await fetch(API, { method:"POST", body: JSON.stringify({action:"submit", name:n, message:m, id:Date.now()}) });
                alert("Thành công! Chờ duyệt nhé ✨");
                setModal(false); location.reload();
            } catch(e) { alert("Lỗi!"); b.disabled = false; b.innerText = "GỬI NGAY ✨"; }
        }

        function setModal(s) { document.getElementById("wishModal").classList.toggle("active", s); }
        function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        const bgm = document.getElementById("bgm");
        const mBtn = document.getElementById("musicBtn");
        mBtn.onclick = () => {
            if(bgm.paused) { bgm.play(); mBtn.innerHTML = "🔊"; }
            else { bgm.pause(); mBtn.innerHTML = "🔇"; }
        }

        load();
    </script>
</body>
</html>
