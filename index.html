<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CAPTAIN BOY • TINH HÀ SAY HI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#8b5cf6;
  --primary2:#c084fc;
  --bg:#05010f;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#05010f;
  color:#fff;
  overflow-x:hidden;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  z-index:-50;
  background:
    linear-gradient(rgba(5,1,15,.4),rgba(5,1,15,.8)),
    url("./nền.png");
  background-size:cover;
  background-position:center;
  animation:bgMove 35s ease-in-out infinite;
}

@keyframes bgMove{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

/* GALAXY */
#galaxy{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:-40;
}

/* GLOW */
.glow{
  position:fixed;
  border-radius:50%;
  filter:blur(120px);
  opacity:.22;
  z-index:-35;
  animation:glowMove 14s ease-in-out infinite;
}

.glow.one{
  width:420px;
  height:420px;
  background:#7c3aed;
  top:-120px;
  left:-120px;
}

.glow.two{
  width:360px;
  height:360px;
  background:#c084fc;
  bottom:-120px;
  right:-120px;
}

/* NOISE */
.noise{
  position:fixed;
  inset:0;
  opacity:.04;
  z-index:-20;
  background-image:
    linear-gradient(rgba(255,255,255,.6) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.6) 1px, transparent 1px);
  background-size:3px 3px;
}

/* LAYOUT */
.container{
  width:min(1200px,92%);
  margin:auto;
  padding-bottom:120px;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1{
  font-size:clamp(42px,10vw,150px);
  font-weight:900;
  white-space:nowrap;
  background:linear-gradient(#fff,#d8b4fe);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero h2{
  font-size:clamp(22px,5vw,80px);
  white-space:nowrap;
  color:#f5d0fe;
}

.hero p{
  font-size:clamp(12px,2vw,24px);
}

/* SECTION */
.section-head{
  text-align:center;
  margin-bottom:30px;
}

.section-head h2{
  font-size:clamp(22px,3vw,46px);
  font-weight:900;
}

/* FLYING AREA */
.wish-cuucocanh{
  position:relative;
  height:430px;
  overflow:hidden;
  border-radius:36px;
  background:linear-gradient(rgba(20,14,45,.72),rgba(8,5,18,.9));
}

/* FLY WISH */
.flying-wish{
  position:absolute;
  bottom:-140px;
  min-width:160px;
  max-width:260px;
  padding:14px 18px;
  border-radius:999px;
  background:radial-gradient(#fff,#f3e8ff);
  color:#2d1b45;
  animation:flyUp linear forwards;
  overflow:hidden;
}

.flying-wish strong{
  font-size:12px;
  color:#7c3aed;
}

.flying-wish span{
  font-size:12px;
  line-height:1.3;
  word-break:break-word;
  overflow-wrap:anywhere;
}

/* WALL */
.wish-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

/* SHEEP CARD FIXED */
.wish-card{
  position:relative;
  height:320px;
  background:url("./sheep.png") center/100% 100% no-repeat;
  padding:70px 80px 50px 150px;

  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.wish-card strong{
  color:#ff3b3b;
  font-size:18px;
  text-align:center;
}

.wish-card p{
  font-size:16px;
  color:#2d1b45;

  max-width:100%;
  word-break:break-word;
  overflow-wrap:anywhere;

  line-height:1.4;
}

/* MOBILE FIX */
@media(max-width:768px){

  .hero h1{
    font-size:34px;
    white-space:normal;
  }

  .hero h2{
    font-size:20px;
    white-space:normal;
  }

  .wish-card{
    height:240px;
    padding:50px 40px 30px 110px;
  }

  .wish-card p{
    font-size:12px;
  }

}

/* ANIMATIONS */
@keyframes flyUp{
  0%{transform:translateY(0) scale(.7);opacity:0;}
  100%{transform:translateY(-800px) scale(1.1);opacity:0;}
}

</style>
</head>

<body>

<div class="bg"></div>
<canvas id="galaxy"></canvas>
<div class="glow one"></div>
<div class="glow two"></div>
<div class="noise"></div>

<div class="container">

<section class="hero">
  <div>
    <h1>CAPTAIN BOY</h1>
    <h2>TINH HÀ SAY HI</h2>
    <p>✦ WISHING WALL ✦</p>
  </div>
</section>

<section>
  <div class="section-head">
    <h2>CỪU CÓ CÁNH</h2>
  </div>
  <div class="wish-cuucocanh" id="wishCuucocanh"></div>
</section>

<section class="wall">
  <div class="section-head">
    <h2>WALL OF LOVE</h2>
  </div>
  <div class="wish-grid" id="wishGrid"></div>
</section>

</div>

<script>

/* API */
const API = "https://script.google.com/macros/s/AKfycbzOb_fBFiq6VR_n2dN9QsNDUM2pMoSb2dSfw2Nz0dKLHBeberjyc49GJ_gk70kng2R2/exec";

let list = [];

async function fetchData(){
  const res = await fetch(API + "?action=list");
  const data = await res.json();
  list = data.approved || [];
  render();
  fly();
}

/* RENDER WALL */
function render(){
  const box = document.getElementById("wishGrid");

  box.innerHTML = list.map(i=>`
    <div class="wish-card">
      <strong>${i.name}</strong>
      <p>${i.message}</p>
    </div>
  `).join("");
}

/* FLY */
function fly(){
  const box = document.getElementById("wishCuucocanh");
  box.innerHTML = "";

  setInterval(()=>{
    if(!list.length) return;

    const w = list[Math.floor(Math.random()*list.length)];

    const el = document.createElement("div");
    el.className = "flying-wish";
    el.style.left = Math.random()*80 + "%";
    el.innerHTML = `<strong>${w.name}</strong><span>${w.message}</span>`;

    box.appendChild(el);

    setTimeout(()=>el.remove(),10000);
  },2000);
}

fetchData();
setInterval(fetchData,30000);

</script>

</body>
</html>
