<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>CAPTAIN BOY • WISHING WALL</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #7c3aed; --pl: #d8b4fe; --bg: #05030d; --red: #ff3b3b; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- MÀN HÌNH CHỜ (GIẢI PHÁP CHO NHẠC) --- */
        #splash {
            position: fixed; inset: 0; background: #05030d; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
        #splash.hidden { opacity: 0; pointer-events: none; transform: scale(1.2); }
        .start-btn {
            padding: 20px 40px; background: var(--p); color: #fff; border: none;
            border-radius: 50px; font-weight: 900; font-size: 18px; cursor: pointer;
            box-shadow: 0 0 30px var(--p); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 20px var(--p); } 50% { transform: scale(1.05); box-shadow: 0 0 40px var(--p); } 100% { transform: scale(1); box-shadow: 0 0 20px var(--p); } }

        /* --- NỀN VŨ TRỤ --- */
        .universe { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .nebula { position: absolute; inset: 0; background: url("./nền.png") center/cover no-repeat; opacity: 0.4; pointer-events: none; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--t) infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

        /* --- NỘI DUNG CHÍNH --- */
        #main-content { height: 100vh; overflow-y: auto; position: relative; z-index: 10; scroll-behavior: smooth; }
        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { font-family: 'Montserrat'; font-size: clamp(40px, 12vw, 100px); line-height: 0.9; text-transform: uppercase; }
        .hero .accent { font-family: 'Montserrat'; font-size: clamp(25px, 8vw, 70px); background: linear-gradient(#fff, var(--pl)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        .grid-wall { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding-bottom: 100px; }
        @media (min-width: 768px) { .grid-wall { grid-template-columns: repeat(4, 1fr); gap: 30px; } }

        /* --- CARD CON CỪU (FIX LỖI CLICK) --- */
        .sheep-card {
            position: relative; width: 100%; aspect-ratio: 1.1/1;
            background: url("./sheep.png") center/contain no-repeat;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .sheep-card:hover { transform: scale(1.05); }

        /* HITBOX TÀNG HÌNH NẰM TRÊN CÙNG ĐỂ NHẬN CLICK */
        .card-hitbox {
            position: absolute; inset: 0; z-index: 100;
            cursor: pointer; background: transparent;
        }

        .card-inner {
            position: absolute; width: 70%; height: 50%; top: 25%;
            display: flex; flex-direction: column; text-align: center;
            pointer-events: none; overflow: hidden;
        }
        .card-inner b { color: var(--red); font-size: clamp(10px, 2.5vw, 12px); font-weight: 900; }
        .card-inner p { color: #1a1a1a; font-weight: 700; font-size: clamp(8px, 2vw, 10px); line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

        /* --- MODAL --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 20px; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        .modal-box { background: #fff; width: 100%; max-width: 450px; padding: 35px; border-radius: 30px; color: #111; text-align: center; }
        #readMsg { font-size: 16px; font-weight: 600; color: #333; margin: 20px 0; max-height: 300px; overflow-y: auto; }

        /* NÚT ĐIỀU KHIỂN */
        .btn-float { position: fixed; right: 20px; bottom: 30px; padding: 15px 25px; background: var(--p); border: none; border-radius: 50px; color: #fff; font-weight: 900; z-index: 5000; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        #musicBtn { position: fixed; left: 20px; bottom: 30px; width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid #fff; color: #fff; z-index: 5000; cursor: pointer; }

        .form-box { background: #111026; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; border: 1px solid var(--p); text-align: center; }
        .st-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; outline: none; }
    </style>
</head>
<body>

    <!-- MÀN HÌNH CHỜ -->
    <div id="splash">
        <h2 style="margin-bottom: 20px; font-family: 'Montserrat'; letter-spacing: 5px;">CỪU CÓ CÁNH</h2>
        <button class="start-btn" onclick="startExperience()">NHẬN TÍN HIỆU ✨</button>
        <p style="margin-top: 20px; opacity: 0.5; font-size: 12px;">Nhấn để bắt đầu nhạc và khám phá</p>
    </div>

    <div class="universe">
        <div class="nebula"></div>
        <div id="starField"></div>
    </div>

    <div id="main-content">
        <header class="hero">
            <div style="letter-spacing: 8px; opacity: 0.5; font-size: 10px; margin-bottom: 10px;">THE RETURN OF</div>
            <h1>CAPTAIN BOY</h1>
            <div class="accent">WISHING WALL</div>
        </header>

        <div class="container">
            <h2 style="text-align: center; margin-bottom: 40px; font-weight: 900;">WALL OF LOVE ✨</h2>
            <div class="grid-wall" id="wishGrid"></div>
            <footer style="text-align: center; padding: 50px; opacity: 0.3; font-size: 10px;">PROJECT BY TEAM BOT</footer>
        </div>
    </div>

    <button class="btn-float" onclick="setModal('wishModal', true)">+ GỬI LỜI CHÚC</button>
    <button id="musicBtn">🔊</button>

    <!-- MODAL XEM -->
    <div class="modal" id="readModal" onclick="setModal('readModal', false)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h2 id="readName" style="color:var(--p); font-weight:900;">From: Cừu</h2>
            <div id="readMsg">...</div>
            <button onclick="setModal('readModal', false)" style="padding:12px 30px; border-radius:20px; background:var(--p); color:#fff; border:none; cursor:pointer; font-weight:900">ĐÓNG</button>
        </div>
    </div>

    <!-- MODAL GỬI -->
    <div class="modal" id="wishModal">
        <div class="modal-box form-box">
            <h2 style="color:#fff; margin-bottom:15px">Gửi Tín Hiệu ✨</h2>
            <input type="text" id="uName" class="st-input" placeholder="Tên của bạn..." maxlength="25">
            <textarea id="uMsg" class="st-input" rows="5" placeholder="Lời chúc..."></textarea>
            <button onclick="submitWish()" id="sendBtn" style="width:100%; padding:15px; background:var(--p); color:#fff; border:none; border-radius:10px; font-weight:900; cursor:pointer">GỬI NGAY ✨</button>
            <button onclick="setModal('wishModal', false)" style="width:100%; background:none; color:#666; border:none; margin-top:10px; cursor:pointer">Hủy bỏ</button>
        </div>
    </div>

    <audio id="bgm" loop src="./music.mp3"></audio>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzOb_fBFiq6VR_n2dN9QsNDUM2pMoSb2dSfw2Nz0dKLHBeberjyc49GJ_gk70kng2R2/exec";

        // Khởi tạo nhạc và màn hình
        function startExperience() {
            document.getElementById('splash').classList.add('hidden');
            const bgm = document.getElementById('bgm');
            bgm.play().catch(e => console.log("Music error"));
            // Cho phép cuộn trang sau khi ấn bắt đầu
            document.body.style.overflow = "auto";
        }

        // Tạo sao
        const sf = document.getElementById("starField");
        for(let i=0; i<80; i++){
            const s = document.createElement("div"); s.className = "star";
            s.style.width = s.style.height = (Math.random()*2.5+1) + "px";
            s.style.left = Math.random()*100 + "%"; s.style.top = Math.random()*100 + "%";
            s.style.setProperty('--t', (Math.random()*3+2) + "s");
            sf.appendChild(s);
        }

        async function load() {
            try {
                const r = await fetch(API + "?action=list");
                const d = await r.json();
                if(d.approved) {
                    const grid = document.getElementById("wishGrid");
                    grid.innerHTML = d.approved.slice().reverse().map(i => `
                        <div class="sheep-card">
                            <div class="card-hitbox" onclick="openRead('${esc(i.name)}', '${esc(i.message)}')"></div>
                            <div class="card-inner">
                                <b>From: ${esc(i.name)}</b>
                                <p>${esc(i.message)}</p>
                            </div>
                        </div>
                    `).join("");
                }
            } catch(e) {}
        }

        function openRead(name, msg) {
            document.getElementById("readName").innerText = "From: " + name;
            document.getElementById("readMsg").innerText = msg;
            setModal('readModal', true);
        }

        async function submitWish() {
            const n = document.getElementById("uName").value.trim();
            const m = document.getElementById("uMsg").value.trim();
            if(!n || !m) return alert("Nhập đủ thông tin nhé!");
            const btn = document.getElementById("sendBtn");
            btn.innerText = "ĐANG GỬI..."; btn.disabled = true;
            try {
                await fetch(API, { method:"POST", body: JSON.stringify({action:"submit", name:n, message:m}) });
                alert("Gửi thành công! Chờ duyệt nhé ✨");
                location.reload();
            } catch(e) { alert("Lỗi!"); btn.disabled = false; btn.innerText = "GỬI NGAY ✨"; }
        }

        function setModal(id, s) { document.getElementById(id).classList.toggle("active", s); }
        function esc(t) { return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        const bgm = document.getElementById("bgm");
        const mBtn = document.getElementById("musicBtn");
        mBtn.onclick = (e) => {
            e.stopPropagation();
            if(bgm.paused) { bgm.play(); mBtn.innerHTML = "🔊"; }
            else { bgm.pause(); mBtn.innerHTML = "🔇"; }
        }

        load();
    </script>
</body>
</html>
