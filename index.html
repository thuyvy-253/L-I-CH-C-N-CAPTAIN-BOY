<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>CAPTAIN BOY • TINH HÀ SAY HI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #c084fc;
            --bg: #05030d;
            --text: #ffffff;
            --accent-red: #ff4757;
            --card-text: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.4;
        }

        /* --- PHÔNG NỀN TINH HÀ VÀ SAO BĂNG --- */
        .universe {
            position: fixed;
            inset: 0;
            z-index: -10;
            background: radial-gradient(circle at center, #1b1448 0%, #05030d 100%);
            overflow: hidden;
        }

        .nebula {
            position: absolute;
            inset: 0;
            background: url("./nền.png") center/cover no-repeat;
            opacity: 0.4;
            filter: saturate(1.5);
        }

        /* Lớp sao lấp lánh */
        .stars-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .blink-star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: blink var(--t) infinite ease-in-out;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.1; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px #fff; }
        }

        /* Hiệu ứng Sao Băng */
        .shooting-star {
            position: absolute;
            top: -10%;
            width: 2px;
            height: 80px;
            background: linear-gradient(to bottom, rgba(255,255,255,1), transparent);
            transform: rotate(45deg);
            opacity: 0;
            animation: shoot var(--sd) linear infinite;
            animation-delay: var(--sl);
        }

        @keyframes shoot {
            0% { transform: translate(0, 0) rotate(45deg); opacity: 0; }
            10% { opacity: 1; }
            30% { transform: translate(400px, 400px) rotate(45deg); opacity: 0; }
            100% { transform: translate(400px, 400px) rotate(45deg); opacity: 0; }
        }

        /* --- BỐ CỤC CHÍNH --- */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header-section {
            text-align: center;
            padding: 40px 0;
        }

        .header-section h1 {
            font-size: clamp(24px, 6vw, 48px);
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .header-section p {
            font-size: 13px;
            color: var(--primary-light);
            opacity: 0.8;
        }

        /* --- KHU VỰC BAY LƠ LỬNG --- */
        .floating-box {
            position: relative;
            width: 100%;
            height: 320px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(5px);
            margin-bottom: 40px;
        }

        .bubble-wish {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            padding: 8px 15px;
            border-radius: 20px;
            color: #333;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            animation: floatBubble var(--duration) linear infinite;
            max-width: 180px;
        }

        .bubble-wish b { color: var(--primary); font-size: 9px; }

        @keyframes floatBubble {
            from { transform: translate(var(--startX), 350px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            to { transform: translate(var(--endX), -100px); opacity: 0; }
        }

        /* --- WALL OF LOVE (2 CỘT MOBILE) --- */
        .grid-wall {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Chuẩn 2 cột mobile */
            gap: 12px;
            padding-bottom: 100px;
        }

        @media (min-width: 768px) {
            .grid-wall { grid-template-columns: repeat(3, 1fr); gap: 25px; }
        }

        .sheep-card {
            position: relative;
            width: 100%;
            aspect-ratio: 1.1 / 1;
            background: url("./sheep.png") center/contain no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-inner {
            position: absolute;
            width: 60%;
            height: 50%;
            top: 28%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 5px;
        }

        .from-tag {
            color: var(--accent-red);
            font-weight: 900;
            font-size: clamp(10px, 2.5vw, 13px);
            margin-bottom: 3px;
        }

        .msg-tag {
            color: var(--card-text);
            font-weight: 700;
            font-size: clamp(9px, 2.2vw, 11px);
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* --- ĐIỀU KHIỂN --- */
        .btn-send {
            position: fixed;
            right: 15px;
            bottom: 20px;
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            border-radius: 50px;
            color: #fff;
            font-weight: 800;
            font-size: 13px;
            box-shadow: 0 5px 20px rgba(124, 58, 237, 0.4);
            z-index: 100;
        }

        #audioControl {
            position: fixed;
            left: 15px;
            bottom: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            z-index: 100;
            cursor: pointer;
        }

        /* --- MODAL --- */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-box {
            background: #0f0d21;
            width: 100%;
            max-width: 400px;
            padding: 25px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .input-st {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 10px;
            opacity: 0.5;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="universe">
        <div class="nebula"></div>
        <div id="starsContainer" class="stars-layer"></div>
        <!-- Sao băng cố định -->
        <div class="shooting-star" style="--sl: 1s; --sd: 6s; left: 20%;"></div>
        <div class="shooting-star" style="--sl: 4s; --sd: 8s; left: 70%;"></div>
    </div>

    <div class="container">
        <div class="header-section">
            <h1>CỪU CÓ CÁNH WITH LOVE CAPTAIN BOY</h1>
            <p>Lời yêu thương từ Cừu Có Cánh dành cho CAPTAIN BOY ✦</p>
        </div>

        <div class="floating-box" id="flyingZone"></div>

        <div class="header-section" style="padding-top: 0;">
            <h1>WALL OF LOVE</h1>
            <p>Nơi lưu giữ những kỷ niệm tuyệt vời nhất ✦</p>
        </div>

        <div class="grid-wall" id="wishGrid"></div>

        <footer>
            PROJECT BY: TEAM BOT - NHỮNG CON BOT CỦA CAPTAIN BOY
        </footer>
    </div>

    <button class="btn-send" onclick="setModal(true)">+ GỬI LỜI CHÚC</button>
    <button id="audioControl">🔊</button>

    <div class="modal" id="wishModal">
        <div class="modal-box">
            <h2 style="margin-bottom:15px">Gửi lời chúc ✨</h2>
            <input type="text" id="uName" class="input-st" placeholder="Tên của bạn..." maxlength="20">
            <textarea id="uMsg" class="input-st" rows="3" placeholder="Lời chúc ngọt ngào..." maxlength="100"></textarea>
            <button onclick="sendWish()" id="sendBtn" class="input-st" style="background:var(--primary); font-weight:800; border:none; cursor:pointer">GỬI NGAY</button>
            <button onclick="setModal(false)" style="width:100%; background:none; border:none; color:#aaa; margin-top:10px">Đóng</button>
        </div>
    </div>

    <audio id="bgm" loop src="./music.mp3"></audio>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzOb_fBFiq6VR_n2dN9QsNDUM2pMoSb2dSfw2Nz0dKLHBeberjyc49GJ_gk70kng2R2/exec";

        // 1. Tạo sao lấp lánh (Tinh hà)
        const sCon = document.getElementById("starsContainer");
        for(let i=0; i<120; i++){
            const s = document.createElement("div");
            s.className = "blink-star";
            const sz = Math.random() * 2.5;
            s.style.width = s.style.height = sz + "px";
            s.style.left = Math.random() * 100 + "%";
            s.style.top = Math.random() * 100 + "%";
            s.style.setProperty('--t', (Math.random() * 3 + 2) + "s");
            sCon.appendChild(s);
        }

        // 2. Xử lý UI
        function setModal(s) { document.getElementById("wishModal").classList.toggle("active", s); }

        async function loadData() {
            try {
                const r = await fetch(API + "?action=list");
                const d = await r.json();
                if(d.approved) {
                    render(d.approved);
                    startFly(d.approved);
                }
            } catch(e) {}
        }

        function render(list) {
            const g = document.getElementById("wishGrid");
            g.innerHTML = list.slice().reverse().map(i => `
                <div class="sheep-card">
                    <div class="card-inner">
                        <div class="from-tag">From: ${esc(i.name)}</div>
                        <div class="msg-tag">${esc(i.message)}</div>
                    </div>
                </div>
            `).join("");
        }

        function startFly(list) {
            const z = document.getElementById("flyingZone");
            z.innerHTML = "";
            setInterval(() => {
                const i = list[Math.floor(Math.random()*list.length)];
                const b = document.createElement("div");
                b.className = "bubble-wish";
                b.style.setProperty('--startX', Math.random()*80 + "%");
                b.style.setProperty('--endX', Math.random()*80 + "%");
                b.style.setProperty('--duration', (Math.random()*5 + 10) + "s");
                b.innerHTML = `<b>${esc(i.name)}</b><span>${esc(i.message)}</span>`;
                z.appendChild(b);
                setTimeout(() => b.remove(), 15000);
            }, 3000);
        }

        async function sendWish() {
            const n = document.getElementById("uName").value.trim();
            const m = document.getElementById("uMsg").value.trim();
            if(!n || !m) return alert("Điền đủ thông tin nha!");
            
            const btn = document.getElementById("sendBtn");
            btn.innerText = "ĐANG GỬI..."; btn.disabled = true;

            try {
                const r = await fetch(API, {
                    method:"POST",
                    body: JSON.stringify({action:"submit", name:n, message:m, id:Date.now()})
                });
                alert("Đã gửi! Chờ duyệt nhé ✨");
                setModal(false);
                location.reload();
            } catch(e) { alert("Lỗi gửi!"); }
        }

        function esc(t) { 
            const d = document.createElement('div'); 
            d.textContent = t; 
            return d.innerHTML; 
        }

        const bgm = document.getElementById("bgm");
        const aBtn = document.getElementById("audioControl");
        aBtn.onclick = () => {
            if(bgm.paused) { bgm.play(); aBtn.innerHTML = "🔊"; }
            else { bgm.pause(); aBtn.innerHTML = "🔇"; }
        }

        loadData();
    </script>
</body>
</html>
