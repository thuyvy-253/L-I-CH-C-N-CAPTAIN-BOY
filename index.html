<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CAPTAIN BOY • TINH HÀ SAY HI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#8b5cf6;
  --primary2:#c084fc;
  --bg:#05010f;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:'Inter',sans-serif;
  background:#05010f;
  color:#fff;
  overflow-x:hidden;
  min-height:100vh;
}

/* BACKGROUND */

.bg{
  position:fixed;
  inset:0;
  z-index:-50;

  background:
    linear-gradient(
      rgba(5,1,15,.4),
      rgba(5,1,15,.8)
    ),
    url("./nền.png");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  animation:bgMove 35s ease-in-out infinite;
}

@keyframes bgMove{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

/* GALAXY */

#galaxy{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:-40;
}

/* GLOW */

.glow{
  position:fixed;
  border-radius:50%;
  filter:blur(120px);
  opacity:.22;
  z-index:-35;
  animation:glowMove 14s ease-in-out infinite;
}

.glow.one{
  width:420px;
  height:420px;
  background:#7c3aed;
  top:-120px;
  left:-120px;
}

.glow.two{
  width:360px;
  height:360px;
  background:#c084fc;
  bottom:-120px;
  right:-120px;
  animation-delay:3s;
}

@keyframes glowMove{
  0%,100%{
    transform:translateY(0px) scale(1);
  }
  50%{
    transform:translateY(50px) scale(1.15);
  }
}

/* NOISE */

.noise{
  position:fixed;
  inset:0;
  z-index:-20;

  opacity:.04;

  background-image:
    linear-gradient(rgba(255,255,255,.6) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.6) 1px, transparent 1px);

  background-size:3px 3px;
}

/* METEOR */

.meteor{
  position:fixed;

  width:3px;
  height:180px;

  background:
    linear-gradient(
      to bottom,
      rgba(255,255,255,1),
      rgba(255,255,255,0)
    );

  border-radius:999px;

  transform:rotate(45deg);

  filter:
    drop-shadow(0 0 12px white)
    drop-shadow(0 0 30px #c084fc);

  pointer-events:none;

  z-index:-10;

  animation:meteor linear forwards;
}

@keyframes meteor{
  from{
    transform:
      translate(0,0)
      rotate(45deg);
    opacity:1;
  }

  to{
    transform:
      translate(-1200px,1200px)
      rotate(45deg);
    opacity:0;
  }
}

/* PARTICLES */

.particle{
  position:fixed;
  border-radius:50%;
  background:white;
  opacity:.8;
  pointer-events:none;
  z-index:-5;
  animation:floatUp linear forwards;
}

@keyframes floatUp{
  from{
    transform:
      translateY(0)
      scale(.5);
    opacity:0;
  }

  10%{
    opacity:1;
  }

  to{
    transform:
      translateY(-120vh)
      scale(1.8);
    opacity:0;
  }
}

/* LAYOUT */

.container{
  width:min(1200px,92%);
  margin:auto;
  padding-bottom:120px;
}

/* HERO */

.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero-inner{
  width:100%;
}

.hero h1{
  font-size:clamp(78px,10vw,170px);
  font-weight:900;
  line-height:.9;
  letter-spacing:2px;
  margin-bottom:18px;

  background:
    linear-gradient(to bottom,#fff,#d8b4fe);

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  white-space:nowrap;
}

.hero h2{
  font-size:clamp(42px,5vw,92px);
  font-weight:900;
  color:#f5d0fe;
  margin-bottom:18px;

  white-space:nowrap;
}

.hero p{
  font-size:clamp(18px,2vw,30px);
  white-space:nowrap;
}

/* SECTION */

.section-head{
  text-align:center;
  margin-bottom:30px;
}

.section-head h2{
  font-size:clamp(28px,3vw,48px);
  font-weight:900;
  margin-bottom:12px;
}

/* FLYING */

.wish-cuucocanh{
  position:relative;
  width:100%;
  height:430px;
  overflow:hidden;
  border-radius:36px;

  background:
    linear-gradient(
      rgba(20,14,45,.72),
      rgba(8,5,18,.9)
    );

  border:1px solid rgba(255,255,255,.08);
}

/* CLOUD MESSAGE */

.flying-wish{
  position:absolute;
  bottom:-140px;

  min-width:180px;
  max-width:280px;

  padding:16px 20px;

  border-radius:999px;

  background:
    radial-gradient(circle at top,#fff,#f3e8ff 70%);

  color:#2d1b45;

  animation-name:flyUp;
  animation-timing-function:linear;
  animation-fill-mode:forwards;

  overflow:hidden;
}

.flying-wish strong{
  display:block;
  font-size:13px;
  color:#7c3aed;
  margin-bottom:4px;
}

.flying-wish span{
  font-size:13px;
  line-height:1.35;

  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;

  overflow:hidden;
  word-break:break-word;
}

@keyframes flyUp{
  0%{
    transform:translateY(0) scale(.7);
    opacity:0;
  }

  10%{
    opacity:1;
  }

  100%{
    transform:
      translateY(-850px)
      translateX(40px)
      scale(1.1);

    opacity:0;
  }
}

/* WALL */

.wall{
  margin-top:100px;
}

.wish-grid{
  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(420px,520px));

  justify-content:center;

  gap:40px;
}

/* SHEEP CARD */

.wish-card{
  position:relative;

  width:100%;
  max-width:520px;

  height:340px;

  background-image:url("./sheep.png");
  background-repeat:no-repeat;
  background-size:100% 100%;
  background-position:center;

  padding-top:72px;
  padding-left:165px;
  padding-right:90px;
  padding-bottom:55px;

  overflow:hidden;

  display:flex;
  flex-direction:column;
}

.wish-card strong{
  color:#ff4545;
  font-size:22px;
  font-weight:900;
  margin-bottom:12px;
  text-align:center;
}

.wish-card p{
  color:#2d1b45;

  font-size:18px;
  font-weight:800;

  line-height:1.4;

  max-width:240px;

  word-break:break-word;

  display:-webkit-box;
  -webkit-line-clamp:6;
  -webkit-box-orient:vertical;

  overflow:hidden;
}

/* MOBILE FIX */

@media(max-width:768px){

  .hero h1{
    font-size:44px;
    letter-spacing:-1px;
    white-space:nowrap;
  }

  .hero h2{
    font-size:25px;
    white-space:nowrap;
  }

  .hero p{
    font-size:12px;
    white-space:nowrap;
  }

  .wish-grid{
    grid-template-columns:1fr;
    gap:20px;
    justify-items:center;
  }

  .wish-card{

    max-width:350px;

    height:235px;

    padding-top:48px;
    padding-left:108px;
    padding-right:52px;
    padding-bottom:32px;
  }

  .wish-card strong{
    font-size:13px;
  }

  .wish-card p{
    font-size:12px;
    line-height:1.35;
    max-width:145px;

    -webkit-line-clamp:7;
  }

  .wish-cuucocanh{
    height:300px;
  }

}

</style>
</head>

<body>

<div class="bg"></div>

<canvas id="galaxy"></canvas>

<div class="glow one"></div>
<div class="glow two"></div>

<div class="noise"></div>

<div class="container">

<section class="hero">

<div class="hero-inner">

<h1>CAPTAIN BOY</h1>

<h2>TINH HÀ SAY HI</h2>

<p>✦ WISHING WALL ✦</p>

</div>

</section>

<section>

<div class="section-head">

<h2>CỪU CÓ CÁNH WITH LOVE</h2>

<p>Lời yêu thương dành cho CAPTAIN BOY ✦</p>

</div>

<div class="wish-cuucocanh" id="wishCuucocanh"></div>

</section>

<section class="wall">

<div class="section-head">

<h2>WALL OF LOVE</h2>

<p>Những lời nhắn đáng yêu từ Cừu Có Cánh ✦</p>

</div>

<div class="wish-grid" id="wishGrid"></div>

</section>

</div>

<script>

/* GALAXY */

const canvas =
document.getElementById("galaxy");

const ctx =
canvas.getContext("2d");

let stars = [];

function resizeGalaxy(){

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

}

resizeGalaxy();

window.addEventListener(
"resize",
resizeGalaxy
);

function createStars(){

stars = [];

for(let i=0;i<320;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

radius:Math.random()*2.5,

opacity:Math.random(),

speed:Math.random()*0.25,

glow:Math.random()*25

});

}

}

createStars();

function animateGalaxy(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

stars.forEach(star=>{

ctx.beginPath();

ctx.arc(
star.x,
star.y,
star.radius,
0,
Math.PI*2
);

ctx.fillStyle =
`rgba(255,255,255,${star.opacity})`;

ctx.shadowBlur =
star.glow;

ctx.shadowColor =
"#c084fc";

ctx.fill();

star.y += star.speed;

if(star.y > canvas.height){

star.y = 0;

star.x =
Math.random()*canvas.width;

}

});

requestAnimationFrame(
animateGalaxy
);

}

animateGalaxy();

/* PARTICLES */

function createParticle(){

const p =
document.createElement("div");

p.className = "particle";

p.style.left =
Math.random()*100 + "vw";

p.style.bottom = "-20px";

const size =
Math.random()*4 + 2;

p.style.width =
size + "px";

p.style.height =
size + "px";

p.style.animationDuration =
(7 + Math.random()*8) + "s";

document.body.appendChild(p);

setTimeout(()=>{
p.remove();
},16000);

}

setInterval(createParticle,220);

/* METEOR */

function createMeteor(){

const meteor =
document.createElement("div");

meteor.className = "meteor";

meteor.style.top =
Math.random()*35 + "vh";

meteor.style.left =
(80 + Math.random()*20) + "vw";

meteor.style.animationDuration =
(1 + Math.random()*1.2) + "s";

document.body.appendChild(meteor);

setTimeout(()=>{
meteor.remove();
},3000);

}

setInterval(createMeteor,1800);

</script>

</body>
</html>
