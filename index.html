<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
    <title>CAPTAIN BOY • CỪU CÓ CÁNH WISHES</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --p: #7c3aed; --pl: #d8b4fe; --bg: #05030d;
            --text: #ffffff; --card-t: #1a1a1a; --red: #ff3b3b;
            --gold: #ffcf4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif !important; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- VŨ TRỤ BACKGROUND --- */
        .universe { position: fixed; inset: 0; z-index: -10; pointer-events: none; }
        .nebula { position: absolute; inset: 0; background: url("./nền.png") center/cover no-repeat; opacity: 0.5; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--t) infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

        /* --- CONTAINER --- */
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 15px; position: relative; z-index: 20; }
        .intro-hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .intro-hero h1 { font-family: 'Montserrat', sans-serif !important; font-size: clamp(40px, 12vw, 110px); font-weight: 900; }
        .wishing-wall { font-family: 'Montserrat', sans-serif !important; font-size: clamp(26px, 8vw, 75px); font-weight: 900; background: linear-gradient(to bottom, #fff, var(--pl)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- GRID WALL --- */
        .grid-wall {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
            padding-bottom: 150px; position: relative;
        }
        @media (min-width: 768px) { .grid-wall { grid-template-columns: repeat(4, 1fr); gap: 30px; } }

        /* --- SHEEP CARD --- */
        .sheep-card {
            position: relative; width: 100%; aspect-ratio: 1 / 1.2;
            background: url("./sheep.png") center/contain no-repeat;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .card-inner {
            position: absolute; width: 75%; height: 50%; top: 22%;
            display: flex; flex-direction: column; align-items: center; text-align: center;
            overflow: hidden; pointer-events: none;
        }
        .card-inner b { color: var(--red); font-size: clamp(11px, 3.2vw, 14px); font-weight: 900; }
        .card-inner span { color: var(--card-t); font-weight: 700; font-size: clamp(9px, 2.5vw, 11px); line-height: 1.1; }

        /* --- NÚT "XEM LỜI CHÚC" - PHIÊN BẢN CỰC KỲ NỔI BẬT --- */
        .read-btn {
            position: absolute; 
            bottom: 5px; /* Đẩy sát xuống dưới cùng của con cừu */
            background: var(--gold);
            color: #000;
            border: 2px solid #fff;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(255, 207, 77, 0.5);
            animation: pulse-gold 1.5s infinite; /* Hiệu ứng nhấp nháy để người dùng thấy ngay */
            transition: 0.3s;
            text-transform: uppercase;
        }
        .read-btn:hover { background: #fff; transform: scale(1.1); }

        @keyframes pulse-gold {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 207, 77, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 207, 77, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 207, 77, 0); }
        }

        /* --- MODAL --- */
        .read-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center;
            z-index: 9999; padding: 20px; backdrop-filter: blur(15px);
        }
        .read-modal.active { display: flex; }
        .read-box {
            background: #fff; width: 100%; max-width: 480px; padding: 40px 30px;
            border-radius: 40px; color: #111; text-align: center; border: 5px solid var(--p);
        }
        .read-box h2 { font-size: 26px; color: var(--p); margin-bottom: 20px; font-weight: 900; }
        .read-box p { font-size: 18px; line-height: 1.7; font-weight: 600; color: #333; max-height: 50vh; overflow-y: auto; }

        /* UI CONTROLS */
        .btn-float {
            position: fixed; right: 20px; bottom: 30px;
            padding: 16px 25px; background: linear-gradient(135deg, var(--p), var(--pl));
            border: none; border-radius: 50px; color: #fff; font-weight: 900; z-index: 4000;
            cursor: pointer; box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5);
        }
        #musicBtn { position: fixed; left: 20px; bottom: 30px; width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; z-index: 4000;}

        .modal-form {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center; z-index: 4500;
        }
        .modal-form.active { display: flex; }
        .form-box { background: #111026; width: 90%; max-width: 400px; padding: 30px; border-radius: 25px; border: 1px solid var(--pl); }
        .st-input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; outline: none; }

        footer { text-align: center; padding: 60px; font-size: 10px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="universe">
        <div class="nebula"></div>
        <div id="starField"></div>
    </div>

    <div class="container">
        <header class="intro-hero">
            <div style="font-size: 10px; letter-spacing: 8px; opacity: 0.6; margin-bottom: 5px;">THE RETURN OF</div>
            <h1>CAPTAIN BOY</h1>
            <div class="wishing-wall">WISHING WALL</div>
            <div style="margin-top: 20px; font-weight: 800; color: var(--pl);">✦ TINH HÀ SAY HI ✦</div>
        </header>

        <section>
            <div style="text-align: center; margin: 40px 0 30px;">
                <h2 style="font-size: 30px; font-weight: 900;">WALL OF LOVE</h2>
                <p style="opacity: 0.8; font-size: 14px; color: var(--gold); font-weight: 800;">ẤN VÀO NÚT VÀNG TRÊN CON CỪU ĐỂ ĐỌC ✨</p>
            </div>
            <div class="grid-wall" id="wishGrid"></div>
        </section>

        <footer>PROJECT BY: TEAM BOT - NHỮNG CON BOT CỦA CAPTAIN BOY</footer>
    </div>

    <button class="btn-float" onclick="setModal('wishModal', true)">+ GỬI LỜI CHÚC</button>
    <button id="musicBtn">🔊</button>

    <!-- XEM CHI TIẾT -->
    <div class="read-modal" id="readModal" onclick="setModal('readModal', false)">
        <div class="read-box" onclick="event.stopPropagation()">
            <h2 id="readName">From: Cừu</h2>
            <div style="width: 50px; height: 3px; background: var(--p); margin: 0 auto 20px;"></div>
            <p id="readMsg">...</p>
            <button onclick="setModal('readModal', false)" style="margin-top:25px; width:100%; padding:15px; border-radius:20px; border:none; background:var(--p); color:#fff; font-weight:900; cursor:pointer">ĐÓNG</button>
        </div>
    </div>

    <!-- GỬI LỜI CHÚC -->
    <div class="modal-form" id="wishModal">
        <div class="form-box">
            <h2 style="margin-bottom:15px; font-weight:900; color:#fff; text-align: center;">Gửi Tín Hiệu ✨</h2>
            <input type="text" id="uName" class="st-input" placeholder="Tên của Cừu..." maxlength="25">
            <textarea id="uMsg" class="st-input" rows="5" placeholder="Gửi lời chúc đến CAPTAIN BOY..." maxlength="1000"></textarea>
            <button onclick="submitWish()" id="sendBtn" style="width:100%; padding:16px; background:var(--p); border:none; border-radius:15px; color:#fff; font-weight:900; cursor:pointer">GỬI NGAY ✨</button>
            <button onclick="setModal('wishModal', false)" style="width:100%; background:none; border:none; color:#666; margin-top:10px; cursor:pointer">Hủy</button>
        </div>
    </div>

    <audio id="bgm" loop src="./music.mp3"></audio>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzOb_fBFiq6VR_n2dN9QsNDUM2pMoSb2dSfw2Nz0dKLHBeberjyc49GJ_gk70kng2R2/exec";

        // Tinh hà
        const sf = document.getElementById("starField");
        for(let i=0; i<80; i++){
            const s = document.createElement("div"); s.className = "star";
            s.style.width = s.style.height = (Math.random()*2+1) + "px";
            s.style.left = Math.random()*100 + "%"; s.style.top = Math.random()*100 + "%";
            s.style.setProperty('--t', (Math.random()*3+2) + "s");
            sf.appendChild(s);
        }

        async function load() {
            try {
                const r = await fetch(API + "?action=list");
                const d = await r.json();
                if(d.approved) {
                    renderGrid(d.approved);
                }
            } catch(e) {}
        }

        function renderGrid(list) {
            const grid = document.getElementById("wishGrid");
            grid.innerHTML = list.slice().reverse().map(i => `
                <div class="sheep-card">
                    <div class="card-inner">
                        <b>${esc(i.name)}</b>
                        <span>${esc(i.message)}</span>
                    </div>
                    <button class="read-btn" onclick="openRead('${esc(i.name)}', '${esc(i.message)}')">ĐỌC NGAY ✨</button>
                </div>
            `).join("");
        }

        function openRead(name, msg) {
            document.getElementById("readName").innerText = "From: " + name;
            document.getElementById("readMsg").innerText = msg;
            setModal('readModal', true);
        }

        async function submitWish() {
            const n = document.getElementById("uName").value.trim();
            const m = document.getElementById("uMsg").value.trim();
            if(!n || !m) return alert("Điền đủ thông tin nha!");
            const btn = document.getElementById("sendBtn");
            btn.innerText = "ĐANG GỬI..."; btn.disabled = true;
            try {
                await fetch(API, { method:"POST", body: JSON.stringify({action:"submit", name:n, message:m, id:Date.now()}) });
                alert("Gửi thành công! Chờ duyệt nhé ✨");
                setModal('wishModal', false); location.reload();
            } catch(e) { alert("Lỗi!"); btn.disabled = false; }
        }

        function setModal(id, s) { 
            const m = document.getElementById(id);
            if(s) m.classList.add("active");
            else m.classList.remove("active");
        }
        
        function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        
        const bgm = document.getElementById("bgm");
        const mBtn = document.getElementById("musicBtn");
        mBtn.onclick = () => {
            if(bgm.paused) { bgm.play(); mBtn.innerHTML = "🔊"; }
            else { bgm.pause(); mBtn.innerHTML = "🔇"; }
        }

        load();
    </script>
</body>
</html>
