<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>CAPTAIN BOY • TINH HÀ SAY HI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- FONT ĐẸP HƠN -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#8b5cf6;
  --primary2:#c084fc;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:'Inter',sans-serif;
  background:#050510;
  color:#fff;
  overflow-x:hidden;
  min-height:100vh;
}

/* =========================
BACKGROUND GALAXY
========================= */

.bg{
  position:fixed;
  inset:0;
  z-index:-10;

  background:
    linear-gradient(
      rgba(5,5,16,.45),
      rgba(5,5,16,.78)
    ),
    url("./nền.png");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  animation:bgMove 30s linear infinite;
}

@keyframes bgMove{
  0%{
    transform:scale(1);
  }
  50%{
    transform:scale(1.05);
  }
  100%{
    transform:scale(1);
  }
}

/* =========================
GALAXY LAYER
========================= */

#galaxy{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:-8;
}

/* =========================
PURPLE GLOW
========================= */

.glow{
  position:fixed;
  border-radius:50%;
  filter:blur(120px);
  opacity:.28;
  z-index:-7;
  animation:floatGlow 12s ease-in-out infinite;
}

.glow.one{
  width:420px;
  height:420px;
  background:#7c3aed;
  top:-120px;
  left:-100px;
}

.glow.two{
  width:350px;
  height:350px;
  background:#c084fc;
  bottom:-120px;
  right:-80px;
  animation-delay:4s;
}

@keyframes floatGlow{
  0%,100%{
    transform:translateY(0);
  }
  50%{
    transform:translateY(40px);
  }
}

/* =========================
METEOR
========================= */

.meteor{
  position:fixed;

  width:2px;
  height:160px;

  background:
    linear-gradient(
      to bottom,
      rgba(255,255,255,1),
      rgba(255,255,255,0)
    );

  transform:rotate(45deg);

  filter:
    drop-shadow(0 0 18px #fff);

  z-index:-5;

  animation:meteorFly linear forwards;
}

@keyframes meteorFly{

  from{
    transform:
      translate(0,0)
      rotate(45deg);

    opacity:1;
  }

  to{
    transform:
      translate(-1000px,1000px)
      rotate(45deg);

    opacity:0;
  }

}

/* =========================
PARTICLE
========================= */

.particle{
  position:fixed;
  border-radius:50%;
  background:white;
  pointer-events:none;
  z-index:-6;

  animation:particleFloat linear forwards;
}

@keyframes particleFloat{

  from{
    transform:
      translateY(0)
      scale(.5);

    opacity:0;
  }

  10%{
    opacity:1;
  }

  to{
    transform:
      translateY(-120vh)
      scale(1.8);

    opacity:0;
  }

}

/* =========================
CONTAINER
========================= */

.container{
  width:min(1200px,92%);
  margin:auto;
  padding-bottom:120px;
}

/* =========================
HERO
========================= */

.hero{
  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  text-align:center;

  position:relative;
}

.hero-inner{
  width:100%;
}

/* CHỮ KHÔNG BỊ ĐẨY XUỐNG */
.hero h1{

  font-family:'Orbitron',sans-serif;

  font-size:clamp(60px,9vw,140px);

  font-weight:900;

  line-height:1;

  letter-spacing:4px;

  margin-bottom:18px;

  white-space:nowrap;

  background:
    linear-gradient(
      to bottom,
      #ffffff,
      #d8b4fe
    );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
    0 0 30px rgba(168,85,247,.45);
}

.hero h2{

  font-size:clamp(34px,5vw,72px);

  font-weight:900;

  color:#f5d0fe;

  margin-bottom:18px;

  white-space:nowrap;

  text-shadow:
    0 0 25px rgba(192,132,252,.45);
}

.hero p{

  font-size:clamp(16px,2vw,28px);

  color:#fff;

  white-space:nowrap;

  letter-spacing:1px;
}

/* =========================
SECTION HEAD
========================= */

.section-head{
  text-align:center;
  margin-bottom:28px;
}

.section-head h2{
  font-size:clamp(24px,3vw,44px);
  margin-bottom:10px;
  font-weight:900;
}

.section-head p{
  color:rgba(255,255,255,.72);
}

/* =========================
FLYING SECTION
========================= */

.wish-cuucocanh{
  position:relative;

  width:100%;
  height:420px;

  overflow:hidden;

  border-radius:36px;

  background:
    linear-gradient(
      rgba(18,12,40,.55),
      rgba(10,8,25,.82)
    );

  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(12px);
}

/* =========================
FLYING WISH
========================= */

.flying-wish{
  position:absolute;

  bottom:-120px;

  min-width:180px;
  max-width:300px;

  padding:18px 24px;

  border-radius:999px;

  background:
    radial-gradient(circle at top,
    #fff,
    #f3e8ff 70%);

  color:#2d1b45;

  box-shadow:
    0 10px 30px rgba(168,85,247,.35);

  animation-name:flyUp;
  animation-timing-function:linear;
  animation-fill-mode:forwards;

  filter:
    drop-shadow(0 0 16px rgba(255,255,255,.4));
}

.flying-wish::before{
  content:"";

  position:absolute;

  width:50px;
  height:50px;

  border-radius:50%;

  background:#f3e8ff;

  left:20px;
  top:-20px;

  z-index:-1;
}

.flying-wish::after{
  content:"";

  position:absolute;

  width:35px;
  height:35px;

  border-radius:50%;

  background:#f3e8ff;

  right:25px;
  top:-12px;

  z-index:-1;
}

.flying-wish strong{
  display:block;
  color:#7c3aed;
  margin-bottom:6px;
  font-size:14px;
}

.flying-wish span{
  font-size:14px;
  line-height:1.5;
}

@keyframes flyUp{

  0%{
    transform:
      translateY(0)
      scale(.7);

    opacity:0;
  }

  10%{
    opacity:1;
  }

  100%{
    transform:
      translateY(-850px)
      translateX(40px)
      scale(1.1);

    opacity:0;
  }

}

/* =========================
WALL
========================= */

.wall{
  margin-top:90px;
}

.wish-grid{
  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(420px,520px));

  justify-content:center;

  gap:36px;
}

/* =========================
SHEEP CARD
========================= */

.wish-card{
  position:relative;

  width:100%;
  max-width:520px;

  height:340px;

  background-image:url("./sheep.png");

  background-repeat:no-repeat;
  background-size:100% 100%;
  background-position:center;

  padding-top:72px;
  padding-left:165px;
  padding-right:95px;
  padding-bottom:60px;

  overflow:hidden;

  transition:.35s ease;

  display:flex;
  flex-direction:column;
}

.wish-card:hover{
  transform:translateY(-6px) scale(1.02);
}

.wish-card strong{
  display:block;

  color:#ff4b4b;

  font-size:22px;
  font-weight:900;

  margin-bottom:16px;

  text-align:center;
}

.wish-card p{
  color:#2d1b45;

  font-size:20px;
  font-weight:800;

  line-height:1.45;

  white-space:pre-wrap;
  word-break:break-word;

  max-width:250px;
}

/* =========================
BUTTON
========================= */

.floating-btn{
  position:fixed;

  right:24px;
  bottom:24px;

  z-index:999;

  border:none;
  cursor:pointer;

  padding:16px 28px;

  border-radius:999px;

  background:
    linear-gradient(
      135deg,
      #8b5cf6,
      #c084fc
    );

  color:white;

  font-size:15px;
  font-weight:800;

  font-family:'Inter',sans-serif;

  box-shadow:
    0 12px 35px rgba(124,58,237,.42);

  transition:.3s;
}

.floating-btn:hover{
  transform:translateY(-4px);
}

/* =========================
MODAL
========================= */

.modal{
  position:fixed;
  inset:0;

  z-index:9999;

  background:rgba(0,0,0,.72);

  display:none;

  align-items:center;
  justify-content:center;

  padding:20px;

  backdrop-filter:blur(8px);
}

.modal.active{
  display:flex;
}

.modal-box{
  width:min(520px,100%);

  background:rgba(17,13,35,.96);

  border-radius:32px;

  padding:34px;

  position:relative;

  border:1px solid rgba(255,255,255,.08);
}

.close{
  position:absolute;

  right:18px;
  top:10px;

  border:none;
  background:none;

  color:white;

  font-size:34px;

  cursor:pointer;
}

.modal-box h3{
  font-size:34px;
  margin-bottom:10px;
}

.sub{
  color:rgba(255,255,255,.7);
  margin-bottom:24px;
}

.input-group{
  margin-bottom:18px;
}

.input-group label{
  display:block;
  margin-bottom:8px;
  font-size:14px;
}

.input-group input,
.input-group textarea{

  width:100%;

  border:none;
  outline:none;

  border-radius:18px;

  padding:16px 18px;

  background:rgba(255,255,255,.05);

  color:white;

  font-size:15px;

  font-family:'Inter',sans-serif;

  resize:none;
}

.submit-btn{

  width:100%;

  border:none;
  cursor:pointer;

  padding:18px;

  border-radius:20px;

  background:
    linear-gradient(
      135deg,
      #8b5cf6,
      #c084fc
    );

  color:white;

  font-size:16px;
  font-weight:800;

  font-family:'Inter',sans-serif;
}

/* =========================
MUSIC
========================= */

#musicBtn{
  position:fixed;

  left:24px;
  bottom:24px;

  z-index:999;

  width:58px;
  height:58px;

  border:none;
  border-radius:50%;

  background:
    linear-gradient(
      135deg,
      #8b5cf6,
      #c084fc
    );

  color:white;

  font-size:24px;

  cursor:pointer;
}

/* =========================
FOOTER
========================= */

.footer{
  margin-top:90px;
  text-align:center;
  color:rgba(255,255,255,.5);
  font-size:14px;
}

/* =========================
MOBILE FIX
========================= */

@media(max-width:768px){

  body{
    overflow-x:hidden;
  }

  .container{
    width:100%;
    padding-left:14px;
    padding-right:14px;
  }

  /* FIX CHÍNH */
  .hero{

    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    padding-top:20px;
    padding-bottom:20px;
  }

  .hero-inner{
    transform:translateY(-20px);
  }

  /* KHÔNG CHO BỊ CHE */
  .hero h1{

    font-size:48px;

    letter-spacing:2px;

    line-height:1.05;

    white-space:nowrap;

    margin-bottom:14px;
  }

  .hero h2{

    font-size:34px;

    white-space:nowrap;

    margin-bottom:14px;
  }

  .hero p{

    font-size:15px;

    white-space:nowrap;
  }

  /* CHỈ THẤY HERO KHI MỞ */
  .wall{
    margin-top:80px;
  }

  .wish-cuucocanh{
    height:280px;
    border-radius:24px;
  }

  .wish-grid{
    grid-template-columns:1fr;
    gap:22px;
  }

  /* CARD CỪU */
  .wish-card{

    max-width:100%;

    height:245px;

    padding-top:52px;
    padding-left:118px;
    padding-right:52px;
    padding-bottom:45px;
  }

  .wish-card strong{

    font-size:16px;

    margin-bottom:10px;
  }

  .wish-card p{

    font-size:14px;

    max-width:160px;

    line-height:1.35;
  }

  .floating-btn{

    right:14px;
    bottom:14px;

    padding:14px 18px;

    font-size:13px;
  }

  #musicBtn{

    width:50px;
    height:50px;

    left:14px;
    bottom:14px;

    font-size:20px;
  }

}

</style>
</head>

<body>

<div class="bg"></div>

<canvas id="galaxy"></canvas>

<div class="glow one"></div>
<div class="glow two"></div>

<div class="container">

<section class="hero">

<div class="hero-inner">

<h1>CAPTAIN BOY</h1>

<h2>TINH HÀ SAY HI</h2>

<p>
✦ WISHING WALL ✦
</p>

</div>

</section>

<section>

<div class="section-head">

<h2>
CỪU CÓ CÁNH WITH LOVE
</h2>

<p>
Lời yêu thương dành cho CAPTAIN BOY ✦
</p>

</div>

<div class="wish-cuucocanh" id="wishCuucocanh"></div>

</section>

<section class="wall">

<div class="section-head">

<h2>WALL OF LOVE</h2>

<p>
Lời yêu thương từ Cừu Có Cánh ✦
</p>

</div>

<div class="wish-grid" id="wishGrid"></div>

</section>

<div class="footer">
PROJECT BY TEAM BOT • CAPTAIN BOY
</div>

</div>

<button class="floating-btn" onclick="toggleModal(true)">
✨ GỬI LỜI CHÚC
</button>

<div class="modal" id="wishModal">

<div class="modal-box">

<button class="close" onclick="toggleModal(false)">
×
</button>

<h3>Gửi lời đến CAPTAIN BOY</h3>

<div class="sub">
Lời nhắn sẽ được hiển thị sau khi admin duyệt
</div>

<form id="wishForm">

<div class="input-group">

<label>Tên của bạn</label>

<input
type="text"
id="userName"
maxlength="30"
required>

</div>

<div class="input-group">

<label>Lời chúc</label>

<textarea
id="userMsg"
rows="5"
maxlength="180"
required></textarea>

</div>

<button class="submit-btn" id="submitBtn" type="submit">
GỬI NGAY ✨
</button>

</form>

</div>

</div>

<audio id="bgMusic" loop>
<source src="./music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🔊</button>

<script>

/* =========================
CONFIG
========================= */

const CONFIG = {

googleScriptUrl:
"https://script.google.com/macros/s/AKfycbzOb_fBFiq6VR_n2dN9QsNDUM2pMoSb2dSfw2Nz0dKLHBeberjyc49GJ_gk70kng2R2/exec"

};

let listApproved = [];
let flyInterval = null;

/* =========================
MODAL
========================= */

function toggleModal(show){

document
.getElementById("wishModal")
.classList.toggle("active",show);

}

/* =========================
FETCH
========================= */

async function fetchWishes(){

try{

const response = await fetch(
CONFIG.googleScriptUrl + "?action=list"
);

const data = await response.json();

if(data.approved){

listApproved = data.approved;

renderWall();

startFlying();

}

}catch(err){

console.log(err);

}

}

/* =========================
RENDER WALL
========================= */

function renderWall(){

const grid =
document.getElementById("wishGrid");

if(!listApproved.length){

grid.innerHTML = `
<div class="wish-card">
<strong>From: CỪU CÓ CÁNH</strong>
<p>Chưa có lời chúc nào ✨</p>
</div>
`;

return;

}

grid.innerHTML = listApproved
.slice()
.reverse()
.map(item => `

<div class="wish-card">

<strong>
From: ${escapeHtml(item.name)}
</strong>

<p>
${escapeHtml(item.message)}
</p>

</div>

`).join("");

}

/* =========================
FLYING
========================= */

function startFlying(){

const box =
document.getElementById("wishCuucocanh");

box.innerHTML = "";

if(flyInterval){
clearInterval(flyInterval);
}

function createWish(){

const wish =
listApproved[
Math.floor(Math.random()*listApproved.length)
];

if(!wish) return;

const el =
document.createElement("div");

el.className = "flying-wish";

el.style.left =
Math.random()*80 + "%";

el.style.animationDuration =
(8 + Math.random()*4) + "s";

el.innerHTML = `
<strong>${escapeHtml(wish.name)}</strong>
<span>${escapeHtml(wish.message)}</span>
`;

box.appendChild(el);

setTimeout(()=>{
el.remove();
},13000);

}

for(let i=0;i<6;i++){
setTimeout(createWish,i*1000);
}

flyInterval =
setInterval(createWish,2200);

}

/* =========================
SUBMIT
========================= */

document
.getElementById("wishForm")
.addEventListener("submit",async(e)=>{

e.preventDefault();

const btn =
document.getElementById("submitBtn");

const name =
document.getElementById("userName")
.value.trim();

const message =
document.getElementById("userMsg")
.value.trim();

if(!name || !message){

alert("Vui lòng nhập đầy đủ ✨");
return;

}

btn.disabled = true;
btn.innerText = "ĐANG GỬI...";

try{

const response = await fetch(
CONFIG.googleScriptUrl,
{
method:"POST",

headers:{
"Content-Type":"text/plain;charset=utf-8"
},

body:JSON.stringify({

action:"submit",

id:Date.now(),

name,

message,

createdAt:new Date().toISOString()

})

}
);

const data = await response.json();

if(data.ok){

alert("Đã gửi thành công ✨");

document
.getElementById("wishForm")
.reset();

toggleModal(false);

}else{

alert("Gửi thất bại 😭");

}

}catch(err){

alert("Lỗi kết nối Apps Script");

}finally{

btn.disabled = false;
btn.innerText = "GỬI NGAY ✨";

}

});

/* =========================
ESCAPE HTML
========================= */

function escapeHtml(text){

const div =
document.createElement("div");

div.textContent = text;

return div.innerHTML;

}

/* =========================
GALAXY
========================= */

const canvas =
document.getElementById("galaxy");

const ctx =
canvas.getContext("2d");

let stars = [];

function resizeGalaxy(){

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

}

resizeGalaxy();

window.addEventListener(
"resize",
resizeGalaxy
);

function createStars(){

stars = [];

for(let i=0;i<260;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

radius:Math.random()*2.2,

opacity:Math.random(),

speed:Math.random()*0.2,

glow:Math.random()*20

});

}

}

createStars();

function animateGalaxy(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

stars.forEach(star=>{

ctx.beginPath();

ctx.arc(
star.x,
star.y,
star.radius,
0,
Math.PI*2
);

ctx.fillStyle =
`rgba(255,255,255,${star.opacity})`;

ctx.shadowBlur =
star.glow;

ctx.shadowColor =
"#c084fc";

ctx.fill();

star.y += star.speed;

if(star.y > canvas.height){

star.y = 0;

star.x =
Math.random()*canvas.width;

}

});

requestAnimationFrame(
animateGalaxy
);

}

animateGalaxy();

/* =========================
PARTICLE
========================= */

function createParticle(){

const p =
document.createElement("div");

p.className = "particle";

p.style.left =
Math.random()*100 + "vw";

p.style.bottom = "-20px";

const size =
Math.random()*4 + 2;

p.style.width =
size + "px";

p.style.height =
size + "px";

p.style.animationDuration =
(7 + Math.random()*8) + "s";

document.body.appendChild(p);

setTimeout(()=>{
p.remove();
},16000);

}

setInterval(createParticle,200);

/* =========================
METEOR
========================= */

function createMeteor(){

const meteor =
document.createElement("div");

meteor.className = "meteor";

meteor.style.top =
Math.random()*40 + "vh";

meteor.style.left =
(75 + Math.random()*20) + "vw";

meteor.style.animationDuration =
(1 + Math.random()*1.2) + "s";

document.body.appendChild(meteor);

setTimeout(()=>{
meteor.remove();
},3000);

}

setInterval(createMeteor,2600);

/* =========================
MUSIC
========================= */

const music =
document.getElementById("bgMusic");

const musicBtn =
document.getElementById("musicBtn");

music.volume = 0.5;

document.addEventListener("click",()=>{

if(music.paused){

music.play().catch(()=>{});

}

},{once:true});

musicBtn.addEventListener("click",(e)=>{

e.stopPropagation();

if(music.paused){

music.play();
musicBtn.innerHTML = "🔊";

}else{

music.pause();
musicBtn.innerHTML = "🔇";

}

});

/* =========================
INIT
========================= */

fetchWishes();

setInterval(fetchWishes,30000);

</script>

</body>
</html>
