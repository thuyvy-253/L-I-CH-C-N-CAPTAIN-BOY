<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>CAPTAIN BOY • TINH HÀ SAY HI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */
:root{
  --primary:#8b5cf6;
  --primary2:#c084fc;
  --bg:#05010f;
}

/* ================= RESET ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  max-width:100%;
  overflow-x:hidden;
  font-family:'Inter',sans-serif;
  background:#05010f;
  color:#fff;
}

/* ================= BACKGROUND ================= */
.bg{
  position:fixed;
  inset:0;
  z-index:-50;
  background:
    linear-gradient(rgba(5,1,15,.4),rgba(5,1,15,.8)),
    url("./nền.png");
  background-size:cover;
  background-position:center;
}

/* ================= GALAXY ================= */
#galaxy{
  position:fixed;
  inset:0;
  z-index:-40;
}

/* ================= GLOW ================= */
.glow{
  position:fixed;
  border-radius:50%;
  filter:blur(120px);
  opacity:.22;
  z-index:-35;
  animation:glowMove 14s ease-in-out infinite;
}

.glow.one{
  width:420px;height:420px;
  background:#7c3aed;
  top:-120px;left:-120px;
}

.glow.two{
  width:360px;height:360px;
  background:#c084fc;
  bottom:-120px;right:-120px;
  animation-delay:3s;
}

@keyframes glowMove{
  0%,100%{transform:translateY(0) scale(1);}
  50%{transform:translateY(50px) scale(1.15);}
}

/* ================= NOISE ================= */
.noise{
  position:fixed;
  inset:0;
  z-index:-20;
  opacity:.04;
  background-image:
    linear-gradient(rgba(255,255,255,.6)1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.6)1px,transparent 1px);
  background-size:3px 3px;
}

/* ================= LAYOUT ================= */
.container{
  width:min(1200px,92%);
  margin:auto;
  padding-bottom:120px;
}

/* ================= HERO ================= */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1{
  font-size:clamp(50px,10vw,160px);
  font-weight:900;
  line-height:.9;
}

.hero h2{
  font-size:clamp(26px,6vw,80px);
  color:#f5d0fe;
}

/* ================= SECTION ================= */
.section-head{
  text-align:center;
  margin-bottom:30px;
}

.section-head h2{
  font-size:clamp(24px,5vw,48px);
  font-weight:900;
}

/* ================= FLY AREA ================= */
.wish-cuucocanh{
  position:relative;
  width:100%;
  height:420px;
  border-radius:30px;
  overflow:hidden;
  background:rgba(20,14,45,.7);
}

/* ================= FLY WISH ================= */
.flying-wish{
  position:absolute;
  bottom:-120px;
  max-width:260px;
  padding:14px 18px;
  border-radius:999px;
  background:#fff;
  animation:flyUp linear forwards;
}

@keyframes flyUp{
  0%{transform:translateY(0);opacity:0}
  10%{opacity:1}
  100%{transform:translateY(-800px);opacity:0}
}

.flying-wish strong{
  color:#7c3aed;
}

/* ================= WALL ================= */
.wish-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

/* ================= SHEEP CARD AUTO HEIGHT FIX ================= */
.wish-card{
  width:100%;
  max-width:520px;

  /* AUTO HEIGHT */
  height:auto;
  min-height:260px;

  margin:auto;

  background:url("./sheep.png") center/contain no-repeat;

  padding:70px 95px 50px 130px;

  display:flex;
  flex-direction:column;

  overflow:hidden;

  transition:.3s;
}

.wish-card strong{
  color:#ff3b3b;
  font-size:16px;
  font-weight:900;
  text-align:center;
}

.wish-card p{
  color:#2d1b45;
  font-size:14px;
  font-weight:800;
  line-height:1.4;

  white-space:pre-wrap;
  word-break:break-word;

  max-width:100%;
}

/* ================= BUTTON ================= */
.floating-btn{
  position:fixed;
  right:20px;
  bottom:20px;
  padding:14px 20px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,#8b5cf6,#c084fc);
  color:#fff;
  font-weight:900;
  z-index:999;
}

/* ================= MODAL ================= */
.modal{
  position:fixed;
  inset:0;
  display:none;
  background:rgba(0,0,0,.7);
  justify-content:center;
  align-items:center;
}

.modal.active{display:flex;}

.modal-box{
  width:min(420px,92%);
  background:#120a25;
  padding:24px;
  border-radius:20px;
}

/* ================= MOBILE FIX ================= */
@media(max-width:768px){

  .hero h1{
    font-size:42px;
  }

  .hero h2{
    font-size:24px;
  }

  .wish-card{
    padding:50px 60px 40px 90px;
    min-height:200px;
  }

  .wish-card p{
    font-size:12px;
  }

}

</style>
</head>

<body>

<div class="bg"></div>
<canvas id="galaxy"></canvas>
<div class="glow one"></div>
<div class="glow two"></div>
<div class="noise"></div>

<div class="container">

  <section class="hero">
    <div>
      <h1>CAPTAIN BOY</h1>
      <h2>TINH HÀ SAY HI</h2>
    </div>
  </section>

  <section>
    <div class="section-head">
      <h2>CỪU CÓ CÁNH</h2>
    </div>

    <div class="wish-cuucocanh" id="wishCuucocanh"></div>
  </section>

  <section class="wall">
    <div class="section-head">
      <h2>WALL OF LOVE</h2>
    </div>

    <div class="wish-grid" id="wishGrid"></div>
  </section>

</div>

<button class="floating-btn">GỬI LỜI</button>

<script>

/* ================= SIMPLE GALAXY ================= */
const canvas = document.getElementById("galaxy");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize",resize);

let stars=[];
for(let i=0;i<200;i++){
  stars.push({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    r:Math.random()*2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let s of stars){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
    s.y+=0.2;
    if(s.y>canvas.height)s.y=0;
  }
  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
