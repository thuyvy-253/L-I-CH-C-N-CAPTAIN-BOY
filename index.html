<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CAPTAIN BOY • TINH HÀ SAY HI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */
:root{
  --primary:#7c3aed;
  --primary2:#a78bfa;
  --bg:#060510;
  --text:#fff;
  --muted:rgba(255,255,255,.7);
}

/* ================= RESET (FIX MOBILE GỐC LỖI) ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  max-width:100%;
  overflow-x:hidden; /* 🔥 FIX CHÍNH */
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.5;
}

/* ================= GALAXY BACKGROUND PRO MAX ================= */
.bg{
  position:fixed;
  inset:0;
  z-index:-10;
  background:
  radial-gradient(circle at top,#7c3aed33,transparent 40%),
  radial-gradient(circle at bottom,#a78bfa22,transparent 40%);
}

/* ================= STAR FIELD ================= */
.stars{
  position:fixed;
  inset:0;
  z-index:-9;
  pointer-events:none;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:#fff;
  border-radius:50%;
  animation:twinkle 4s infinite ease-in-out;
}

@keyframes twinkle{
  0%,100%{opacity:.2;transform:scale(1)}
  50%{opacity:1;transform:scale(1.8)}
}

/* ================= SHOOTING STAR ================= */
.shooting-star{
  position:absolute;
  width:160px;
  height:2px;
  background:linear-gradient(90deg,#fff,transparent);
  transform:rotate(-25deg);
  animation:shoot 7s linear infinite;
  opacity:.8;
}

@keyframes shoot{
  0%{transform:translate(-300px,-200px) rotate(-25deg);opacity:0}
  10%{opacity:1}
  100%{transform:translate(1400px,800px) rotate(-25deg);opacity:0}
}

/* ================= CLOUDS FLOAT ================= */
.clouds{
  position:fixed;
  inset:0;
  z-index:-8;
  pointer-events:none;
  opacity:.12;
}

.cloud{
  position:absolute;
  width:220px;
  height:60px;
  background:#fff;
  border-radius:999px;
  filter:blur(2px);
  animation:cloudMove 70s linear infinite;
}

@keyframes cloudMove{
  from{transform:translateX(-400px)}
  to{transform:translateX(1800px)}
}

/* ================= SAFE CONTAINER ================= */
.container{
  width:100%;
  max-width:1180px;
  margin:auto;
  padding:0 14px;
}

/* ================= HERO (GIỮ UI GỐC) ================= */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:60px 0;
}

.hero h1{
  font-size:clamp(42px,9vw,140px);
  font-weight:900;
  line-height:1;
  word-break:break-word;
}

/* ================= SECTION TITLE FIX ================= */
.section-head h2{
  font-size:clamp(22px,5vw,46px);
  font-weight:900;
  text-align:center;
  word-break:break-word;
}

.section-head p{
  text-align:center;
  color:var(--muted);
}

/* ================= CUU CO CANH ================= */
.wish-cuucocanh{
  position:relative;
  width:100%;
  height:420px;
  border-radius:32px;
  overflow:hidden;
  background:rgba(20,18,40,.7);
}

/* ================= FLY WISH ================= */
.flying-wish{
  position:absolute;
  bottom:-120px;
  left:0;

  max-width:260px;
  padding:14px 18px;

  border-radius:999px;
  background:#fff;

  animation:flyUp linear forwards;
}

@keyframes flyUp{
  0%{transform:translateY(0);opacity:0}
  10%{opacity:1}
  100%{transform:translateY(-800px);opacity:0}
}

.flying-wish strong{
  font-size:12px;
  color:#7c3aed;
}

.flying-wish span{
  font-size:12px;
  color:#222;
}

/* ================= WALL ================= */
.wish-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:18px;
  margin-top:20px;
}

/* ================= SHEEP CARD (GIỮ NGUYÊN DESIGN GỐC) ================= */
.wish-card{
  position:relative;
  width:100%;
  max-width:520px;
  height:340px;
  margin:auto;

  background:url("./sheep.png") center/contain no-repeat;

  padding:70px 95px 50px 130px;

  overflow:hidden;

  display:flex;
  flex-direction:column;
}

.wish-card strong{
  font-size:18px;
  font-weight:900;
  color:#ff3b3b;

  text-align:center;

  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.wish-card p{
  font-size:16px;
  font-weight:700;
  color:#222;

  line-height:1.4;

  display:-webkit-box;
  -webkit-line-clamp:5;
  -webkit-box-orient:vertical;

  overflow:hidden;
}

/* ================= BUTTON ================= */
.floating-btn{
  position:fixed;
  right:20px;
  bottom:20px;

  padding:16px 22px;

  border:none;
  border-radius:999px;

  background:linear-gradient(135deg,#7c3aed,#a78bfa);
  color:#fff;

  font-weight:900;
  font-size:14px;

  z-index:999;
}

/* ================= MODAL ================= */
.modal{
  position:fixed;
  inset:0;
  display:none;
  background:rgba(0,0,0,.7);
  justify-content:center;
  align-items:center;
  padding:16px;
}

.modal.active{display:flex;}

.modal-box{
  width:100%;
  max-width:420px;
  background:#15122a;
  padding:24px;
  border-radius:22px;
}

/* ================= MOBILE PRO FIX (QUAN TRỌNG NHẤT) ================= */
@media (max-width:768px){

  html,body{
    overflow-x:hidden;
  }

  .hero h1{
    font-size:36px;
  }

  .wish-card{
    height:240px;
    padding:55px 70px 40px 90px;
  }

  .wish-card strong{
    font-size:14px;
  }

  .wish-card p{
    font-size:13px;
  }

  .wish-grid{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- GALAXY FX -->
<div class="stars" id="stars"></div>

<div class="clouds">
  <div class="cloud"></div>
</div>

<div class="container">

  <section class="hero">
    <div>
      <h1>CAPTAIN BOY</h1>
      <div class="section-head">
        <h2>WISHING WALL</h2>
        <p>✦ TINH HÀ SAY HI ✦</p>
      </div>
    </div>
  </section>

  <section>
    <div class="section-head">
      <h2>CỪU CÓ CÁNH</h2>
      <p>Lời chúc bay lên ✨</p>
    </div>

    <div class="wish-cuucocanh" id="wishCuucocanh"></div>
  </section>

  <section>
    <div class="section-head">
      <h2>WALL OF LOVE</h2>
    </div>

    <div class="wish-grid" id="wishGrid"></div>
  </section>

</div>

<button class="floating-btn">GỬI LỜI</button>

<script>

/* ================= STARS INIT PRO ================= */
const stars = document.getElementById("stars");

for(let i=0;i<140;i++){
  const s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*100+"%";
  s.style.animationDelay=Math.random()*5+"s";
  stars.appendChild(s);
}

/* ================= KEEP YOUR BACKEND LOGIC ================= */
/* (không đụng code gửi/nhận của bạn để tránh lỗi) */

</script>

</body>
</html>
