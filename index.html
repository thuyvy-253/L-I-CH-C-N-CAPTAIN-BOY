<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
    :root {
        --p: #7c3aed; --pl: #d8b4fe; --bg: #05030d;
        --text: #ffffff; --card-t: #1a1a1a; --red: #ff3b3b;
    }

    /* FIX FULL PHÔNG CHỮ */
    * { 
        margin: 0; padding: 0; box-sizing: border-box; 
        font-family: 'Inter', sans-serif !important; 
    }
    
    html { scroll-behavior: smooth; }
    
    body {
        background: var(--bg);
        color: var(--text); 
        overflow-x: hidden; 
        line-height: 1.4;
    }

    /* --- VŨ TRỤ BACKGROUND --- */
    .universe { 
        position: fixed; inset: 0; z-index: -10; 
        background: #05030d; pointer-events: none;
    }
    .nebula {
        position: absolute; inset: 0;
        background: url("./nền.png") center/cover no-repeat;
        opacity: 0.5; filter: saturate(1.4); pointer-events: none;
    }
    .star {
        position: absolute; background: #fff; border-radius: 50%;
        box-shadow: 0 0 8px #fff; animation: twinkle var(--t) infinite ease-in-out;
        pointer-events: none;
    }
    @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
    
    .galaxy-rain {
        position: absolute; width: 1.5px; height: 120px;
        background: linear-gradient(to bottom, #fff, transparent);
        animation: rain var(--d) linear infinite; opacity: 0.4;
        pointer-events: none;
    }
    @keyframes rain { from { transform: translateY(-150px); } to { transform: translateY(110vh); } }

    /* --- INTRO HERO --- */
    .intro-hero {
        height: 100vh; display: flex; flex-direction: column;
        justify-content: center; align-items: center; text-align: center;
        position: relative;
    }
    
    .intro-hero h1 {
        font-family: 'Montserrat', sans-serif !important;
        font-size: clamp(40px, 12vw, 110px); font-weight: 900;
        line-height: 0.9; color: #fff; margin-bottom: 10px;
        text-transform: uppercase;
    }
    .intro-hero .wishing-wall {
        font-family: 'Montserrat', sans-serif !important;
        font-size: clamp(26px, 8vw, 75px); font-weight: 900;
        background: linear-gradient(to bottom, #fff, var(--pl));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 15px var(--p));
    }
    .intro-hero .sub-title {
        font-size: clamp(10px, 3.2vw, 20px); font-weight: 700;
        letter-spacing: 2px; margin-top: 25px; opacity: 0.9;
    }
    .scroll-hint {
        position: absolute; bottom: 30px; font-size: 11px;
        letter-spacing: 2px; opacity: 0.6; animation: bounce 2s infinite;
    }
    @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }

    /* --- CONTAINER & PYRAMID BOX (FIX LỖI CẮT NỀN) --- */
    .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 10px; position: relative; }
    
    .pyramid-box {
        position: relative; width: 100%; height: 350px; margin: 40px 0;
        background: rgba(255,255,255,0.04); border-radius: 30px;
        border: 1px solid rgba(255,255,255,0.1); 
        overflow: hidden; /* Vẫn giữ overflow hidden nhưng bỏ clip-path */
        backdrop-filter: blur(10px);
        pointer-events: none;
    }

    .fly-card {
        position: absolute; background: rgba(255, 255, 255, 0.95);
        padding: 12px 18px; border-radius: 15px; color: #111;
        font-size: 11px; font-weight: 700; box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        animation: pyramidTravel var(--dur) linear infinite;
        max-width: 280px; white-space: normal;
        border-left: 4px solid var(--p);
    }
    @keyframes pyramidTravel {
        0% { bottom: -150px; left: var(--x); transform: scale(1); opacity: 0; }
        15% { opacity: 1; }
        100% { bottom: 500px; left: 50%; transform: scale(0.4); opacity: 0; }
    }

    /* --- GRID WALL (2 CỘT MOBILE) --- */
    .grid-wall {
        display: grid; grid-template-columns: repeat(2, 1fr); 
        gap: 12px; padding-bottom: 150px;
        position: relative; z-index: 10;
    }
    @media (min-width: 768px) { .grid-wall { grid-template-columns: repeat(4, 1fr); gap: 30px; } }

    .sheep-card {
        position: relative; width: 100%; aspect-ratio: 1.1/1;
        background: url("./sheep.png") center/contain no-repeat;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: 0.3s;
    }
    .sheep-card:hover { transform: scale(1.05); }

    .card-inner {
        position: absolute; width: 72%; height: 58%; top: 25%;
        display: flex; flex-direction: column; text-align: center;
        padding: 5px; overflow-y: auto; scrollbar-width: none;
    }
    .card-inner::-webkit-scrollbar { display: none; }
    .card-inner b { color: var(--red); font-size: clamp(10px, 3vw, 14px); margin-bottom: 2px; font-weight: 900; }
    .card-inner span {
        color: var(--card-t); font-weight: 700; line-height: 1.2;
        font-size: clamp(8.5px, 2.3vw, 11px);
    }

    /* --- MODAL --- */
    .read-modal {
        position: fixed; inset: 0; background: rgba(0,0,0,0.9);
        display: none; align-items: center; justify-content: center;
        z-index: 5000; padding: 20px; backdrop-filter: blur(15px);
    }
    .read-modal.active { display: flex; }
    .read-box {
        background: #fff; width: 100%; max-width: 480px; padding: 35px;
        border-radius: 40px; color: #111; text-align: center;
    }
    .read-box h2 { font-size: 26px; color: var(--p); margin-bottom: 15px; font-weight: 900; }
    .read-box p { font-size: 16px; line-height: 1.6; font-weight: 600; color: #333; }

    /* --- UI CONTROLS --- */
    .btn-float {
        position: fixed; right: 15px; bottom: 25px;
        padding: 14px 22px; background: linear-gradient(135deg, var(--p), var(--pl));
        border: none; border-radius: 50px; color: #fff; font-weight: 900; z-index: 4000;
        cursor: pointer; box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5);
    }
    #musicBtn {
        position: fixed; left: 15px; bottom: 25px;
        width: 45px; height: 45px; border-radius: 50%;
        background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
        color: #fff; z-index: 4000; cursor: pointer;
    }

    .modal-form {
        position: fixed; inset: 0; background: rgba(0,0,0,0.85);
        display: none; align-items: center; justify-content: center; z-index: 4500;
    }
    .modal-form.active { display: flex; }
    .form-box {
        background: #111026; width: 100%; max-width: 400px; padding: 25px;
        border-radius: 25px; border: 1px solid var(--pl);
    }
    .st-input {
        width: 100%; padding: 14px; margin: 10px 0; background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff;
        outline: none;
    }

    footer { text-align: center; padding: 60px; font-size: 10px; opacity: 0.5; letter-spacing: 1px; }
</style>
