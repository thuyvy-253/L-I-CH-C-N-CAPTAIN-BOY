<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CAPTAIN BOY • TINH HÀ SAY HI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #d8b4fe;
            --bg: #05030d;
            --text: #ffffff;
            --card-text: #1a1a1a;
            --accent: #ff3b3b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.4;
        }

        input, textarea, button { font-family: 'Inter', sans-serif !important; }

        /* --- BACKGROUND LAYER SYSTEM --- */
        .universe-bg {
            position: fixed; inset: 0; z-index: -10;
            background: radial-gradient(circle at center, #1e1450 0%, #05030d 100%);
        }

        .nebula {
            position: absolute; inset: 0;
            background: url("./nền.png") center/cover no-repeat;
            opacity: 0.5; filter: blur(2px) saturate(1.5);
        }

        /* Đám mây bồng bềnh */
        .cloud {
            position: absolute; background: rgba(255, 255, 255, 0.07);
            filter: blur(30px); border-radius: 50%;
            animation: floatCloud var(--d) infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes floatCloud {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
        }

        .star {
            position: absolute; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #fff;
            animation: twinkle var(--t) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 80vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }

        .hero h1 {
            font-size: clamp(35px, 10vw, 100px);
            font-weight: 900; line-height: 0.9;
            background: linear-gradient(to bottom, #fff, var(--primary-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .hero .sub-bottom {
            font-size: clamp(9px, 3vw, 20px);
            letter-spacing: 2px; font-weight: 700;
            white-space: nowrap; margin-top: 15px;
        }

        /* --- PYRAMID FLYING BOX (DẠNG KIM TỰ THÁP) --- */
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 10px; }

        .pyramid-wrapper {
            position: relative; width: 100%; height: 400px;
            margin: 40px 0; overflow: hidden;
            background: rgba(255,255,255,0.02);
            /* Tạo hình dạng kim tự tháp cho khung */
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            border-bottom: 2px solid var(--primary-light);
            backdrop-filter: blur(10px);
        }

        .pyramid-title { text-align: center; margin-bottom: 10px; font-weight: 900; color: var(--primary-light); }

        .flying-wish {
            position: absolute; background: rgba(255, 255, 255, 0.95);
            padding: 8px 12px; border-radius: 15px;
            color: #111; font-size: 10px; font-weight: 700;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            /* Animation bay hội tụ về đỉnh kim tự tháp */
            animation: pyramidFly var(--duration) linear infinite;
        }

        @keyframes pyramidFly {
            0% { bottom: -50px; left: var(--startX); transform: scale(1); opacity: 0; }
            10% { opacity: 1; }
            100% { bottom: 420px; left: 50%; transform: scale(0.5); opacity: 0; }
        }

        /* --- WALL OF LOVE (2-3 CỘT MOBILE) --- */
        .grid-wall {
            display: grid;
            /* Phối hợp để có 2-3 cột trên màn hình nhỏ */
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px; padding-bottom: 120px;
        }

        @media (min-width: 768px) {
            .grid-wall { grid-template-columns: repeat(4, 1fr); gap: 30px; }
        }

        /* MỞ RỘNG SHEEP CARD */
        .sheep-card {
            position: relative; width: 100%; aspect-ratio: 1.1 / 1;
            background: url("./sheep.png") center/contain no-repeat;
            display: flex; align-items: center; justify-content: center;
        }

        .card-inner {
            position: absolute; 
            width: 78%; /* Nới rộng vùng chứa 100 chữ */
            height: 68%;
            top: 20%; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 5px; overflow: hidden;
        }

        .card-inner b {
            color: var(--accent); font-size: clamp(8px, 2.5vw, 12px);
            margin-bottom: 2px; font-weight: 900;
        }

        .card-inner span {
            color: var(--card-text); font-weight: 700;
            line-height: 1.1; word-break: break-word;
            /* Font-size sẽ được JS tính toán động */
        }

        /* --- CONTROLS --- */
        .btn-float {
            position: fixed; right: 15px; bottom: 25px;
            padding: 12px 20px; background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none; border-radius: 50px; color: #fff; font-weight: 800; font-size: 13px;
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5); z-index: 100;
        }

        #musicBtn {
            position: fixed; left: 15px; bottom: 25px;
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; z-index: 100;
        }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center;
            padding: 20px; z-index: 1000; backdrop-filter: blur(10px);
        }
        .modal.active { display: flex; }
        .modal-box {
            background: #111026; width: 100%; max-width: 450px;
            padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
        }

        .input-box {
            width: 100%; padding: 14px; margin: 10px 0;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #fff; font-size: 16px;
        }

        footer { text-align: center; padding: 40px; font-size: 10px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="universe-bg">
        <div class="nebula"></div>
        <div id="starField"></div>
        <div id="cloudField"></div>
    </div>

    <header class="hero">
        <div style="font-size:10px; letter-spacing:5px; opacity:0.7; margin-bottom:10px">THE RETURN OF</div>
        <h1>CAPTAIN BOY</h1>
        <div style="font-size: clamp(20px, 6vw, 50px); font-weight: 800; text-shadow: 0 0 15px var(--primary);">WISHING WALL</div>
        <div class="sub-bottom">✦ CAPTAIN BOY - TINH HÀ SAY HI ✦</div>
    </header>

    <div class="container">
        <!-- KHUNG KIM TỰ THÁP -->
        <div class="pyramid-title">CỪU CÓ CÁNH WITH LOVE</div>
        <div class="pyramid-wrapper" id="pyramidZone"></div>

        <section>
            <div style="text-align: center; margin: 30px 0 20px;">
                <h2 style="font-size: 26px; font-weight: 900;">WALL OF LOVE</h2>
                <p style="opacity: 0.6; font-size: 11px;">Mỗi thẻ cừu là một trái tim ✦</p>
            </div>
            <div class="grid-wall" id="wishGrid"></div>
        </section>

        <footer>PROJECT BY: TEAM BOT - NHỮNG CON BOT CỦA CAPTAIN BOY</footer>
    </div>

    <button class="btn-float" onclick="setModal(true)">+ GỬI LỜI CHÚC</button>
    <button id="musicBtn">🔊</button>

    <div class="modal" id="wishModal">
        <div class="modal-box">
            <h2 style="margin-bottom:15px; font-weight:900">Gửi lời chúc ✨</h2>
            <input type="text" id="uName" class="input-box" placeholder="Tên của Cừu..." required maxlength="25">
            <textarea id="uMsg" class="input-box" rows="5" placeholder="Lời chúc dành cho CAPTAIN BOY..." required maxlength="500"></textarea>
            <button onclick="submitWish()" id="sendBtn" style="width:100%; padding:16px; background:var(--primary); border:none; border-radius:12px; color:#fff; font-weight:900; cursor:pointer">GỬI NGAY ✨</button>
            <button onclick="setModal(false)" style="width:100%; background:none; border:none; color:#666; margin-top:15px">Hủy</button>
        </div>
    </div>

    <audio id="bgm" loop src="./music.mp3"></audio>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzOb_fBFiq6VR_n2dN9QsNDUM2pMoSb2dSfw2Nz0dKLHBeberjyc49GJ_gk70kng2R2/exec";

        // 1. Tạo Tinh hà & Đám mây
        const sf = document.getElementById("starField");
        const cf = document.getElementById("cloudField");
        
        for(let i=0; i<150; i++){
            const s = document.createElement("div"); s.className = "star";
            const sz = Math.random() * 3 + 1;
            s.style.width = s.style.height = sz + "px";
            s.style.left = Math.random() * 100 + "%"; s.style.top = Math.random() * 100 + "%";
            s.style.setProperty('--t', (Math.random() * 3 + 2) + "s");
            sf.appendChild(s);
        }

        for(let i=0; i<6; i++){
            const c = document.createElement("div"); c.className = "cloud";
            c.style.width = (Math.random() * 300 + 200) + "px";
            c.style.height = (Math.random() * 150 + 100) + "px";
            c.style.left = Math.random() * 90 + "%"; c.style.top = Math.random() * 90 + "%";
            c.style.setProperty('--d', (Math.random() * 10 + 15) + "s");
            cf.appendChild(c);
        }

        // 2. Fetch Data
        async function load() {
            try {
                const r = await fetch(API + "?action=list");
                const d = await r.json();
                if(d.approved) {
                    renderGrid(d.approved);
                    renderPyramid(d.approved);
                }
            } catch(e) {}
        }

        function renderGrid(list) {
            const grid = document.getElementById("wishGrid");
            grid.innerHTML = list.slice().reverse().map(i => {
                const msg = i.message;
                // THUẬT TOÁN CO GIÃN CHỮ CỰC MẠNH
                let fontSize = "11px";
                if (msg.length > 300) fontSize = "5.5px";
                else if (msg.length > 200) fontSize = "6.5px";
                else if (msg.length > 120) fontSize = "7.5px";
                else if (msg.length > 70) fontSize = "8.5px";

                return `
                    <div class="sheep-card">
                        <div class="card-inner">
                            <b>From: ${esc(i.name)}</b>
                            <span style="font-size: ${fontSize}">${esc(msg)}</span>
                        </div>
                    </div>
                `;
            }).join("");
        }

        function renderPyramid(list) {
            const pZone = document.getElementById("pyramidZone");
            pZone.innerHTML = "";
            setInterval(() => {
                const i = list[Math.floor(Math.random()*list.length)];
                const w = document.createElement("div");
                w.className = "flying-wish";
                w.style.setProperty('--startX', (Math.random() * 90 + 5) + "%");
                w.style.setProperty('--duration', (Math.random() * 5 + 7) + "s");
                w.innerText = esc(i.name) + ": " + (i.message.substring(0,25) + "...");
                pZone.appendChild(w);
                setTimeout(() => w.remove(), 12000);
            }, 3000);
        }

        async function submitWish() {
            const n = document.getElementById("uName").value.trim();
            const m = document.getElementById("uMsg").value.trim();
            if(!n || !m) return alert("Điền đủ nha!");
            const b = document.getElementById("sendBtn");
            b.innerText = "ĐANG GỬI..."; b.disabled = true;
            try {
                await fetch(API, { method:"POST", body: JSON.stringify({action:"submit", name:n, message:m, id:Date.now()}) });
                alert("Thành công! Chờ duyệt nhé ✨");
                setModal(false); location.reload();
            } catch(e) { alert("Lỗi!"); b.disabled = false; b.innerText = "GỬI NGAY ✨"; }
        }

        function setModal(s) { document.getElementById("wishModal").classList.toggle("active", s); }
        function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        const bgm = document.getElementById("bgm");
        const mBtn = document.getElementById("musicBtn");
        mBtn.onclick = () => {
            if(bgm.paused) { bgm.play(); mBtn.innerHTML = "🔊"; }
            else { bgm.pause(); mBtn.innerHTML = "🔇"; }
        }

        load();
    </script>
</body>
</html>
