<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>CAPTAIN BOY • TINH HÀ SAY HI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #d8b4fe;
            --bg: #05030d;
            --text: #ffffff;
            --card-text: #1a1a1a;
            --shadow: 0 0 25px rgba(124, 58, 237, 0.6);
        }

        /* RESET & FONT FIX */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Ép phông chữ cho Form để không bị lỗi */
        input, textarea, button {
            font-family: 'Inter', sans-serif !important;
            outline: none;
        }

        /* --- UNIVERSE BACKGROUND --- */
        .universe {
            position: fixed;
            inset: 0;
            z-index: -10;
            background: radial-gradient(circle at center, #1b1448 0%, #05030d 100%);
        }

        .nebula {
            position: absolute;
            inset: 0;
            background: url("./nền.png") center/cover no-repeat;
            opacity: 0.45;
            filter: saturate(1.4);
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: blink var(--t) infinite ease-in-out;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 8px #fff; }
        }

        .shooting-star {
            position: absolute;
            width: 2px;
            height: 100px;
            background: linear-gradient(to bottom, #fff, transparent);
            transform: rotate(45deg);
            opacity: 0;
            animation: shoot 8s linear infinite;
        }

        @keyframes shoot {
            0% { transform: translate(-100px, -100px) rotate(45deg); opacity: 0; }
            10% { opacity: 1; }
            20% { transform: translate(500px, 500px) rotate(45deg); opacity: 0; }
            100% { transform: translate(500px, 500px) rotate(45deg); opacity: 0; }
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero .sub-top {
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 15px;
            opacity: 0.8;
            color: var(--primary-light);
        }

        .hero h1 {
            font-size: clamp(40px, 12vw, 120px);
            font-weight: 900;
            line-height: 0.9;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero .wishing-wall {
            font-size: clamp(26px, 8vw, 65px);
            font-weight: 800;
            margin-bottom: 30px;
            text-shadow: var(--shadow);
        }

        /* FIX 1 DÒNG DUY NHẤT TRÊN MOBILE */
        .hero .sub-bottom {
            font-size: clamp(10px, 3.5vw, 22px); /* Tự co giãn để không bị rớt dòng */
            letter-spacing: 2px;
            font-weight: 600;
            white-space: nowrap; /* Ép buộc 1 hàng */
            width: 100%;
            display: block;
        }

        /* --- CONTAINER --- */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* --- GRID WALL (2-3 CỘT MOBILE) --- */
        .grid-wall {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            padding-bottom: 120px;
        }

        @media (min-width: 768px) {
            .grid-wall { grid-template-columns: repeat(3, 1fr); gap: 30px; }
        }

        /* --- SHEEP CARD ĐÃ MỞ RỘNG --- */
        .sheep-card {
            position: relative;
            width: 100%;
            aspect-ratio: 1.1 / 1;
            background: url("./sheep.png") center/contain no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-inner {
            position: absolute;
            width: 68%; /* Mở rộng vùng chứa */
            height: 62%; /* Mở rộng vùng chứa */
            top: 25%;
            display: flex;
            flex-direction: column;
