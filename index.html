<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>CAPTAIN BOY • TINH HÀ SAY HI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#8b5cf6;
  --primary2:#c084fc;
  --bg:#05010f;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:#fff;
  overflow-x:hidden;
  min-height:100vh;
}

/* =========================
BACKGROUND
========================= */

.bg{
  position:fixed;
  inset:0;
  z-index:-50;

  background:
    linear-gradient(
      rgba(5,1,15,.45),
      rgba(5,1,15,.78)
    ),
    url("./nền.png");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  animation:bgMove 35s linear infinite;
}

@keyframes bgMove{
  0%{
    transform:scale(1);
  }
  50%{
    transform:scale(1.05);
  }
  100%{
    transform:scale(1);
  }
}

/* =========================
GALAXY
========================= */

#galaxy{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:-40;
}

/* =========================
PURPLE GLOW
========================= */

.glow{
  position:fixed;
  border-radius:50%;
  filter:blur(120px);
  opacity:.22;
  z-index:-30;
  animation:glowMove 16s ease-in-out infinite;
}

.glow.one{
  width:420px;
  height:420px;
  background:#7c3aed;
  top:-100px;
  left:-100px;
}

.glow.two{
  width:360px;
  height:360px;
  background:#c084fc;
  bottom:-120px;
  right:-120px;
  animation-delay:4s;
}

@keyframes glowMove{
  0%,100%{
    transform:translateY(0px) scale(1);
  }
  50%{
    transform:translateY(50px) scale(1.15);
  }
}

/* =========================
NOISE
========================= */

.noise{
  position:fixed;
  inset:0;
  z-index:-20;
  opacity:.04;

  background-image:
    linear-gradient(rgba(255,255,255,.6) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.6) 1px, transparent 1px);

  background-size:3px 3px;
}

/* =========================
METEOR
========================= */

.meteor{
  position:fixed;

  width:3px;
  height:180px;

  background:
    linear-gradient(
      to bottom,
      rgba(255,255,255,1),
      rgba(255,255,255,0)
    );

  border-radius:999px;

  transform:rotate(45deg);

  filter:
    drop-shadow(0 0 15px #fff)
    drop-shadow(0 0 30px #c084fc);

  z-index:-10;

  pointer-events:none;

  animation:meteor linear forwards;
}

@keyframes meteor{

  from{
    transform:
      translate(0,0)
      rotate(45deg)
      scale(1);

    opacity:1;
  }

  to{
    transform:
      translate(-1200px,1200px)
      rotate(45deg)
      scale(.3);

    opacity:0;
  }

}

/* =========================
PARTICLES
========================= */

.particle{
  position:fixed;
  border-radius:50%;
  background:white;
  pointer-events:none;
  z-index:-5;
  opacity:.8;

  animation:floatUp linear forwards;
}

@keyframes floatUp{

  from{
    transform:
      translateY(0)
      scale(.4);

    opacity:0;
  }

  10%{
    opacity:1;
  }

  to{
    transform:
      translateY(-120vh)
      scale(1.8);

    opacity:0;
  }

}

/* =========================
LAYOUT
========================= */

.container{
  width:min(1200px,92%);
  margin:auto;
  padding-bottom:120px;
}

/* =========================
HERO
========================= */

.hero{
  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  text-align:center;
}

.hero-inner{
  width:100%;
}

.hero h1{
  font-size:clamp(78px,10vw,170px);

  font-weight:900;
  line-height:.9;

  margin-bottom:18px;

  letter-spacing:2px;

  background:
    linear-gradient(
      to bottom,
      #fff,
      #d8b4fe
    );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
    0 0 40px rgba(192,132,252,.45);
}

.hero h2{
  font-size:clamp(42px,5vw,92px);

  font-weight:900;

  color:#f5d0fe;

  margin-bottom:18px;

  text-shadow:
    0 0 30px rgba(192,132,252,.4);
}

.hero p{
  font-size:clamp(18px,2vw,30px);
  color:#fff;
  letter-spacing:1px;
}

/* =========================
SECTION
========================= */

.section-head{
  text-align:center;
  margin-bottom:30px;
}

.section-head h2{
  font-size:clamp(28px,3vw,48px);
  font-weight:900;
  margin-bottom:12px;
}

.section-head p{
  color:rgba(255,255,255,.72);
  font-size:16px;
}

/* =========================
FLYING AREA
========================= */

.wish-cuucocanh{
  position:relative;

  width:100%;
  height:430px;

  overflow:hidden;

  border-radius:36px;

  background:
    linear-gradient(
      rgba(20,14,45,.72),
      rgba(8,5,18,.9)
    );

  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(10px);

  box-shadow:
    0 15px 40px rgba(124,58,237,.2);
}

/* =========================
FLYING WISH
========================= */

.flying-wish{
  position:absolute;

  bottom:-140px;

  min-width:190px;
  max-width:300px;

  padding:18px 24px;

  border-radius:999px;

  background:
    radial-gradient(circle at top,
    #fff,
    #f3e8ff 70%);

  border:2px solid rgba(255,255,255,.8);

  color:#2d1b45;

  box-shadow:
    0 10px 35px rgba(168,85,247,.35);

  animation-name:flyUp;
  animation-timing-function:linear;
  animation-fill-mode:forwards;
}

.flying-wish::before{
  content:"";

  position:absolute;

  width:45px;
  height:45px;

  border-radius:50%;

  background:#f3e8ff;

  top:-18px;
  left:20px;

  z-index:-1;
}

.flying-wish::after{
  content:"";

  position:absolute;

  width:28px;
  height:28px;

  border-radius:50%;

  background:#f3e8ff;

  top:-10px;
  right:20px;

  z-index:-1;
}

.flying-wish strong{
  display:block;

  color:#7c3aed;

  margin-bottom:6px;

  font-size:14px;
  font-weight:900;
}

.flying-wish span{
  font-size:14px;
  line-height:1.45;
}

@keyframes flyUp{

  0%{
    transform:
      translateY(0)
      scale(.7);

    opacity:0;
  }

  10%{
    opacity:1;
  }

  50%{
    transform:
      translateY(-350px)
      translateX(-20px)
      scale(1);
  }

  100%{
    transform:
      translateY(-850px)
      translateX(50px)
      scale(1.12);

    opacity:0;
  }

}

/* =========================
WALL
========================= */

.wall{
  margin-top:100px;
}

.wish-grid{
  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(420px,520px));

  justify-content:center;

  gap:40px;
}

/* =========================
SHEEP CARD
========================= */

.wish-card{
  position:relative;

  width:100%;
  max-width:520px;

  height:340px;

  background-image:url("./sheep.png");

  background-repeat:no-repeat;
  background-size:100% 100%;
  background-position:center;

  padding-top:72px;
  padding-left:165px;
  padding-right:90px;
  padding-bottom:55px;

  overflow:hidden;

  transition:.35s;

  display:flex;
  flex-direction:column;
}

.wish-card:hover{
  transform:translateY(-6px) scale(1.02);
}

.wish-card strong{
  color:#ff4545;

  font-size:22px;
  font-weight:900;

  margin-bottom:14px;

  text-align:center;

  width:100%;
}

.wish-card p{
  color:#2d1b45;

  font-size:20px;
  font-weight:800;

  line-height:1.45;

  white-space:pre-wrap;
  word-break:break-word;

  max-width:240px;
}

/* =========================
BUTTONS
========================= */

.floating-btn{
  position:fixed;

  right:24px;
  bottom:24px;

  z-index:999;

  border:none;
  cursor:pointer;

  padding:16px 28px;

  border-radius:999px;

  background:
    linear-gradient(
      135deg,
      #8b5cf6,
      #c084fc
    );

  color:white;

  font-size:15px;
  font-weight:800;

  font-family:'Inter',sans-serif;

  box-shadow:
    0 12px 35px rgba(124,58,237,.42);

  transition:.3s;
}

.floating-btn:hover{
  transform:translateY(-4px);
}

#musicBtn{
  position:fixed;

  left:24px;
  bottom:24px;

  z-index:999;

  width:58px;
  height:58px;

  border:none;
  border-radius:50%;

  background:
    linear-gradient(
      135deg,
      #8b5cf6,
      #c084fc
    );

  color:white;

  font-size:24px;

  cursor:pointer;
}

/* =========================
MODAL
========================= */

.modal{
  position:fixed;
  inset:0;

  z-index:9999;

  background:rgba(0,0,0,.72);

  display:none;

  align-items:center;
  justify-content:center;

  padding:20px;

  backdrop-filter:blur(8px);
}

.modal.active{
  display:flex;
}

.modal-box{
  width:min(520px,100%);

  background:rgba(14,10,30,.95);

  border-radius:30px;

  border:1px solid rgba(255,255,255,.08);

  padding:34px;

  position:relative;
}

.close{
  position:absolute;

  top:14px;
  right:18px;

  border:none;
  background:none;

  color:white;

  font-size:34px;

  cursor:pointer;
}

.modal-box h3{
  font-size:34px;
  margin-bottom:12px;

  font-weight:900;
}

.sub{
  color:rgba(255,255,255,.68);
  margin-bottom:24px;
}

.input-group{
  margin-bottom:18px;
}

.input-group label{
  display:block;
  margin-bottom:8px;

  font-size:14px;
}

.input-group input,
.input-group textarea{
  width:100%;

  border:none;
  outline:none;

  border-radius:18px;

  padding:16px 18px;

  background:rgba(255,255,255,.05);

  color:white;

  font-family:'Inter',sans-serif;
  font-size:15px;
}

.input-group textarea{
  resize:none;
}

.submit-btn{
  width:100%;

  border:none;
  cursor:pointer;

  padding:18px;

  border-radius:20px;

  background:
    linear-gradient(
      135deg,
      #8b5cf6,
      #c084fc
    );

  color:white;

  font-size:16px;
  font-weight:800;

  font-family:'Inter',sans-serif;
}

/* =========================
FOOTER
========================= */

.footer{
  margin-top:90px;

  text-align:center;

  color:rgba(255,255,255,.45);

  font-size:13px;
}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

  .container{
    width:94%;
  }

  .hero{
    min-height:100vh;
    padding-top:0;
    padding-bottom:0;
  }

  .hero h1{
    font-size:58px;
    line-height:1;
    white-space:nowrap;
  }

  .hero h2{
    font-size:34px;
    white-space:nowrap;
  }

  .hero p{
    font-size:16px;
    white-space:nowrap;
  }

  .section-head h2{
    font-size:28px;
  }

  .section-head p{
    font-size:14px;
  }

  .wish-cuucocanh{
    height:300px;
    border-radius:26px;
  }

  .wish-grid{
    grid-template-columns:1fr;
    gap:24px;
  }

  .wish-card{
    max-width:100%;

    height:240px;

    padding-top:48px;
    padding-left:112px;
    padding-right:48px;
    padding-bottom:40px;
  }

  .wish-card strong{
    font-size:15px;
    margin-bottom:10px;
  }

  .wish-card p{
    font-size:14px;
    max-width:150px;
    line-height:1.35;
  }

  .floating-btn{
    right:16px;
    bottom:16px;

    padding:14px 18px;

    font-size:12px;
  }

  #musicBtn{
    width:50px;
    height:50px;

    left:16px;
    bottom:16px;

    font-size:20px;
  }

  .modal-box{
    padding:26px;
  }

  .modal-box h3{
    font-size:26px;
  }

}

</style>
</head>

<body>

<div class="bg"></div>

<canvas id="galaxy"></canvas>

<div class="glow one"></div>
<div class="glow two"></div>

<div class="noise"></div>

<div class="container">

<section class="hero">

<div class="hero-inner">

<h1>CAPTAIN BOY</h1>

<h2>TINH HÀ SAY HI</h2>

<p>
✦ WISHING WALL ✦
</p>

</div>

</section>

<section>

<div class="section-head">

<h2>
CỪU CÓ CÁNH WITH LOVE
</h2>

<p>
Lời yêu thương dành cho CAPTAIN BOY ✦
</p>

</div>

<div class="wish-cuucocanh" id="wishCuucocanh"></div>

</section>

<section class="wall">

<div class="section-head">

<h2>WALL OF LOVE</h2>

<p>
Những lời nhắn đáng yêu từ Cừu Có Cánh ✦
</p>

</div>

<div class="wish-grid" id="wishGrid"></div>

</section>

<div class="footer">
PROJECT BY TEAM BOT • CAPTAIN BOY
</div>

</div>

<button class="floating-btn" onclick="toggleModal(true)">
✨ GỬI LỜI CHÚC
</button>

<button id="musicBtn">🔊</button>

<div class="modal" id="wishModal">

<div class="modal-box">

<button class="close" onclick="toggleModal(false)">
×
</button>

<h3>Gửi lời đến CAPTAIN BOY</h3>

<div class="sub">
Lời nhắn sẽ được hiển thị sau khi admin duyệt ✨
</div>

<form id="wishForm">

<div class="input-group">
<label>Tên của bạn</label>

<input
type="text"
id="userName"
maxlength="30"
required>
</div>

<div class="input-group">
<label>Lời chúc</label>

<textarea
id="userMsg"
rows="5"
maxlength="180"
required></textarea>
</div>

<button class="submit-btn" id="submitBtn" type="submit">
GỬI NGAY ✨
</button>

</form>

</div>

</div>

<audio id="bgMusic" loop>
<source src="./music.mp3" type="audio/mpeg">
</audio>

<script>

/* =========================
CONFIG
========================= */

const CONFIG = {

googleScriptUrl:
"https://script.google.com/macros/s/AKfycbzOb_fBFiq6VR_n2dN9QsNDUM2pMoSb2dSfw2Nz0dKLHBeberjyc49GJ_gk70kng2R2/exec"

};

let listApproved = [];
let flyInterval = null;

/* =========================
MODAL
========================= */

function toggleModal(show){

document
.getElementById("wishModal")
.classList.toggle("active",show);

}

/* =========================
FETCH
========================= */

async function fetchWishes(){

try{

const response = await fetch(
CONFIG.googleScriptUrl + "?action=list"
);

const data = await response.json();

if(data.approved){

listApproved = data.approved;

renderWall();

startFlying();

}

}catch(err){

console.log(err);

}

}

/* =========================
RENDER
========================= */

function renderWall(){

const grid =
document.getElementById("wishGrid");

if(!listApproved.length){

grid.innerHTML = `
<div class="wish-card">
<strong>From: CỪU CÓ CÁNH</strong>
<p>Chưa có lời chúc nào ✨</p>
</div>
`;

return;

}

grid.innerHTML = listApproved
.slice()
.reverse()
.map(item => `

<div class="wish-card">

<strong>
From: ${escapeHtml(item.name)}
</strong>

<p>
${escapeHtml(item.message)}
</p>

</div>

`).join("");

}

/* =========================
FLYING WISH
========================= */

function startFlying(){

const box =
document.getElementById("wishCuucocanh");

box.innerHTML = "";

if(flyInterval){
clearInterval(flyInterval);
}

function createWish(){

const wish =
listApproved[
Math.floor(Math.random()*listApproved.length)
];

if(!wish) return;

const el =
document.createElement("div");

el.className = "flying-wish";

el.style.left =
Math.random()*80 + "%";

el.style.animationDuration =
(8 + Math.random()*4) + "s";

el.innerHTML = `
<strong>${escapeHtml(wish.name)}</strong>
<span>${escapeHtml(wish.message)}</span>
`;

box.appendChild(el);

setTimeout(()=>{
el.remove();
},13000);

}

for(let i=0;i<6;i++){
setTimeout(createWish,i*1000);
}

flyInterval =
setInterval(createWish,2200);

}

/* =========================
SUBMIT
========================= */

document
.getElementById("wishForm")
.addEventListener("submit",async(e)=>{

e.preventDefault();

const btn =
document.getElementById("submitBtn");

const name =
document.getElementById("userName")
.value.trim();

const message =
document.getElementById("userMsg")
.value.trim();

if(!name || !message){

alert("Vui lòng nhập đầy đủ ✨");
return;

}

btn.disabled = true;
btn.innerText = "ĐANG GỬI...";

try{

const response = await fetch(
CONFIG.googleScriptUrl,
{
method:"POST",

headers:{
"Content-Type":"text/plain;charset=utf-8"
},

body:JSON.stringify({

action:"submit",

id:Date.now(),

name,

message,

createdAt:new Date().toISOString()

})

}
);

const data = await response.json();

if(data.ok){

alert("Đã gửi thành công ✨");

document
.getElementById("wishForm")
.reset();

toggleModal(false);

}else{

alert("Gửi thất bại 😭");

}

}catch(err){

alert("Lỗi kết nối Apps Script");

}finally{

btn.disabled = false;
btn.innerText = "GỬI NGAY ✨";

}

});

/* =========================
ESCAPE HTML
========================= */

function escapeHtml(text){

const div =
document.createElement("div");

div.textContent = text;

return div.innerHTML;

}

/* =========================
GALAXY
========================= */

const canvas =
document.getElementById("galaxy");

const ctx =
canvas.getContext("2d");

let stars = [];

function resizeGalaxy(){

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

}

resizeGalaxy();

window.addEventListener(
"resize",
resizeGalaxy
);

function createStars(){

stars = [];

for(let i=0;i<320;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

radius:Math.random()*2.5,

opacity:Math.random(),

speed:Math.random()*0.25,

glow:Math.random()*25

});

}

}

createStars();

function animateGalaxy(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

stars.forEach(star=>{

ctx.beginPath();

ctx.arc(
star.x,
star.y,
star.radius,
0,
Math.PI*2
);

ctx.fillStyle =
`rgba(255,255,255,${star.opacity})`;

ctx.shadowBlur =
star.glow;

ctx.shadowColor =
"#c084fc";

ctx.fill();

star.y += star.speed;

if(star.y > canvas.height){

star.y = 0;

star.x =
Math.random()*canvas.width;

}

});

requestAnimationFrame(
animateGalaxy
);

}

animateGalaxy();

/* =========================
PARTICLES
========================= */

function createParticle(){

const p =
document.createElement("div");

p.className = "particle";

p.style.left =
Math.random()*100 + "vw";

p.style.bottom = "-20px";

const size =
Math.random()*4 + 2;

p.style.width =
size + "px";

p.style.height =
size + "px";

p.style.animationDuration =
(7 + Math.random()*8) + "s";

document.body.appendChild(p);

setTimeout(()=>{
p.remove();
},16000);

}

setInterval(createParticle,220);

/* =========================
METEOR
========================= */

function createMeteor(){

const meteor =
document.createElement("div");

meteor.className = "meteor";

meteor.style.top =
Math.random()*35 + "vh";

meteor.style.left =
(80 + Math.random()*20) + "vw";

meteor.style.animationDuration =
(1 + Math.random()*1.2) + "s";

document.body.appendChild(meteor);

setTimeout(()=>{
meteor.remove();
},3000);

}

setInterval(createMeteor,1800);

/* =========================
MUSIC
========================= */

const music =
document.getElementById("bgMusic");

const musicBtn =
document.getElementById("musicBtn");

music.volume = 0.5;

document.addEventListener("click",()=>{

if(music.paused){

music.play().catch(()=>{});

}

},{once:true});

musicBtn.addEventListener("click",(e)=>{

e.stopPropagation();

if(music.paused){

music.play();
musicBtn.innerHTML = "🔊";

}else{

music.pause();
musicBtn.innerHTML = "🔇";

}

});

/* =========================
INIT
========================= */

fetchWishes();

setInterval(fetchWishes,30000);

</script>

</body>
</html>
